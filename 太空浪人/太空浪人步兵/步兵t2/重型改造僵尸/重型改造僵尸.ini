


[core]
name: 重型改造僵尸
displayText: Тяжёлый модифицированный зомби
class: CustomUnitMetadata
displayDescription: 重型改造僵尸由体型十分巨大的僵尸改造而来，\n-他们配备一门火神炮，重型盾牌以及陶氏反坦克导弹，\n-这些是太空浪人从成千上万的创世纪报废车辆中筛选出的最优解，\n-生产力缺乏的浪人对他们稍加改进，\n-便创造出这种能与主战坦克正面对干的巨型怪物。\n-对地对空，机枪动能伤害，导弹爆炸伤害，生物单位。
price: 400
maxHp: 720

mass: 2200
techLevel: 1
buildSpeed: 5s
softCollisionOnAll: 17
radius: 15
armour: 1
isBio: true
explodeOnDeath: false
