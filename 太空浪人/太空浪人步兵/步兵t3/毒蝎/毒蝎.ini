


[core]
name: 毒蝎
price: 1300
maxHp: 1800
mass: 30000
displayDescription: -巨人僵尸固然强大，但是在面对余辉重型武器时，\n-血肉之躯始终难以抵挡钢铁洪流，于是，太空浪人将巨人僵尸当做武器载体，\n-为其配备了中性粒子炮，智能头盔，和多层钽合金装甲插板，\n-甚至还设计了语音通话功能并激活了低级智力，在这些科技的加持下，\n-升级版毒蝎即使是面对重型单位也有一战之力，他们常常给创世纪军队提供炮火掩护。\n-对地对空，动能伤害，生物单位。

techLevel: 1
buildSpeed: 13s
radius: 20
displayRadius: 20
armour: 5
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
copyFrom: ROOT:/通用特效/单位防护.ini
tags: 地面,步兵,寄生免疫
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3
isBio: true
explodeOnDeath: false
isUnrepairableUnit:true
hideScorchMark: true


[action_灰影寄生虫科技提示1]
displayType: infoOnlyNoBox
iconImage: ROOT:/太空浪人/太空浪人建筑/t3建筑/太空浪人纳米蜂巢/灰影寄生虫.png
text: 灰影寄生虫1
isActive: false
isVisible: if self.globalTeamTags(includes='寄生虫1')


[action_s1]
