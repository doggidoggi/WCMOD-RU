


[core]
name: 基因血巢
displayText: Генетический кровяной улей
displayDescription: -Бегемот изначально жил на планете Коста в галактике Обсцесия — это гигантское травоядное животное.\n-Это животное добродушно по натуре, но это не значит, что оно беспомощно перед угрозой.\n-Его характерная костная пластина, покрывающая переднюю часть тела, обеспечивает превосходную защиту, а его огромная сила —\n-это идеальная основа для создания биологического оружия. Скитальцы соединили вирус «Серая Тень» с клоном Бегемота\n-и успешно создали Генетический кровяной улей — это отвратительное, но мощное чудовище. Однако\n-Генетический кровяной улей не смог изменить свою кроткую природу, поэтому Скитальцы усилили его репродуктивные и другие железы.\n-Он может с большого расстояния вылупливать массу зомби и выпускать феромоны для управления всей армией зомби в бою.\n-Может атаковать только через выведение мелких зомби. Нейтральный урон, биологический юнит.
