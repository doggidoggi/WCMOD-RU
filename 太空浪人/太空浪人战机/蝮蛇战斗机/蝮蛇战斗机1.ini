[core]
name: 蝮蛇战斗机1
displayText: 蝮蛇战斗机
showInEditor: false
displayDescription: 【阶级t3】【高空单位】【空中单位】【机械单位】\n-战术定位:先进空中优势战斗机，武器配置：▲重型激光炮X2 能源伤害 只能对空\n-▲速射轨道炮X2 动能伤害 只能对空 蝮蛇战斗机是法雅德家族专为争夺制空权所研发的战斗机，\n-为了能应对余辉先进的战机连队，蝮蛇战机的一切都是按最高标准来设计的，\n-以便有效击落余辉的战机乃至战舰。在一对一的较量中，没有任何战斗机是蝮蛇的对手，\n-哪怕是面对护卫舰都能有一战之力。\n-即便蝮蛇的服役时间已经很长，但他至今仍是太空浪人最具威力的战斗机。
maxHp: 4500
price: 4500,awz= ${awzxq}
canOnlyBeAttackedByUnitsWithTags:反高空
@global awzxq: 45
reclaimPrice: awz= ${awzxq}
techLevel: 1
buildSpeed: 16s
availableInDemo: true

selfRegenRate: 0.2
fogOfWarSightRange: 24
armour: 17
radius: 51
displayRadius: 51

isBio: false
copyFrom: ROOT:/通用特效/单位防护.ini
softCollisionOnAll: 10
energyMax: 10
energyRegen: 0.1

energyNeedsToRechargeToFull: true
tags: 飞机,低空,高空,反高空
@memory 左转0: bool
@memory 右转0: bool
@memory oldDir0: float

updateUnitMemory: 左转0 = select( 180.2 < ( self.dir - memory.oldDir0 ) % 360 < 359.8, true, false ), 右转0 = select( 0.2 < ( self.dir - memory.oldDir0 ) % 360 < 179.8, true, false ), oldDir0 = self.dir - 360
updateUnitMemoryRate: 0

