[core]
name: 恶灵攻击机
displayText: Штурмовик «Злой дух»
displayDescription: -В ранний период Империи Нова «Злой дух» был тяжёлым штурмовиком, специально созданным императором для Королевской гвардии.\n-Его размеры почти достигают предела, который может вынести лётная палуба корабля.\n-Размер «Злого духа» приближается к стандартному фрегату, и поэтому он обладает непревзойдённой грузоподъёмностью и тяжёлой огневой мощью.\n-По сравнению с уязвимыми палубными десантными капсулами, штурмовик «Злой дух» способен пройти даже сквозь самые плотные сети ПВО для доставки юнитов,\n-одновременно эффективно очищая зону высадки и обеспечивая мощную огневую поддержку десанту.\n-Единственный чертёж штурмовика «Злой дух» был обнаружен Скитальцами в обломках космической станции Таутени-4. Хотя у Зарева их тоже много,\n-«Злые духи» Зарева из-за отсутствия чертежей не могут обслуживаться и давно вышли из строя.\n-После уникальной модификации Скитальцами штурмовик «Злой дух» по сей день служит основным штурмовым транспортным самолётом.\n-Атакует землю и воздух, пулемёты — кинетический урон, остальное — энергетический.
