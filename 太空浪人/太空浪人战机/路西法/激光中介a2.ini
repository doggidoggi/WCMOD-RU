


[core]
@memory asd: number
name: 激光中介a2
strictLevel: 1
price: 0
radius: 10

maxHp: 1
class: CustomUnitMetadata
techLevel: 1
showInEditor: false
tags: 激光

createOnAggressiveTeam: true
canNotBeDamaged: true
canOnlyBeAttackedByUnitsWithTags: 激光炮塔
# isUnrepairableUnit: true
isUnselectable: true

disableAllUnitCollisions: true
ignoreInUnitCapCalculation: true
disableDeathOnZeroHp: true
# 零生命值时不死亡
isBuilding: true

autoTriggerCooldownTime_allowDangerousHighCPU: true
autoTriggerCooldownTime: 0.002s


[graphics]
image: SHARED:blank.png
isVisible: false


[attack]
canAttack: false


[turret_1]
# 传送用的
x: 0
y: 0
projectile: 1
canShoot: false


[projectile_1]
# 传送用的
life: 1
deflectionPower: -1
directDamage: 0
teleportSource: true

invisible: true
instant: true
explodeEffect: none
explodeEffectOnShield: none


[hiddenAction_1]
autoTrigger: if parent == nullUnit and not self.hasFlag(id= 0)
# 脱离母体，启动自杀
setUnitMemory: asd = 0
addResources: setFlag= 0
resetCustomTimer: true

alsoTriggerAction: 3, 3a


[hiddenAction_1a]
autoTrigger: if self.hasFlag(id= 0) and self.height > 5 and self.height < 20
offsetSelfAbsolute: 0, 0, -5


[hiddenAction_1b]
autoTrigger: if self.hasFlag(id= 0) and self.height > 20
offsetSelfAbsolute: 0, 0, -20


[hiddenAction_2]
# 自杀
autoTrigger: if self.hasFlag(id= 0) and self.customTimer > 3.9 or self.hasFlag(id= 0) and memory.asd >= 50
deleteSelf: true


[hiddenAction_3]
requireConditional: if self.hasFlag(id= 1)
fireTurretXAtGround: 1
fireTurretXAtGround_withOffset: -75, 0


[hiddenAction_3a]
requireConditional: if not self.hasFlag(id= 1)
fireTurretXAtGround: 1
fireTurretXAtGround_withOffset: 75, 0


[hiddenAction_4]
autoTrigger: if self.hasFlag(id= 1) and parent == nullUnit and self.ammo > memory.asd and memory.asd < 50
fireTurretXAtGround: 1
fireTurretXAtGround_withOffset: 3, 0
setUnitMemory: asd = memory.asd + 1


[hiddenAction_4a]
autoTrigger: if not self.hasFlag(id= 1) and parent == nullUnit and self.ammo > memory.asd and memory.asd < 50
fireTurretXAtGround: 1
fireTurretXAtGround_withOffset: -3, 0
setUnitMemory: asd = memory.asd + 1


[movement]
movementType: AIR
moveSpeed: 0
maxTurnSpeed: 0
targetHeight: 0
targetHeightDrift: 0


