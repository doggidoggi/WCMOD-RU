


[core]
name: 中型海军传送门
displayText: Средний морской портал
class: CustomUnitMetadata
displayDescription: -Средний портал может телепортировать тяжёлый крейсер класса «Чёрный огонь» и линкор класса «Император».\n-Каждый портал может телепортировать только одного юнита.\n-Любой телепортируемый юнит прибудет на поле боя в течение четырёх секунд.\n-Каждый портал поддерживается только 30 секунд, поспешите решить, кого телепортировать,\n-иначе портал закроется, не телепортировав никого. Порталы можно создавать только в поле телепортации.
radius: 17
