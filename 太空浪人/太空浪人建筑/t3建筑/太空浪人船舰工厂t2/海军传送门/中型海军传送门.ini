[action_黑火级重型巡洋舰]
convertTo: 黑火级重型巡洋舰
displayType: action
text: 传送黑火级重型巡洋舰
description: -黑火级重型巡洋舰的体积和规模，甚至称之为战列舰都毫不夸张。\n-虽然科斯塔工业集团对外声称没有他们不做的生意，但黑火却是一个例外，\n-科斯塔家族从不向外出售黑火级，这种只向家族内部提供的巡洋舰是科斯塔家族海洋权益最有力的保证。\n-如果有幸被当做贵宾来到科斯塔家族的希达卡II行星上做生意，就会看到海洋上密密麻麻的黑火级，\n-他们庞大的身躯和夸张的巨炮仿佛在向一切敌人无声诉说着科斯塔工业的实力。\n-与帝国余辉开战后，科斯塔家族慷慨的将黑火级的蓝图公开，\n-如今他依然是与余辉还是力量对垒的关键。\n-对地，反潜，动能伤害。
price: 12000,awz=240

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔3')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: 失去了传送场，无法使用


[action_帝王级战列舰]
convertTo: 帝王级战列舰
displayType: action
text: 传送帝王级战列舰
description: -帝王级战列舰是法雅德家族科研力量的结晶，无论从他庞大的身躯，\n-还是夸张的武器，还是摆满飞机的甲板来看，无一不显示着法雅德家族在星系中的地位与力量。\n-在帝王级战列舰研发的时候，当时希诺星系几乎没有任何一艘战舰要比帝王还要巨大宏伟。\n-而帝王级战列舰，更是作为了法雅德家族在诺瓦帝国开国之年送给皇帝的礼物，\n-只不过可惜的是，皇帝在对比浮岛要塞与帝王后，发现帝王级还是不敌浮岛要塞，\n-而帝王级战列舰也因此而停产，仅存的帝王级战列舰因为古人类统一后再无战事而荒废，\n-直到与余辉开战的时候，余辉和法雅德家族才领略到帝王级战列舰真正的威力，\n-在艾文诺拉星系防御战中，帝王级战列舰宛如战神一般在海面上以一当十，\n-帝王级战列舰恐怕是余辉最害怕，也最不愿意见到的水面舰艇了。\n-对地对空，动能伤害，导弹以及飞机能源伤害。
price: 17000,awz=300

buildSpeed: 15s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='法雅德3')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: 失去了传送场，无法使用


