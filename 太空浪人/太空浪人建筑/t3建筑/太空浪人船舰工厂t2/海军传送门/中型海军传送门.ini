[action_黑火级重型巡洋舰]
convertTo: 黑火级重型巡洋舰
displayType: action
text: Телепортировать тяжёлый крейсер класса «Чёрный огонь»
description: -Тяжёлый крейсер класса «Чёрный огонь» по размерам и масштабу можно без преувеличения назвать линкором.\n-Хотя промышленная группа Коста заявляет, что нет такого бизнеса, которым они не занимались бы, «Чёрный огонь» — исключение.\n-Семья Коста никогда не продаёт «Чёрный огонь» наружу. Этот крейсер, поставляемый только внутри семьи, — самая надёжная гарантия морских прав семьи Коста.\n-Если вам выпадет честь быть гостем на планете Хидака II семьи Коста по делам, вы увидите море, плотно усеянное «Чёрными огнями»,\n-их огромные корпуса и огромные пушки безмолвно демонстрируют всем врагам мощь промышленности Коста.\n-После начала войны с Имперским Заревом семья Коста великодушно опубликовала чертежи «Чёрного огня».\n-Сегодня он остаётся ключом к противостоянию с Заревом.\n-Атакует землю и подводные цели, кинетический урон.
price: 12000,awz=240

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔3')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_帝王级战列舰]
convertTo: 帝王级战列舰
displayType: action
text: Телепортировать линкор класса «Император»
description: -Линкор класса «Император» — кристаллизация научно-технической мощи семьи Фаяд. Будь то его огромные размеры,\n-преувеличенное вооружение или палуба, заставленная самолётами — всё свидетельствует о положении и силе семьи Фаяд в галактике.\n-Когда разрабатывался линкор «Император», в галактике Сино почти не было ни одного корабля больше и величественнее.\n-Линкор «Император» был подарком семьи Фаяд императору в год основания Империи Нова,\n-к сожалению, после сравнения парящей крепости и «Императора» император обнаружил, что класс «Император» уступает парящей крепости,\n-и линкор «Император» был снят с производства. Оставшиеся линкоры «Император» после объединения Древних Людей не имели применения и пришли в упадок.\n-Только во время войны с Заревом Зарево и семья Фаяд осознали истинную мощь линкора «Император».\n-В битве за оборону галактики Эвенора линкор «Император», как бог войны, в одиночку справлялся с десятком противников.\n-Линкор «Император», пожалуй, самый страшный для Зарева и нежелательный надводный корабль.\n-Атакует землю и воздух, кинетический урон, ракеты и самолёты — энергетический урон.
price: 17000,awz=300

buildSpeed: 15s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='法雅德3')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


