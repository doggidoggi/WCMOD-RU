[action_路西法]
convertTo: 路西法水下
displayType: action
text: Телепортировать «Люцифер»
description: -В эпоху Воюющих государств Древних Людей «Люцифер» был многоцелевым штурмовиком, выпускавшимся промышленной группой Коста.\n-Его конструкция была разработана для отсталых стран без дополнительного бюджета на развитие флота.\n-«Люцифер» — это мощный штурмовик, оснащённый новаторской системой трансформации,\n-которая позволяет ему погружаться под воду для боя, до некоторой степени заменяя флот.\n-В то время «Люцифер» был одним из самых популярных вооружений в галактике; почти все страны, противостоявшие Альфриду, имели «Люциферов».\n-По сей день «Люцифер» служит в армии Скитальцев и внёс выдающийся вклад в борьбу с Заревом.\n-Атакует только землю, в воздухе — энергетический урон, в подводном режиме — кинетический урон.
price: 3800

buildSpeed: 4s
setBodyRotation: 0
ai_isHighPriority: true


