[action_剑鱼级护卫舰]
convertTo: 剑鱼级护卫舰
displayType: action
text: 传送剑鱼级护卫舰
description: -古人类战国时期阿瓦瑞里安王国的标准海军护卫舰，\n-作为一个爱好和平的国家，他们的军用设备并不先进，\n-剑鱼级护卫舰运用简单的技术，能最低限度的保护国家的海洋。\n-在诺瓦帝国统一古人类后，阿瓦瑞里安王国被迫上缴了所有军事装备，\n-其中就包括了大批剑鱼级护卫舰，在与余辉作战最危及的关头，\n-剑鱼被从仓库中取出并作为海洋上的最后一道防线与余辉作战，\n-直至今日，太空浪人依然在生产性价比极高的剑鱼级护卫舰，\n-他们构成了太空浪人海军的前锋力量。对地对空，动能伤害
price: 3500
buildSpeed: 4s
ai_isHighPriority: true
isVisible: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: 失去了传送场，无法使用


[action_刚多林级巡洋舰]
convertTo: 刚多林级巡洋舰
displayType: action
text: 传送刚多林级巡洋舰
description: -科斯塔工业集团在古人类战国时期推出的一款不伦不类的产品，\n-刚多林级巡洋舰配有十分新颖的水路两栖技术，以及舰载机甲板，\n-其售卖的对像就是那些同时想追求扩充海洋和地面力量的国家，科斯塔本想这种设计可以大赚一笔，\n-在大规模生产后，却发现其市场非常惨淡，只有少数国家愿意少数购买，\n-大量积压的刚多林在诺瓦帝国统一古人类后被皇帝收缴，之后便被遗忘在仓库中。\n-之后在与余辉战斗的危及时刻，大量的刚多林被意外发现，\n-他们在被简单改造后就被投入了与余辉的战斗中，并在各种战役中爆发出了不小的威力，\n-这款生不逢时的巡洋舰至今已然成为太空浪人的主力海军之一。对地对空，主炮动能，副炮飞机能源，水陆两栖
price: 6000,awz=120

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: 失去了传送场，无法使用


[action_漂泊者]
convertTo: 漂泊者
displayType: action
text: 传送漂泊者
description: -以天火炮艇为基础改造的便携式虫洞载具，\n-漂泊者搭载了一个小型多向聚变堆和传送立场发生器，\n-漂泊者的存在极大的解决了固定式传送基站和聚变堆的局限性，\n-无数的传送基站和漂泊者组成了贯通全球的折越网络，\n-太空浪人的部队也正因如此能快速向全球任何一个角落发起出其不意的突袭，\n-漂泊者虽然没有任何自卫能力，但每一艘漂泊者的出现，\n-都意味着其身后必定有一只即将出现的太空浪人军团。\n-部署后可以供能，可以提供传送网络，不能攻击。
price: 4000

buildSpeed: 4s
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: 失去了传送场，无法使用


