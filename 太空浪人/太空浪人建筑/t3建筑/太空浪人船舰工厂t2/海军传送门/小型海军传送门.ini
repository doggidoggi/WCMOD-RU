[action_剑鱼级护卫舰]
convertTo: 剑鱼级护卫舰
displayType: action
text: Телепортировать фрегат класса «Меч-рыба»
description: -Стандартный военно-морской фрегат Королевства Аваририан эпохи Воюющих государств Древних Людей.\n-Будучи миролюбивой страной, их военное оборудование не отличалось передовыми технологиями,\n-фрегат класса «Меч-рыба» использует простые технологии, обеспечивая минимальную защиту морских вод страны.\n-После объединения Древних Людей Империей Нова Королевство Аваририан было вынуждено сдать всё военное оборудование,\n-включая множество фрегатов класса «Меч-рыба». В критический момент войны с Заревом\n-«Меч-рыбы» были извлечены со складов и стали последней морской линией обороны против Зарева.\n-По сей день Скитальцы продолжают производить чрезвычайно эффективный по соотношению цены и качества фрегат класса «Меч-рыба»,\n-они составляют авангард флота Скитальцев. Атакует землю и воздух, кинетический урон.
price: 3500
buildSpeed: 4s
ai_isHighPriority: true
isVisible: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_刚多林级巡洋舰]
convertTo: 刚多林级巡洋舰
displayType: action
text: Телепортировать крейсер класса «Гондолин»
description: -Странный продукт промышленной группы Коста эпохи Воюющих государств Древних Людей.\n-Крейсер класса «Гондолин» оснащён весьма новаторской амфибийной технологией и палубой для мехов.\n-Он продавался странам, которые хотели одновременно развивать морские и наземные силы. Коста рассчитывала хорошо заработать на такой конструкции,\n-но после массового производства выяснилось, что рынок очень слаб — лишь немногие страны покупали небольшие партии.\n-Огромные запасы «Гондолина» после объединения Древних Людей Империей Нова были конфискованы императором и забыты на складах.\n-Затем в критический момент войны с Заревом большое количество «Гондолинов» было случайно обнаружено.\n-После небольшой переделки их бросили в бой против Зарева, и в различных сражениях они проявили немалую мощь.\n-Этот появившийся не в своё время крейсер ныне стал одной из основных сил флота Скитальцев. Атакует землю и воздух, главное орудие — кинетический, вторичные/самолёты — энергетический. Амфибия.
price: 6000,awz=120

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_漂泊者]
convertTo: 漂泊者
displayType: action
text: Телепортировать «Странник»
description: -Портативный кротонорный носитель, переоборудованный на базе канонерки «Небесный огонь».\n-«Странник» оснащён компактным многонаправленным термоядерным реактором и генератором поля телепортации.\n-Существование «Странника» значительно решает ограничения стационарных телепорт-станций и реакторов.\n-Бесчисленные телепорт-станции и «Странники» образуют глобальную сеть прыжков,\n-благодаря чему войска Скитальцев могут быстро наносить внезапные удары в любую точку мира.\n-Хотя «Странник» не имеет средств самообороны, появление каждого «Странника»\n-означает, что за ним непременно идёт армия Скитальцев.\n-После развёртывания может обеспечивать питание и сеть телепорта. Не может атаковать.
price: 4000

buildSpeed: 4s
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


