


[core]
name: 小型海军传送门
displayText: Малый морской портал
class: CustomUnitMetadata
displayDescription: -Малый портал может телепортировать фрегат класса «Меч-рыба», крейсер класса «Гондолин», эсминец класса «Бездна»,\n-«Люцифер» и «Странник». Каждый портал может телепортировать только одного юнита.\n-Любой телепортируемый юнит прибудет на поле боя в течение четырёх секунд.\n-Каждый портал поддерживается только 30 секунд, поспешите решить, кого телепортировать,\n-иначе портал закроется, не телепортировав никого. Порталы можно создавать только в поле телепортации.
