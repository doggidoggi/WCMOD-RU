[action_轨道空爆]
text: Орбитальный воздушный удар
allowMultipleInQueue: false
description: -Направить близлежащую противокорабельную орбитальную пушку для обстрела целевой зоны.\n-Снаряды, изготовленные из закалённого кобальта, разгоняются до субсветовой скорости,\n-затем над целью рассыпаются множеством осколков, нанося разрушительный удар по плотным группам вражеских юнитов.\n-После запуска в целевую зону будут отправлены 3 кассетных снаряда, наносящих большой кинетический урон наземным юнитам противника.\n-Орбитальный воздушный удар считается стратегическим оружием, наносит повышенный урон не сверхтяжёлым юнитам и пробивает укрытия.
iconImage: 空爆.png
onlyOneUnitAtATime: true
price: energy=6
fireTurretXAtGround: 轨道空爆
isVisible: true
highPriorityQueue: true
isLocked: if self.noUnitInTeam(withTag='聚变堆', withinRange=400) or self.resource.awz<0 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isLockedMessage: Это здание потеряло питание либо недостаточно тёмной материи
buildSpeed: 0s


[action_轨道垃圾雨]
text: Вызвать орбитальный дождь мусора
allowMultipleInQueue: false
description: -Активирует генератор поля гиперкуба, начинает притягивать космический мусор с низкой околоземной орбиты\n-и направляет его в целевое место, поражая врагов мощными ударами.\n-С повышением уровня вируса «Серая Тень» мощь орбитального дождя мусора возрастает.\n-Кинетический урон, тактическое оружие.
iconImage: 轨道垃圾雨.png
onlyOneUnitAtATime: true
buildSpeed: 0s
price: energy=8
fireTurretXAtGround: 轨道垃圾雨
isVisible: true
highPriorityQueue: true
isLocked: if self.noUnitInTeam(withTag='聚变堆', withinRange=400) or self.resource.awz<0 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)

isLockedMessage: Это здание потеряло питание либо недостаточно тёмной материи


[action_灰影病毒催化剂]
text: Запустить катализатор вируса «Серая Тень»
allowMultipleInQueue: false
description: -Направить боеголовку с катализатором вируса «Серая Тень», вводя вирус в режим ярости рядом с целью.\n-В режиме ярости вирус «Серая Тень» безудержно поглощает приближающихся врагов,\n-либо, объединяя силы, своими крошечными телами с невероятной скоростью ремонтирует свои юниты.\n-Наносит длительный бронебойный кинетический урон вражеским юнитам в радиусе 320, не действует на здания.\n-Быстро восстанавливает свои юниты в радиусе 320, включая здания.\n-Не может быть перехвачено. Пробивает укрытия.
iconImage: 狂暴灰影.png
onlyOneUnitAtATime: true
buildSpeed: 0s
price: energy=2.5
fireTurretXAtGround: 狂暴灰影
isVisible: true
isLocked: if self.noUnitInTeam(withTag='聚变堆', withinRange=400) or self.resource.awz<0 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isLockedMessage: Это здание потеряло питание либо недостаточно тёмной материи

highPriorityQueue: true


[action_模拟黑洞]
text: Запустить симулированную чёрную дыру
allowMultipleInQueue: false
description: -Используя поразительную энергию, накопленную ранее гиперкубом из тёмной материи,\n-контролирует кривизну пространства в определённой области, искажая его\n-и создавая из ничего огромную гравитацию, сравнимую с маломассивной чёрной дырой, разрывающую всё вокруг.\n-Нейтральный урон. Пробивает укрытия.
iconImage: 狙.png
onlyOneUnitAtATime: true
buildSpeed: 0s
isVisible: if self.globalTeamTags(includes='帝国科技解析2')
price: energy=12,ammo=1
fireTurretXAtGround: 模拟黑洞
highPriorityQueue: true
showMessageToAllPlayers: 警告，侦测到巨大空间曲率波动。

isLocked: if self.resource.awz<1200 or self.noUnitInTeam(withTag='聚变堆', withinRange=400) or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isLockedMessage: Недостаточно тёмной материи либо это здание потеряло питание


[action_模拟黑洞制造]
price: 10000
text: Создать симулированную чёрную дыру
description: -Используя огромное количество тёмной материи, концентрирует в гиперкубе колоссальную энергию.\n-Как только всё готово, можно запустить абсолютное оружие Скитальцев —\n-симулированную чёрную дыру. Импульс энергии, вызванный концентрацией тёмной материи, невозможно скрыть,\n-после завершения концентрации все игроки будут предупреждены, имейте это в виду.\n-Во время концентрации энергии всегда держите доступную тёмную материю не ниже 1200.\n-После создания, чтобы запустить симулированную чёрную дыру, гиперкуб должен быть полностью заряжен, иметь достаточно тёмной материи и питания.
displayType: NONE
buildSpeed: 50s

isVisible: if self.globalTeamTags(includes='帝国科技解析2') and self.ammo(lessThan=1)
pos: 0.2
isActive: if self.ammoIncludingQueued(lessThan=1)
addResources: ammo=1
iconImage: 模拟黑洞.png

showMessageToAllPlayers: 检测到巨大能量脉冲
isLocked: if self.resource.awz<1200 or self.noUnitInTeam(withTag='聚变堆', withinRange=400) or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isLockedMessage: Тёмной материи меньше 1200 либо это здание потеряло питание


