


[core]
name: 大型陆军传送门
class: CustomUnitMetadata
displayDescription: -大型传送门可以传送阿玛洛克MKII，\n-每个传送门仅能传送一个单位。\n-被传送的任何单位将在四秒之内到达战场。\n-每个传送门仅能维持30秒，请尽快决定要传送的单位，\n-否则传送门将在未传送任何单位的情况下关闭。且只能在传送场内产生传送门。
