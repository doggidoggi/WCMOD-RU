[action_阿玛洛克MKII]
convertTo: 阿玛洛克MKII
displayType: action
text: Телепортировать «Амарок MKII»
description: -«Амарок» — самое мощное доказательство наземной гегемонии Империи Нова. Эта боевая крепость в своё время была почти непобедима на земле.\n-Парящая крепость и «Амарок» соответственно были величайшими защитниками морей и суши Империи и охраняли её до наших дней.\n-Их мощная боевая способность вызывала зависть всех великих домов. После раскола Империи\n-«Амароки» по всей Империи были захвачены семьёй Фаяд и переоборудованы в модель MKII как мобильные крепости, развёрнутые в различных галактиках.\n-Под волнами атак Зарева «Амарок» всегда оставался непобедимым тузом наземных сил Скитальцев.\n-Эта мобильная крепость по сей день остаётся одним из самых страшных супер-юнитов для Зарева.\n-Атакует только землю, кинетический урон, ракеты — энергетический урон, палубные самолёты — энергетический урон. Иммунитет к шоку.
price: 12000,awz=300

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='帝国科技解析2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
