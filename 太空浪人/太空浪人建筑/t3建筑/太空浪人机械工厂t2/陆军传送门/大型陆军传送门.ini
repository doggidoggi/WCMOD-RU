


[core]
name: 大型陆军传送门
displayText: Большой наземный портал
class: CustomUnitMetadata
displayDescription: -Большой портал может телепортировать «Амарок MKII».\n-Каждый портал может телепортировать только одного юнита.\n-Любой телепортируемый юнит прибудет на поле боя в течение четырёх секунд.\n-Каждый портал поддерживается только 30 секунд, поспешите решить, кого телепортировать,\n-иначе портал закроется, не телепортировав никого. Порталы можно создавать только в поле телепортации.
