[action_阿玛洛克MKII]
convertTo: 阿玛洛克MKII
displayType: action
text: 传送阿玛洛克MKII
description: -阿玛洛克是诺瓦帝国地面霸权最强有力的证明，这种战斗要塞曾经在地面上几乎无人能挡，\n-浮岛要塞和阿玛洛克分别作为帝国海洋和陆地最强大的捍卫者守护帝国直至今日，\n-他们强悍的战斗力同时也令各大家族所垂涎三尺，帝国分裂后，\n-帝国各地的阿玛洛克被法雅德家族抢占，并被改造成MKII型当做移动要塞部署于各大星系，\n-在余辉一轮又一轮的攻势下，阿玛洛克始终作为太空浪人地面上不败王牌而屹立不倒，\n-这种移动要塞至今仍是令余辉最忌惮的超级单位之一。\n-只能对地，动能伤害，导弹能源伤害，舰载机能源伤害，休克免疫。
price: 12000,awz=300

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='帝国科技解析2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: 失去了传送场，无法使用


