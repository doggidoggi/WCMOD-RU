[action_冥卫机甲]
convertTo: 冥卫机甲
displayType: action
text: Телепортировать мех «Страж бездны»
description: -冥卫是一种具备尖端技术，\n-有独特优势且极其致命的主战机甲，\n-这种强悍的机甲足以证明太空浪人的\n-新兴技术丝毫不落后于帝国科技，\n-在远距离上，哪怕是面对帝国余辉的各种钢铁怪兽，\n-冥卫机甲依旧能胜券在握。\n-这种代表太空浪人尖端技术的主战机甲，\n-因为极其困难的制造难度，\n-使得他很难在太空浪人的军队中发现其踪影，\n-只有最精锐的机师才有权驾驶冥卫机甲，\n-虽然造价高昂，但是冥卫机甲依旧强力的打\n-击了余辉地面部队嚣张的气焰。\n-只能对地，动能伤害。
price: 5500,awz=100

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='法雅德2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_惩罚者]
convertTo: 惩罚者
displayType: action
text: Телепортировать «Каратель»
description: -在余辉天基武器和太空舰队的威胁下，在地面建立机场几乎是不可能的事情，\n-为了满足战机维护的需要，太空浪人不得不制造了惩罚者。\n-惩罚者由诺瓦帝国的军用重型运输机械改装而成，他们之前常常用作运输战舰材料。\n-太空浪人在拆除了其货仓后，为其拼接了两层飞行甲板和一门主炮。\n-虽然前身为运输机械，但是在太空浪人的彻底改造后，\n-惩罚者已经脱胎换骨变成了一台残暴的战争机器，其搭载了大量鹰爪战机，\n-可以从远处掌握制空权并彻底摧毁敌人，即使陷入近距离作战，\n-惩罚者依旧可以凭借其强大的主炮和重型装甲稳立于不败之地。\n-对地，对空。主炮动能伤害，副炮能源伤害。（飞机能源）
price: 8500,awz=180

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔3')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_狮鹫机甲]
convertTo: 狮鹫机甲
displayType: action
text: Телепортировать мех «Грифон»
description: -臭名昭著的狮鹫机甲曾流行于在古人类战国那个混乱和秩序并存的时期，\n-狮鹫机甲作为科斯塔工业集团最畅销的军火之一，受到无数雇佣兵的青睐，\n-恐怖分子更是凭借着狮鹫机甲到处制造血腥，无数的战斗都充分证明了狮鹫的实力。\n-可惜的是，亚尔佛里德和诺瓦帝国都从未采购过这种低端军火，在帝国建立后这款机甲被历史所埋没。\n-直到诺瓦帝国末期，穷途末路的古人类在科斯塔工业集团残部的帮助下，\n-从新复产了狮鹫机甲用于对抗余辉。如今强悍的狮鹫机甲依然活跃在对抗余辉的一线部队。\n-对地对空，能源伤害。
price: 7400,awz=150

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_黑曜石]
convertTo: 黑曜石
displayType: action
text: Телепортировать «Обсидиан»
description: -在诺瓦帝国时期，黑曜石本是高科技工厂里的重型工业机器人，\n-他们平时的任务就是搬运重物，以及其他重型作业。\n-在诺瓦帝国末期，当余辉攻陷维基兰特III星时，\n-绝望中的人们用工厂中的纳米材料，为黑曜石锻造了大量单分子巨斧，\n-他们将军事化控制软件复盖了黑曜石机甲的原有系统，并改造了动力原件，\n-使其变成了一种军事化改造的民用机械人，这往往是古人类与余辉作战的最后手段。\n-他们驾驶着黑曜石埋伏在隐蔽的洞穴或者废墟中，等到余辉陷入自己的埋伏时，\n-在角落里静候的黑曜石便会一拥而上，用手中的单分子巨斧将余辉砍成废铁。\n-据统计，黑曜石挥舞巨斧产生的冲击力足以击碎绝大部分轻型护盾，\n-并如同砍瓜切菜一般将余辉的超合金护甲劈成两半，\n-只能对地。中性伤害。
price: 6000

buildSpeed: 4s
isVisible: if self.globalTeamTags(includes='法雅德1')
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно

