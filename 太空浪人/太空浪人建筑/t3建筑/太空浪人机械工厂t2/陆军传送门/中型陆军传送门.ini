[action_冥卫机甲]
convertTo: 冥卫机甲
displayType: action
text: Телепортировать мех «Страж бездны»
description: -«Страж бездны» — это передовой,\n-уникальный и крайне смертоносный основной боевой мех.\n-Этот мощный мех является доказательством того, что\n-новые технологии Скитальцев не отстают от имперских.\n-На больших расстояниях, даже сталкиваясь с различными железными монстрами Имперского Зарева,\n-«Страж бездны» способен одержать верх.\n-Этот мех, олицетворяющий передовые технологии Скитальцев,\n-из-за крайней сложности изготовления\n-редко встречается в армии Скитальцев,\n-управлять им имеют право только лучшие из лучших пилотов.\n-Несмотря на высокую стоимость, «Страж бездны» по-прежнему мощно\n-сбивает спесь с дерзких наземных войск Зарева.\n-Атакует только землю, кинетический урон.
price: 5500,awz=100

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='法雅德2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
