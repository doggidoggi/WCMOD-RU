[action_惩罚者]
convertTo: 惩罚者
displayType: action
text: Телепортировать «Каратель»
description: -Под угрозой орбитального оружия и космического флота Зарева создавать аэродромы на поверхности почти невозможно.\n-Чтобы обеспечить обслуживание истребителей, Скитальцы вынуждены были создать «Карателя».\n-«Каратель» переоборудован из тяжёлого военно-транспортного механизма Империи Нова, который ранее использовался для перевозки материалов для кораблей.\n-Скитальцы убрали грузовой отсек и установили двухпалубную лётную палубу и главное орудие.\n-Хотя изначально это был транспортный механизм, после полной переделки Скитальцами\n-«Каратель» переродился в жестокую боевую машину. Он несёт множество истребителей «Коготь орла»,\n-может с большого расстояния захватить господство в воздухе и полностью уничтожить врага. Даже в ближнем бою\n-«Каратель» благодаря мощному главному орудию и тяжёлой броне остаётся непобедимым.\n-Атакует землю и воздух. Главное орудие — кинетический урон, вторичные — энергетический. (Самолёты — энергетический.)
price: 8500,awz=180

buildSpeed: 4s
ai_isHighPriority: true
