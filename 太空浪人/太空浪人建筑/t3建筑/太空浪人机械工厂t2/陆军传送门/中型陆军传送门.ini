[action_狮鹫机甲]
convertTo: 狮鹫机甲
displayType: action
text: Телепортировать мех «Грифон»
description: -Печально известный мех «Грифон» был популярен в эпоху Воюющих государств Древних Людей — времени хаоса и порядка.\n-Будучи одним из самых продаваемых вооружений промышленной группы Коста, мех «Грифон» пользовался спросом у бесчисленных наёмников,\n-террористы с помощью «Грифонов» устраивали кровавые бойни. Множество боёв доказали мощь «Грифона».\n-К сожалению, ни Альфрид, ни Империя Нова никогда не закупали это дешёвое оружие. После основания Империи этот мех был забыт историей.\n-И только в конце Империи Нова отчаявшиеся Древние Люди при помощи остатков промышленной группы Коста\n-возобновили производство меха «Грифон» для борьбы с Заревом. Сегодня мощный мех «Грифон» по-прежнему активно действует в передовых частях против Зарева.\n-Атакует землю и воздух, энергетический урон.
price: 7400,awz=150

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='科斯塔2')
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_黑曜石]
convertTo: 黑曜石
displayType: action
text: Телепортировать «Обсидиан»
description: -Во времена Империи Нова «Обсидиан» был тяжёлым промышленным роботом на высокотехнологичных заводах,\n-их обычной задачей была перевозка тяжестей и другая тяжёлая работа.\n-В конце Империи Нова, когда Зарево захватило планету Викилант III,\n-в отчаянии люди выковали из заводских наноматериалов огромные мономолекулярные топоры для «Обсидианов».\n-Они переписали оригинальную систему меха «Обсидиан» военизированным управляющим ПО и переделали силовую установку,\n-превратив его в военизированный гражданский робот. Это часто было последним средством Древних Людей в борьбе с Заревом.\n-Они на «Обсидианах» устраивали засады в скрытых пещерах и руинах. Когда Зарево попадало в засаду,\n-«Обсидианы», тихо ждавшие в углу, разом нападали и мономолекулярными топорами рубили войска Зарева в металлолом.\n-По статистике, удар топора «Обсидиана» способен разбить большинство лёгких щитов\n-и разрубить суперсплавную броню Зарева пополам, как ножом по тыкве.\n-Атакует только землю. Нейтральный урон.
price: 6000

