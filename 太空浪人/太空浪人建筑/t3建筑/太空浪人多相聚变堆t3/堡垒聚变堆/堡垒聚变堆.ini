


[core]
name: 堡垒聚变堆
class: CustomUnitMetadata
displayDescription:  堡垒聚变堆改用强固型超合金浇筑，拥有惊人的抗打击能力，\n-并且内置一套瓦普驱动炮系统，使其更难被摧毁。\n-对地对空，能源伤害。


price: 5000
maxHp: 20000

footprint: -1,-1,1,1
constructionFootprint: -1,-1,1,1
techLevel: 1
copyFrom: ROOT:/通用特效/单位防护.ini
buildSpeed: 3s

isBio: false
#showInEditor:false
isBuilding: true
selfRegenRate: 0.12
radius: 20

effectOnDeath: CUSTOM:冲击波, CUSTOM:爆炸,CUSTOM:闪光z
tags: 聚变堆,d,地面,灰影建筑,建筑
armour: 30
buildingToFootprintOffsetY: -5


[action_T1]
pos: 0
buildSpeed: 0s
addResources: setFlag=0,setFlag=1
isVisible: if not self.hasFlag(id=1) and not self.hasFlag(id=0)
text: 显示供能范围

displayType: upgrade


[action_T1_back]
pos: 0
buildSpeed: 0s
addResources: unsetFlag=0,unsetFlag=1
isVisible: if self.hasFlag(id=1)
text: 不显示供能范围

displayType: upgrade


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


