# 这个炮塔最好主体的最大范围多200
disablePassiveTargeting: true
isFixedFiring: true
turretSize: 24
turretTurnSpeed: 2

shootDelay: 0.9
aimOffsetSpread: 0


[turret_2]
x: 0
y: 10
attachedTo: 1
slave: true
shoot_flame: CUSTOM:烟雾*2,CUSTOM:粒子*3

shoot_light: #FFFF1200
shoot_sound: ROOT:/太空浪人/单位特效/音效.ogg
shoot_sound_vol: 0.7
delay: 10
projectile: 1

canAttackCondition: if not parent.tags(includes= '↯') and self.hasUnitInTeam(withTag= '聚变堆', withinRange= 400)
size: 39
invisible: true


[turret_1]
x: 0
y: 0
canShoot: false
invisible: true
canAttackCondition: if not parent.tags(includes= '↯') and self.hasUnitInTeam(withTag= '聚变堆', withinRange= 400)


