[action_光翼战斗机]
convertTo: 光翼战斗机
displayType: action
text: Телепортировать истребитель «Световое крыло»
description: -光翼曾是亚尔佛里德标准战斗机，参与过所有亚尔佛里德的战争，\n-光翼战机凭借其先进的武器和新颖的可变翼，在诺瓦帝国之前是最先进的战机。\n-不过，因为和诺瓦帝国战斗的失利导致光翼战机被大量摧毁，帝国建国后，\n-光翼更是被全新的猎杀者战机击败，最终惨遭遗弃。\n-在之后与余辉艰苦卓绝的战斗中，伯亚斯家族为太空浪人再次复刻了这款战机。\n-至今仍是太空浪人空军中主力战机，值得一提的是，创世纪血翼战机是在他的基础上改造的。\n-对地对空。对空模式动能，对地模式能源
price: 2000

buildSpeed: 4s
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_胡蜂无人机]
convertTo: 胡蜂无人机
displayType: action
text: Телепортировать дрон «Шершень»
description: -胡蜂无人机经常被太空浪人内部人员戏称为“长了翅膀的鱼雷”，\n-相比于普通的鱼雷来说，胡蜂无人机航程更远，威力更强，\n-其内置高度浓缩的等离子体，能在最高强度的装甲上钻出一个大洞，\n-运用偷袭战术时胡蜂无人机总是能予以敌人重创。\n-对地对空，自杀式袭击，能源伤害。
price: 800

buildSpeed: 4s
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_萤火轰炸机]
convertTo: 萤火轰炸机
displayType: action
text: Телепортировать бомбардировщик «Светлячок»
description: -萤火轰炸机是太空浪人在极为艰苦的条件下诞生的，\n-其技术简单到创世纪都可以嘲笑，其更是采用原始的手段进行攻击。\n-在太空浪人撤离希诺星系的最后时刻，舰队已经几乎损失殆尽，\n-面对浩浩荡荡的帝国皇家舰队，萤火轰炸机成为了为数不多的反舰武器之一，\n-他们会对目标投掷下密密麻麻的无导等离子炸弹，而炸弹唯一的动力却只有惯性，\n-因为这种方法实在是效率过于底下，现如今萤火轰炸机通常执行对地轰炸任务，\n-并取得了丰硕的战果。\n-只能对地，反潜，能源伤害。
price: 1750

buildSpeed: 4s
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_蝮蛇战斗机]
convertTo: 蝮蛇战斗机
displayType: action
text: Телепортировать истребитель «Гадюка»
description: -蝮蛇战斗机是法雅德家族专为与帝国余辉争夺制空权所研发的战斗机，\n-为了能应对余辉庞大且先进的战机连队，蝮蛇战机的一切都是按最高标准来设计的，\n-以便有效击落余辉的战机乃至战舰。\n-在一对一的较量中，没有任何一架余辉的战斗机是蝮蛇的对手，\n-哪怕是面对护卫舰都能有一战之力。但是当时太空浪人持有的工业体系早已支离破碎，\n-不巧的是，蝮蛇对制造工艺要求非常挑剔，最终只能少量制造部署于空间站等关键设施内。\n-蝮蛇战机至今仍是太空浪人最具威力的战斗机，同样也没有任何余辉战机是他的对手。\n-只能对空，主炮能源，机炮动能
price: 4500,awz=45

buildSpeed: 4s
isVisible: if self.globalTeamTags(includes='法雅德1')
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно


[action_路西法]
displayType: action
text: Телепортировать «Люцифер»
description: -古人类战国时期，路西法是科斯塔工业集团推出的一款多用途攻击机，\n-其设计是基于那些没有额外经费支出给海军发展的落后国家。\n-路西法在作为一款强力的攻击机的同时，还配有新颖的变形系统，\n-使其可以变形潜入水下作战，在一定程度上可以当做海军使用，\n-在当时，路西法是星系间最抢手的军火之一，几乎所有反对亚尔佛里德的国家都拥有路西法。\n-直至今日，路西法依旧在太空浪人的军队中服役，并为打击余辉做出了卓越贡献。\n-只能对地，空中能源伤害，水下模式动能伤害
price: 2900
buildSpeed: 4s

setBodyRotation: 0
ai_isHighPriority: true
isLocked: if not numberOfUnitsInTeam(withTag='核', greaterThan=0,withinRange=300)
isLockedMessage: Поле телепортации потеряно, использование невозможно
convertTo: 路西法


