


[core]
name: 小型空军传送门
displayText: Малый воздушный портал
class: CustomUnitMetadata
displayDescription: -小型传送门可以传送胡蜂无人机，光翼战斗机，蝮蛇战斗机，萤火轰炸机\n-以及路西法，每个传送门仅能传送一个单位。\n-被传送的任何单位将在四秒之内到达战场。\n-每个传送门仅能维持30秒，请尽快决定要传送的单位，\n-否则传送门将在未传送任何单位的情况下关闭。且只能在传送场内产生传送门。
radius: 17
showActionsWithMixedSelectionIfOtherUnitsHaveTag: csm

price: cs=15
maxHp: 1500
techLevel: 1
buildSpeed: 0.1s
isBio: false

isBuilding: true
