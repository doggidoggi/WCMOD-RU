[action_恶灵攻击机]
convertTo: 恶灵攻击机
displayType: action
text: Телепортировать штурмовик «Злой дух»
description: -В ранний период Империи Нова «Злой дух» был тяжёлым штурмовиком, специально созданным императором для Королевской гвардии.\n-Его размеры почти достигают предела, который может вынести лётная палуба корабля.\n-Размер «Злого духа» приближается к стандартному фрегату, и поэтому он обладает непревзойдённой грузоподъёмностью и тяжёлой огневой мощью.\n-По сравнению с уязвимыми палубными десантными капсулами, штурмовик «Злой дух» способен пройти даже сквозь самые плотные сети ПВО для доставки юнитов,\n-одновременно эффективно очищая зону высадки и обеспечивая мощную огневую поддержку десанту.\n-Единственный чертёж штурмовика «Злой дух» был обнаружен Скитальцами в обломках космической станции Таутени-4. Хотя у Зарева их тоже много,\n-«Злые духи» Зарева из-за отсутствия чертежей не могут обслуживаться и давно вышли из строя.\n-После уникальной модификации Скитальцами штурмовик «Злой дух» по сей день служит основным штурмовым транспортным самолётом.\n-Атакует землю и воздух, пулемёты — кинетический урон, остальное — энергетический.
price: 5600,awz=90

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='法雅德2')


[action_光轮级护卫舰]
convertTo: 光轮级护卫舰
displayType: action
text: Телепортировать фрегат класса «Световой нимб»
description: -不同于帝国泛用型凤凰级护卫舰，光轮级护卫舰只配发给皇家禁卫军，\n-其先进的作战效能令人叹为观止，哪怕是无视舰船规模的越级交战，\n-光轮级护卫舰依旧能在战斗中丝毫不落下风，如此强悍的战舰让法雅德家族垂涎已久。\n-但诺瓦帝国严格甚至严苛的军火禁令，使得法雅德家族只能在暗中进行仿制。\n-帝国分裂后，光轮护卫舰的图纸随着淘特尼一同灰飞烟灭，\n-而余辉手中仅存的光轮也在交战中全部损毁，如今如若想再次目睹光轮当年的强悍，\n-太空浪人仿制的光轮护卫舰那数量巨大的歼敌日志会告诉你他当年的勇猛。\n-对地对空，能源伤害。警告，在没有科技的情况下，这个单位会给你带来-6收入。
price: 6000

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='帝国科技解析2')


[action_仲裁者级航空母舰]
convertTo: 仲裁者级航空母舰
displayType: action
text: Телепортировать корабль класса «Арбитр»
description: -仲裁者级是太空浪人舰队的主要构成部分，使用仲裁者是因为无奈而不是他有多优秀。\n-帝国分裂后，皇帝没有给人类留下任何军事工业以及任何武器，\n-因此在面对余辉强大的皇家舰队时，太空浪人不得不将手里的民用船军事化改造来充数，\n-将帝国的命运级勘探船移除货仓，并加装粒子炮和飞行甲板后，\n-就可以勉强当成一种小型航母来使用，虽然这种武器谈不上有多强大。\n-甚至连有效性都难以保证，但如果大量出动还是能在战场发挥出不可小觑的力量。\n-对地对空，能源伤害。\n-警告，在未有科技的情况下，这个单位将给你带来-9收入
price: 7000,awz=75

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='帝国科技解析2')


[action_耀斑级重型驱逐舰]
convertTo: 耀斑级重型驱逐舰
displayType: action
text: Телепортировать тяжёлый эсминец класса «Вспышка»
description: -耀斑级重型驱逐舰的原型来自亚尔佛里德共和国的超级战舰，伯亚斯级无畏舰。\n-伯亚斯级无畏舰虽然在当时无人能敌，但其极低的产量和惊人的维护需求，\n-使得亚尔佛里德的科学家们不得不研发另一款战舰来充当主力舰。\n-在伯亚斯级的基础上改造后就诞生了耀斑级，或者不如说耀斑级就是伯亚斯级的缩比版。\n-耀斑级继承了伯亚斯的绝大部分优点，同时又拥有极高的可靠性而名声大噪。\n-之后又用自身强大的实力击败了一系列竞争对手，稳坐共和国主力舰的宝座。\n-帝国分裂后，伯亚斯家族的残党试图重新复活他们那早已荒废的王座——伯亚斯级来对抗余辉。\n-但受限于当时艰苦的条件，于是耀斑级得以重见天日，\n-耀斑级至今仍是太空浪人手中为数不多的具有远程狙击能力的战舰。\n-常规模式下只对空，能源伤害，主炮模式下动能伤害，对地对空，这个单位会给你带来-18收入。
price: 12000,awz=250

buildSpeed: 4s
#isVisible: if self.globalTeamTags(includes='法雅德1')
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='帝国科技解析2')


[action_安卡拉刚级巡洋舰]
convertTo: 安卡拉刚级巡洋舰
displayType: action
text: Телепортировать крейсер класса «Анкараган»
description: -安卡拉刚级是古人类太空战舰的典范之作，他几乎见证了整个古人类太空战斗史。\n-安卡拉刚早在古人类第二次大航海中期就已经服役于布恩芬德尔共和国舰队中，并一直被各大势力沿用至今。\n-在那个护盾和粒子武器还未诞生的时代，安卡拉刚是太空中绝对力量的象征，\n-更是布恩芬德尔霸权狂傲的空中王座。虽然在今天安卡拉刚已经十分落后。\n-但由于技术十分简单粗暴，为了能抵御余辉的入侵，太空浪人重新为安卡拉刚加装了粒子武器，\n-并更换了更为先进的反应堆和重置了整个舰体电网，在太空浪人的改造下，安卡拉刚迎来了重生，\n-如今，安卡拉刚级依旧服役于太空浪人舰队中，并续写着布恩芬德尔当年的荣耀与力量。\n-对地对空，多联炮动能伤害，其他能源。警告，在没有科技的情况下，这个单位会给你带来-21收入。
price: 16000,awz=300

buildSpeed: 4s
ai_isHighPriority: true
isVisible: if self.globalTeamTags(includes='帝国科技解析2')


