text: Подпространственный призрак 1
displayType: upgrade
buildSpeed: 30s
isVisible: if not self.globalTeamTags(includes='亚空间')

addGlobalTeamTags: 亚空间1,亚空间
addResources: energy=1
description: -Маленькие подпространственные двигатели позволяют юнитам прыгать в зеркальную вселенную, которую Древние Люди называют «подпространство».\n-Подпространство не только полностью зеркально связано с текущей вселенной,\n-но и в нём скорость времени и предел скорости света на порядки выше, чем в нашей,\n-что обеспечивает быстрое развёртывание и перемещение юнитов.\n-Указанные юниты получат навык «Войти в подпространство»,\n-после перезарядки навыка можно его активировать, юнит значительно повышает скорость передвижения,\n-все враги не могут его атаковать,\n-но во время активации юнит не может атаковать никого, пока навык не закончится и юнит не вернётся.\n-Доступные юниты: тяжёлый крейсер класса «Чёрный огонь», мех «Обсидиан», истребитель «Гадюка».
showMessageToPlayer: Подпространственный призрак 1 — исследование завершено
