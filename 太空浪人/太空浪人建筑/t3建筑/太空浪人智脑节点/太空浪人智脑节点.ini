text: Фазовая распадная пушка 1
displayType: upgrade
buildSpeed: 30s
isVisible: if not self.globalTeamTags(includes='衰解')

addGlobalTeamTags: 衰解1,衰解
addResources: energy=1
description: -Передовое оружие Скитальцев, основанное на принципе тёмной материи,\n-использующее закон энтропии для полного разрушения целей противника на атомном уровне.\n-Атакованный юнит каждый раз получает дебафф-ресурсы, чем больше дебафф-ресурсов,\n-тем сильнее наносимый дебафф.\n-Когда вражеский юнит не подвергается атакам распадного оружия, дебафф-ресурсы постепенно уменьшаются.\n-Урон становится энергетическим, но дебафф наносит прямой неснижаемый урон.\n-Доступные юниты: мех «Краб-скрипач», канонерка «Небесный огонь».
showMessageToPlayer: Фазовая распадная пушка 1 — исследование завершено
ai_isHighPriority: true

isLocked: if self.noUnitInTeam(withTag= '聚变堆', withinRange= 400)
isLockedMessage: Нет питания
