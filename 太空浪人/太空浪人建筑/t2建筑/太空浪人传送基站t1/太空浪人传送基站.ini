isLocked: if self.noUnitInTeam(withTag= '聚变堆', withinRange= 400)
isLockedMessage: Питание потеряно


[action_2]
fireTurretXAtGround: 1
fireTurretXAtGround_withProjectile: 1
isVisible: false


[turret_1]
