displayType: action
text: 部署中性粒子炮
description: 中性粒子炮是成熟的粒子武器，\n-中性粒子炮发射的粒子束不会因为距离而自行溃散。\n-这款武器早在古人类二次大航海时代就已经得到战火的洗礼，\n-致命，精准，实用，迅捷，\n-我们愿称之为经典。\n-对地对空，动能伤害。
price: 1500
buildSpeed: 10s
isLocked: if self.noUnitInTeam(withTag= '太空浪人枢纽t2') or self.noUnitInTeam(withTag= '聚变堆', withinRange= 400)or self.queueSize(greaterThan= 0.5)
isLockedMessage: 你需要二级枢纽，或者该建筑已断电，且一次只能部署一种炮塔。
ai_isHighPriority: true


[action_瓦普驱动炮]
