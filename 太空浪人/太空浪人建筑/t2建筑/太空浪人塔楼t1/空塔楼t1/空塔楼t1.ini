[action_重型多联炮]
convertTo: 重型多联炮t1
displayType: action
text: 部署重型多联炮
description: 在等离子武器还没被发明之前，粒子多联炮就已经遍布整个古人类世界，\n-不同于常规的中性粒子炮，他们能依靠数个发射单元交替发射快速形成火力压制，\n-无论面对空中还是地面单位，多联炮都可以对其造成快速且致命的打击。\n-对地对空，动能伤害。反掩体
