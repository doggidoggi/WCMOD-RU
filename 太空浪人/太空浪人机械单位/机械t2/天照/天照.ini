


[core]
name: 天照
class: CustomUnitMetadata
price: 1000
maxHp: 1400
displayDescription: -天照的历史甚至早于古人类战国时期，\n-这款主战坦克采用古老而实用的科技，\n-他们久经沙场，无数的战斗证明了他们存在至今的理由。\n-太空浪人在火种舰的数据库中发现了这位古老的战士，\n-在经过改造后，无论面对单个还是大量敌人，\n-他们都能像老练的战士一般轻易将他们撕碎。\n-只能对地。主炮动能伤害，散弹能源伤害
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
techLevel: 1
buildSpeed: 9s
radius: 20
displayRadius: 20
isBio: false
armour: 4
softCollisionOnAll: 6
selfRegenRate: 0.16
copyFrom: ROOT:/通用特效/单位防护.ini
tags: 地面,主炮
unitsSpawnedOnDeath: 损毁*1

[decal_损坏]
layer: afterBody
image: 损坏.png
onlyWhileAlive: true
teamColors: true
isVisible:if self.hp<self.maxHp * 0.36


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[action_散弹]
displayType: action
price: 0
text: 散弹模式
buildSpeed: 2s
whenBuilding_cannotMove: false
temporarilyAddTags:散弹
temporarilyRemoveTags:主炮
isVisible: if not self.tags(includes= '散弹')
isLocked:if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
[action_主炮]
displayType: action
price: 0
text: 点射模式
buildSpeed: 2s
whenBuilding_cannotMove: false
temporarilyAddTags:主炮
temporarilyRemoveTags:散弹
isVisible: if not self.tags(includes= '主炮')
isLocked:if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
[graphics]
total_frames: 3
image: 天照底盘.png
image_wreak: 天照死亡.png
image_turret: 天照炮塔.png
#turretImageScale:0.9

image_shadow: AUTO
teamColorsOnTurret: true
shadowOffsetX: 1
shadowOffsetY: 1
animation_moving_start: 0

animation_moving_end: 2
animation_moving_speed: 1
dustEffect: true


[attack]
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits: true
canAttackUnderwaterUnits: false
turretSize: 25

turretTurnSpeed: 4
maxAttackRange: 280
shootDelay: 90


[turret_1]
x: 0
y: 1
canShoot: false
canAttackCondition: if self.resource.xk < 1

[turret_0]
x: 0
y: 0
projectile: 1
shoot_sound: ROOT:/太空浪人/单位特效/激光.ogg
shoot_sound_vol: 0.3

shoot_flame: NONE
shoot_light: #FFEEEEEE
canShoot: true
attachedTo: 1
slave: true

invisible: true
canAttackCondition: if self.resource.xk < 1 and not self.tags(includes= '散弹')
aimOffsetSpread: -0.01
[turret_2]
x: 0
y: 0
projectile: 2
shoot_sound: NONE
shoot_sound_vol: 0.3

shoot_flame: NONE
shoot_light: #FFEEEEEE
canShoot: true
attachedTo: 1
slave: true

invisible: true
canAttackCondition: if self.resource.xk < 1 and not self.tags(includes= '散弹')
aimOffsetSpread: -0.01
[turret_3]
x: 0
y: 0
copyFrom: 2


[turret_4]
x: 0
y: 0
copyFrom: 2


[turret_5]
x: 0
y: 0
projectile: 3
