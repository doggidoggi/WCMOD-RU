shoot_sound_vol: 0.3
shoot_flame: NONE
shoot_light: #FFEEEEEE
canShoot: true
attachedTo: 1
slave: true
delay:90
invisible: true
canAttackCondition: if self.resource.xk < 1 and not self.tags(includes= '主炮')

[turret_6]
