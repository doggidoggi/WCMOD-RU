


[core]
name: 圣甲虫
class: CustomUnitMetadata
price: 3000
maxHp: 4000
displayDescription: -圣甲虫是太空浪人自行打造的移动火力平台，\n-他们拥有重型护甲，在军队中充当盾牌的角色。\n-这种缓慢的大型坦克完全可以胜任各种强攻任务。\n-只能对地。主炮能源，副炮中性且反掩体

