


[core]
name: 枪骑兵
displayText: Улан
copyFrom:ROOT:/通用特效/单位防护.ini
price: 1000
maxHp: 1200
displayDescription: -Этот мех был самым распространённым горнодобывающим мехом в Империи Нова.\n-Его буровой лазер легко режет любые высокопрочные руды.\n-Скитальцы немного доработали его горнодобывающую лазерную пушку\n-и установили на него пулемёт и биологическую броню,\n-превратив Улана в очень мощный лёгкий боевой мех. Пулемёт — энергетический урон, бонус против биологических юнитов, пробивает укрытия. Главное орудие — кинетический.\n-Плохо эффективен против зданий.

techLevel: 1
buildSpeed: 10s
radius: 16
displayRadius: 16
energyMax: 20
armour: 1
energyRegen: 0.007
energyNeedsToRechargeToFull: true
selfRegenRate: 0.16
tags: 地面
unitsSpawnedOnDeath: 损毁*1
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}


[hiddenAction_打断]
autoTrigger:if self.hasParent and self.queueSize > 0.5
refundAllQueuedItems:true
setResourcesWithLogic: xk=0
temporarilyRemoveTags: ↯

[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999

[action_喷气背包]
convertTo: 枪骑兵飞
displayType: action
text: Включить реактивный ранец
pos: 1
buildSpeed: 0.1s

whenBuilding_cannotMove: false
isActive: if self.energy(greaterThan=14)
isLocked:if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)

[action_s1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[graphics]
image: ROOT:/通用特效/NO.png
image_wreak: 枪骑兵死亡.png
image_turret: 枪骑兵主体.png
