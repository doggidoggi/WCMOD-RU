


[core]
name: 神像机甲
displayText: Мех «Идол»
displayDescription: 太空浪人曾十分中意祖先制作的石像鬼，\n-怎奈从火种舰中找出的蓝图丢失了最重要的主炮部分，\n-于是太空浪人只好用一门中性粒子炮取而代之，\n-并在原有的结构上加装了两只机械后足和副炮，\n-将其打造成了一款极具侵略性的中型火炮机甲，\n-即使没有石像鬼最核心的部分，\n-神像机甲依然在攻城拔寨方面展现了自己强势的一面。\n-只能对地，对建筑伤害加成。机枪能源，主炮动能
class: CustomUnitMetadata
price: 1800
maxHp: 1500

techLevel: 1
buildSpeed: 17s
radius: 23
isBio: false
softCollisionOnAll: 6
fogOfWarSightRange: ${int(attack.maxAttackRange/20)}
selfRegenRate: 0.16
tags: 地面
unitsSpawnedOnDeath: 损毁*1
copyFrom: ROOT:/通用特效/单位防护.ini



[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


