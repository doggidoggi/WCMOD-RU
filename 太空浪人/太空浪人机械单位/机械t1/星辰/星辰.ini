


[core]
name: 星辰
displayText: «Звезда»
copyFrom: ROOT:/通用特效/单位防护.ini
price: 1000
maxHp: 700
displayDescription: -«Звезда» — патрульный робот первого поколения, разработанный Скитальцами,\n-обычно отвечает за безопасность вокруг колоний.\n-Оснащённая малокалиберной частицевой пушкой, она разрушительна для лёгких юнитов. Энергетический урон.

techLevel: 1
buildSpeed: 10s
radius: 16
displayRadius: 16
selfRegenRate: 0.08
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
tags: 地面
unitsSpawnedOnDeath: 损毁*1
armour: 2



[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[graphics]
image: NO.png
image_wreak: 星辰死亡.png
image_turret: 星辰身体.png
