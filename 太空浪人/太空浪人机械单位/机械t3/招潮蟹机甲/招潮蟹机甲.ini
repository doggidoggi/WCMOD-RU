


[core]
name: 招潮蟹机甲
displayText: Мех «Краб-скрипач»
displayDescription: 招潮蟹专为猎杀大型单位和堡垒而生，至今仍是太空浪人的主力机甲，\n-依靠强悍的线圈炮发射凝聚态重型钢针，能对各种重型单位造成致命打击。\n-其强力的远程轰炸功能和越野能力，使其在城市作战和重型攻坚战中大放异彩，\n-每当创世纪的城市沦陷，太空浪人就会将无数招潮蟹投放到城市中，\n-对占领城市的余辉军队进行“冷枪战术”，在安全距离外对余辉进行精确打击。\n-唯一美中不足的是招潮蟹防御能力堪忧。有一条未被证实的言论中提到：\n-曾经有一位人类拾荒者，为了将自己的爱人带出阻拦难民的封锁墙，\n-用上世纪生产的M79榴弹枪和三发榴弹就将招潮蟹炸毁了，只不过，\n-招潮蟹还是夺走了他的爱人。\n-只能对地，动能伤害，对建筑伤害加成。机枪反掩体。
