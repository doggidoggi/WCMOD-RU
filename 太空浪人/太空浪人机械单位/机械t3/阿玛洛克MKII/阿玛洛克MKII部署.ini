[action_a]
convertTo: 阿玛洛克MKII
displayType: action
text: 收起工厂
price: 0
buildSpeed: 12s

highPriorityQueue: true
isVisible: true
isLocked: if self.resource.awz<0 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
whenBuilding_cannotMove: true
whenBuilding_playAnimation: 部署

description: 收起内置工厂并伸出巨型机械足，\n-制造完毕的轻骑兵机甲将会持续跟随阿玛洛克并消灭附近的敌人，\n-但工厂在这种状态下无法运作，在生产单位的过程中无法收起。

[hiddenAction_增益]
autoTrigger: if not self.tags(includes= '灰影聚变堆') and self.globalTeamTags(includes= '灰影3')
