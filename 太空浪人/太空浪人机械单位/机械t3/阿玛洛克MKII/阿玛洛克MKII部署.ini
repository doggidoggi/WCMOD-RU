[core]
name: 阿玛洛克MKII部署
displayText: 阿玛洛克MKII
price: 12000,awz= ${awzxq}
@global awzxq: 300
reclaimPrice: awz= ${awzxq}

maxHp: 30000
isBuilding: true
displayDescription: -阿玛洛克是诺瓦帝国地面霸权最强有力的证明，这种战斗要塞曾经在地面上几乎无人能挡，\n-浮岛要塞和阿玛洛克分别作为帝国海洋和陆地最强大的捍卫者守护帝国直至今日，\n-他们强悍的战斗力同时也令各大家族所垂涎三尺，帝国分裂后，\n-帝国各地的阿玛洛克被法雅德家族抢占，并被改造成MKII型当做移动要塞部署于各大星系，\n-在余辉一轮又一轮的攻势下，阿玛洛克始终作为太空浪人地面上不败王牌而屹立不倒，\n-这种移动要塞至今仍是令余辉最忌惮的超级单位之一。\n-只能对地，动能伤害，导弹能源伤害，舰载机能源伤害，休克免疫。
techLevel: 1
buildSpeed: 34s

radius: 100
displayRadius: 100
footprint: -5,-2,5,7
constructionFootprint: -5,-2,5,7
selfRegenRate: 1
armour: 105
showInEditor: false
fogOfWarSightRange: 32
copyFrom: ROOT:/通用特效/单位防护.ini
transportSlotsNeeded: 100

unitsSpawnedOnDeath: 损毁3*1

tags: 地面,阿玛洛克,极端重型
maxTransportingUnits: 3

transportUnitsCanUnloadUnits: false
transportUnitsAddUnloadOption: false
transportUnitsRequireTag: 战机lrx
transportUnitsHealBy: 0.5
transportUnitsRequireMovementType: AIR

transportUnitsKeepBuiltUnits: false
# borrowResourcesWhileAlive:wrj4=-3
nanoFactorySpeed: 2
exit_y: -100
exit_moveAwayAmount: -100

canBuild_11_name: setRally
canBuild_11_pos: 0.1
@memory 灰机: number
@memory 灰机list: unit[]

