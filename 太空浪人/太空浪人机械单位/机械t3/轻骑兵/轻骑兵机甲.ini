


[core]
name: 轻骑兵机甲
price: 2500
maxHp: 5500
displayDescription: -古人类战国时期，\n-每一个布恩芬德尔联盟官邸都会布置的警卫机甲，\n-轻骑兵配有一把电磁泵动式霰弹枪，\n-相比于当时其他花里胡哨的粒子和能量武器，\n-布恩芬德尔的老顽固们还是更相信这些传统的设计，\n-事实也证明了这确实是一个明智的选择。\n-太空浪人以几张火种舰船票为代价，\n-从布恩芬德尔的官僚手中收购了轻骑兵的蓝图，\n-这种工艺要求水平低，性能可靠，\n-威力强大的机甲被广泛用于二线作战。\n-只不过太空浪人实在无法忍受轻骑兵那抱残守缺的裂变能源，\n-只好将其改为了无内置反应堆的无线充电式作战单元，\n-至于为何不使用聚变堆，\n-是因为轻骑兵的内置硬件实在无法兼容这些先进的玩意。\n-只能对地，动能伤害，自动作战无法操作
techLevel: 1
fogOfWarSightRange: 18
buildSpeed: 5s
radius: 38
displayRadius: 38
armour: 20
copyFrom: ROOT:/通用特效/单位防护.ini

transportSlotsNeeded: 3
unitsSpawnedOnDeath: 损毁3*1
tags: 地面,轻骑兵,伴生单位
energyMax: 7
canNotBeGivenOrdersByPlayer: true

energyRegen: 0
energyNeedsToRechargeToFull: true
selfRegenRate: 0.2
borrowResourcesWhileAlive: zh=-12
[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999

[hiddenAction_强制脱离]
autoTrigger: if self.hasParent(withTag= '阿玛洛克')
disconnectFromParent: true


[action_s1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999


[hiddenAction_1x]
autoTrigger: if numberOfUnitsInEnemyTeam(greaterThan=0, withinRange=1000) and self.resource.xk < 1
addWaypoint_target_nearestUnit_tagged: 地面
addWaypoint_type: attack
addWaypoint_target_nearestUnit_team: enemy





[hiddenAction_21]
autoTrigger: if not self.hasUnitInTeam(withTag='阿玛洛克', withinRange=400) and self.resource.xk < 1
isVisible: false
clearAllWaypoints: true
addWaypoint_target_nearestUnit_tagged: 阿玛洛克
addWaypoint_target_nearestUnit_team: own

addWaypoint_maxTime: 1s
addWaypoint_type: move


[action_t1x]
autoTrigger: if self.noUnitInTeam(withTag='阿玛洛克', withinRange=400)
isVisible: false
addResources: zh=-1


[action_t1z]
autoTrigger: if self.resource(type= 'zh', lessThan= 0) and self.noUnitInTeam(withTag='阿玛洛克')
isVisible: false
addResources: hp=-99999


[attachment_b1]
x: 0
y: 0
onCreateSpawnUnitOf: 检测中介ty(addResources= ammo: 500 | setFlag= 0)
# onCreateSpawnUnitOf: 检测中介a(addResources= ammo: 600 | setFlag= 0-1)
# 对地对空

# 600是检测范围，0：对地，1：对空，2：反潜
prioritizeParentsMainTarget: true
alwaysAllowedToAttackParentsMainTarget: true


[hiddenAction_创造]
autoTrigger: if attachment(slot= 'b1') == nullUnit
attachments_onlyOnSlots: b1
attachments_addNewUnits: 检测中介ty(addResources= ammo: 400 | setFlag= 0)


[action_a]
autoTrigger: if self.numberOfAttachedUnits(withTag= "ANM_cat", lessThan= 0.5)
isVisible: false
alsoQueueAction: b


[action_b]
convertTo: 轻骑兵机甲1
displayType: action
price: 0
buildSpeed: 0.6s
isVisible: false

highPriorityQueue: true
whenBuilding_cannotMove: false
whenBuilding_playAnimation: 部署


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯') or self.resource.awz<0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


