


[core]
name: 猎兵坦克
displayText: Танк «Егерь»
class: CustomUnitMetadata
price: 2200
maxHp: 5500
displayDescription: -诺瓦帝国内乱时期，里贝拉图斯自由派因为执意不使用帝国科技，\n-导致一直没有能拿的上台面的地面作战武器，为对抗保皇派所持有的大量高科技机甲，\n-一张重型底盘和一门220毫米口径中性粒子炮，组成了令人生畏的猎兵坦克。\n-猎兵坦克的诞生皆在为了摧毁重型地面单位，即使是古人类二次大航海时期就诞生的落后武器，\n-只要调大功率进行堆叠，依旧可以一炮射穿一半以上的帝国机械单位。\n-猎兵坦克的出现不仅极大的帮助了自由派地面作战，也让他们脱离皇帝科技控制的理想更进一步。\n-太空浪人依旧保留了这种简单有效的设计，并大量生产成为了其陆军的主力。\n-只能对地，动能伤害。

techLevel: 1
buildSpeed: 13s
radius: 37
displayRadius: 37
isBio: false

softCollisionOnAll: 6
#transportSlotsNeeded: 2
armour: 25
unitsSpawnedOnDeath: 损毁2*1
tags: 地面

copyFrom: ROOT:/通用特效/单位防护.ini
selfRegenRate: 0.2
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}

[hiddenAction_强制脱离]
autoTrigger: if self.hasParent(withTag= '阿玛洛克')
