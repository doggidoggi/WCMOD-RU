





[core]
name: 黑曜石1
displayText: 黑曜石
displayDescription: -在诺瓦帝国时期，黑曜石本是高科技工厂里的重型工业机器人，\n-他们平时的任务就是搬运重物，以及其他重型作业。\n-在诺瓦帝国末期，当余辉攻陷维基兰特III星时，\n-绝望中的人们用工厂中的纳米材料，为黑曜石锻造了大量单分子巨斧，\n-他们将军事化控制软件覆盖了黑曜石机甲的原有系统，并改造了动力原件，\n-使其变成了一种军事化改造的民用机械人，这往往是古人类与余辉作战的最后手段。\n-他们驾驶着黑曜石埋伏在隐蔽的洞穴或者废墟中，等到余辉陷入自己的埋伏时，\n-在角落里静候的黑曜石便会一拥而上，用手中的单分子巨斧将余辉砍成废铁。\n-据统计，黑曜石挥舞巨斧产生的冲击力足以击碎绝大部分轻型护盾，\n-并如同砍瓜切菜一般将余辉的超合金护甲劈成两半，\n-只能对地。中性伤害。反掩体。
