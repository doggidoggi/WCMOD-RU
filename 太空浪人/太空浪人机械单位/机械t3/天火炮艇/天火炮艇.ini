


[core]
name: 天火炮艇
displayText: Канонерка «Небесный огонь»
class: CustomUnitMetadata
displayDescription: -В конце эпохи Воюющих государств Древних Людей, для захвата территорий Республики Альфрид,\n-канонерка «Небесный огонь», способная действовать на суше и на море и адаптироваться к различным условиям, массово оснащалась Империей Нова.\n-Что особенно ценно, этот юнит сочетает свирепую огневую мощь и стремительную скорость,\n-даже в окружении он может нанести серьёзный урон врагу и быстро уйти. К сожалению,\n-канонерка «Небесный огонь» была снята с производства после войны и в большом количестве уничтожена. Скитальцы во время бегства нашли в базе данных скрытые чертежи «Небесного огня»,\n-и теперь Скитальцы массово производят «Небесный огонь», используя его манёвренность для партизанской войны и внезапных атак против Зарева.\n-Атакует землю и воздух, энергетический урон, бонус по воздушным целям. Амфибия, тральщик мин.
price: 2200
maxHp: 2500

techLevel: 1
buildSpeed: 14s
radius: 34
displayRadius: 34
tags: 地面,悬浮,扫雷
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
isBio: false
