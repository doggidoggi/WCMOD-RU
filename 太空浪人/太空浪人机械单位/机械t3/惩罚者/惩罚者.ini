[core]
name: 惩罚者
price: 8500,awz= ${awzxq}
@global awzxq: 180
reclaimPrice: awz= ${awzxq}
maxHp: 13000

displayDescription: -在余辉天基武器和太空舰队的威胁下，在地面建立机场几乎是不可能的事情，\n-为了满足战机维护的需要，太空浪人不得不制造了惩罚者。\n-惩罚者由诺瓦帝国的军用重型运输机械改装而成，他们之前常常用作运输战舰材料。\n-太空浪人在拆除了其货仓后，为其拼接了两层飞行甲板和一门主炮。\n-虽然前身为运输机械，但是在太空浪人的彻底改造后，\n-惩罚者已经脱胎换骨变成了一台残暴的战争机器，其搭载了大量鹰爪战机，\n-可以从远处掌握制空权并彻底摧毁敌人，即使陷入近距离作战，\n-惩罚者依旧可以凭借其强大的主炮和重型装甲稳立于不败之地。\n-对地，对空。主炮动能伤害，副炮能源伤害。（飞机能源且反掩体）
techLevel: 1
buildSpeed: 32s
radius: 70
displayRadius: 70

energyMax: 10
energyRegen: 0.004
selfRegenRate: 0.2
armour: 20
fogOfWarSightRange: 29

copyFrom: ROOT:/通用特效/单位防护.ini
transportSlotsNeeded: 100
unitsSpawnedOnDeath: 损毁3*1
tags: 航母lr,地面
maxTransportingUnits: 6

transportUnitsCanUnloadUnits: false
transportUnitsAddUnloadOption: false
transportUnitsRequireTag: 战机lr
transportUnitsHealBy: 0.5
transportUnitsRequireMovementType: air

transportUnitsKeepBuiltUnits: true
@memory 灰机: number
@memory 灰机list: unit[]
