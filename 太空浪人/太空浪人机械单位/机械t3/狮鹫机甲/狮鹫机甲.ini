[core]
name: 狮鹫机甲
displayText: Мех «Грифон»
copyFrom: ROOT:/通用特效/单位防护.ini
price: 7400,awz= ${awzxq}
@global awzxq: 150
reclaimPrice: awz= ${awzxq}

maxHp: 9000
displayDescription: -臭名昭著的狮鹫机甲曾流行于在古人类战国那个混乱和秩序并存的时期，\n-狮鹫机甲作为科斯塔工业集团最畅销的军火之一，受到无数雇佣兵的青睐，\n-恐怖分子更是凭借着狮鹫机甲到处制造血腥，无数的战斗都充分证明了狮鹫的实力。\n-可惜的是，亚尔佛里德和诺瓦帝国都从未采购过这种低端军火，在帝国建立后这款机甲被历史所埋没。\n-直到诺瓦帝国末期，穷途末路的古人类在科斯塔工业集团残部的帮助下，\n-从新复产了狮鹫机甲用于对抗余辉。如今强悍的狮鹫机甲依然活跃在对抗余辉的一线部队。\n-对地对空，能源伤害。霰弹枪反掩体
techLevel: 1
buildSpeed:27s
#availableInDemo: true

radius: 38
armour: 18
displayRadius: 38
unitsSpawnedOnDeath: 损毁3*1
selfRegenRate: 0.2
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
tags: 地面
transportSlotsNeeded: 3
energyMax: 1
energyRegen: 0
energyNeedsToRechargeToFull: true


