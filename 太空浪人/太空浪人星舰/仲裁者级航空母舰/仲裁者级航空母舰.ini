[core]
name: 仲裁者级航空母舰
displayText: 仲裁者级行星突袭舰
displayDescription: -仲裁者级是太空浪人舰队的主要构成部分，使用仲裁者是因为无奈而不是他有多优秀。\n-帝国分裂后，皇帝没有给人类留下任何军事工业以及任何武器，\n-因此在面对余辉强大的皇家舰队时，太空浪人不得不将手里的民用船军事化改造来充数，\n-将帝国的命运级勘探船移除货仓，并加装粒子炮和飞行甲板后，\n-就可以勉强当成一种小型航母来使用，虽然这种武器谈不上有多强大。\n-甚至连有效性都难以保证，但如果大量出动还是能在战场发挥出不可小觑的力量。\n-现在，仲裁者级被太空浪人当做对地支援舰并广泛用于支援前线的军事行动。对地对空，能源伤害。
price: 7000,awz= ${awzxq}
