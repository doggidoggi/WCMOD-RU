[core]
name: 仲裁者级航空母舰
displayText: Планетарный штурмовой корабль класса «Арбитр»
displayDescription: -Класс «Арбитр» — основная часть флота Скитальцев. Использование «Арбитра» вызвано не превосходством, а вынужденной необходимостью.\n-После раскола Империи император не оставил людям ни военной промышленности, ни оружия,\n-поэтому, столкнувшись с могущественным королевским флотом Зарева, Скитальцы были вынуждены переоборудовать свои гражданские корабли для военных нужд.\n-Сняв грузовые отсеки с имперского разведывательного корабля класса «Судьба» и установив частицевые пушки и лётную палубу,\n-его можно было кое-как использовать как малый авианосец, хотя это оружие нельзя назвать особо мощным.\n-Даже его эффективность сомнительна, но при массовом применении он способен проявить на поле боя немалую силу.\n-Сейчас класс «Арбитр» используется Скитальцами как корабль наземной поддержки и широко применяется для поддержки фронтовых военных операций. Атакует землю и воздух, энергетический урон.
