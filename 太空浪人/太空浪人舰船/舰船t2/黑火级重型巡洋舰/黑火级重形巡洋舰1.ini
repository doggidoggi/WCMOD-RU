[core]
name: 黑火级重型巡洋舰1
displayText: Тяжёлый крейсер класса «Чёрный огонь»
class: CustomUnitMetadata
price: 12000,awz= ${awzxq}
@global awzxq: 240

reclaimPrice: awz= ${awzxq}
maxHp: 18000
displayDescription: -黑火级重型巡洋舰的体积和规模，甚至称之为战列舰都毫不夸张。\n-即便科斯塔工业集团对外声称没有他们不做的生意，但黑火却是一个例外，\n-科斯塔家族从不向外出售黑火级，这种只向家族内部提供的巡洋舰是科斯塔家族海洋权益最有力的保证。\n-如果有幸被当做贵宾来到科斯塔家族的希达卡II行星上做生意，就会看到海洋上密密麻麻的黑火级，\n-他们庞大的身躯和夸张的巨炮仿佛在向一切敌人无声诉说着科斯塔工业的实力。\n-与帝国余辉开战后，科斯塔家族慷慨的将黑火级的蓝图公开，\n-如今他依然是与余辉还是力量对垒的关键。\n--对地，反潜，动能伤害。
techLevel: 1
buildSpeed: 29s

availableInDemo: true
radius: 86
displayRadius: 86
isBio: false
softCollisionOnAll: 7

selfRegenRate: 0.2
armour: 99999
armourMinDamageToKeep: 0
fogOfWarSightRange: 26
canNotBeDirectlyAttacked: true

copyFrom: ROOT:/通用特效/单位防护.ini
tags: 海上,寄生免疫,衰解免疫
energyMax: 10
energyRegen: 0.015
energyNeedsToRechargeToFull: true

effectOnDeath: CUSTOM:爆炸5*1,CUSTOM:冲击波2,CUSTOM:水波1
