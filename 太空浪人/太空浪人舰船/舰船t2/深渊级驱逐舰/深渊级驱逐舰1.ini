


[core]
name: 深渊级驱逐舰1
displayText: 深渊级攻击潜艇
class: CustomUnitMetadata
price: 4500
maxHp: 6500

displayDescription: -在古人类二次大航海时期末期，法雅德家族掌握着希诺星系规模最大的海洋星球，\n-若没有深渊级驱逐舰，法雅德家族根本无法夺得如此多的海洋领土。\n-亚尔佛里德共和国建国后，深渊作为共和国的一种标准制海舰被广泛装备。\n-当时大部分的水面舰艇都不是深渊的对手，再加上灵活多变的潜行模块，\n-使得深渊不仅能高效的消灭敌方舰艇，还为亚尔佛里德节约了一大笔潜艇部队的开支。\n-法雅德作为太空浪人的领导家族，深渊被广泛运用在对抗余辉的战役中，\n-即便经过无数次的技术迭代，还是有不计其数的余辉舰艇被深渊埋葬在海底。\n-潜水前只能对地，能源伤害，潜水后可攻击水面敌人和反潜，动能伤害。
techLevel: 1
buildSpeed: 25s
availableInDemo: true
radius: 48

displayRadius: 48
isBio: false
softCollisionOnAll: 7
selfRegenRate: 0.2
showInEditor: false

armour: 15
fogOfWarSightRange: 23
copyFrom: ROOT:/通用特效/单位防护.ini
tags: 潜艇,海上,寄生免疫
energyMax: 10

energyRegen: 0.05
energyNeedsToRechargeToFull: true
effectOnDeath: CUSTOM:爆炸5*1,CUSTOM:冲击波2,CUSTOM:水波1


