


[core]
name: 漂泊者1
displayText: 漂泊者
class: CustomUnitMetadata
displayDescription: -以天火炮艇为基础改造的便携式虫洞载具，\n-漂泊者搭载了一个小型多向聚变堆和传送立场发生器，\n-漂泊者的存在极大的解决了固定式传送基站和聚变堆的局限性，\n-无数的传送基站和漂泊者组成了贯通全球的折越网络，\n-太空浪人的部队也正因如此能快速向全球任何一个角落发起出其不意的突袭，\n-漂泊者虽然没有任何自卫能力，但每一艘漂泊者的出现，\n-都意味着其身后必定有一支即将出现的太空浪人军团。\n-部署后可以供能，可以提供传送网络，不能攻击。
price: 4000
mass: 9999999 
maxHp: 3000
showInEditor: false
techLevel: 1
buildSpeed: 15s
radius: 34

displayRadius: 34
tags: 地面,聚变堆,核,海上,悬浮
isBio: false
softCollisionOnAll: 6
armour: 7

copyFrom: ROOT:/通用特效/单位防护.ini
selfRegenRate: 0.2
maxTransportingUnits: 4

