


[core]
name: 漂泊者
displayText: «Странник»
class: CustomUnitMetadata
displayDescription: -Портативный кротонорный носитель, переоборудованный на базе канонерки «Небесный огонь».\n-«Странник» оснащён компактным многонаправленным термоядерным реактором и генератором поля телепортации.\n-Существование «Странника» значительно решает ограничения стационарных телепорт-станций и реакторов.\n-Бесчисленные телепорт-станции и «Странники» образуют глобальную сеть прыжков,\n-благодаря чему войска Скитальцев могут быстро наносить внезапные удары в любую точку мира.\n-Хотя «Странник» не имеет средств самообороны, появление каждого «Странника»\n-означает, что за ним непременно идёт армия Скитальцев.\n-После развёртывания может обеспечивать питание и сеть телепорта. Не может атаковать. Амфибия, иммунитет к минам.
