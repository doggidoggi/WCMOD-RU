[core]
name: 刚多林级巡洋舰
class: CustomUnitMetadata
price: 6000,awz= ${awzxq}
@global awzxq: 120
reclaimPrice: awz= ${awzxq}

maxHp: 8000
displayDescription: -科斯塔工业集团在古人类战国时期推出的一款不伦不类的产品，\n-刚多林级巡洋舰配有十分新颖的水路两栖技术，以及舰载机甲板，\n-其售卖的对像就是那些同时想追求扩充海洋和地面力量的国家，科斯塔本想这种设计可以大赚一笔，\n-在大规模生产后，却发现其市场非常惨淡，只有少数国家愿意少数购买，\n-大量积压的刚多林在诺瓦帝国统一古人类后被皇帝收缴，之后便被遗忘在仓库中。\n-之后在与余辉战斗的危及时刻，大量的刚多林被意外发现，\n-他们在被简单改造后就被投入了与余辉的战斗中，并在各种战役中爆发出了不小的威力，\n-这款生不逢时的巡洋舰至今已然成为太空浪人的主力海军之一。对地对空，主炮动能，副炮飞机能源且反掩体，水陆两栖
techLevel: 1
buildSpeed: 23s
availableInDemo: true

radius: 56
displayRadius: 56
isBio: false
softCollisionOnAll: 7
selfRegenRate: 0.2

armour: 20
fogOfWarSightRange: 34
copyFrom: ROOT:/通用特效/单位防护.ini
#tags:地面
tags: 航母lr,地面,海上

maxTransportingUnits: 1
transportUnitsCanUnloadUnits: false
transportUnitsAddUnloadOption: false
transportUnitsRequireTag: 战机lr
transportUnitsHealBy: 0.5

transportUnitsRequireMovementType: air
transportUnitsKeepBuiltUnits: true
@memory 灰机: number
@memory 灰机list: unit[]
effectOnDeath: CUSTOM:爆炸5*1,CUSTOM:冲击波2,CUSTOM:水波1


