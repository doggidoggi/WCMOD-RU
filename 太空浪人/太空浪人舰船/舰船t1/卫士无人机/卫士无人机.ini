


[core]
name: 卫士无人机
displayText: Дрон-страж
class: CustomUnitMetadata
displayDescription: -Дрон-страж — лёгкая оружейная платформа, разработанная Скитальцами самостоятельно.\n-Особенность стража — антигравитационный модуль, позволяющий ему одновременно двигаться по земле и воде.\n-Он оснащён лёгкой пушкой нейтральных частиц и торпедами,\n-поэтому страж предпочитает действовать на море.\n-Атакует землю и подводные цели. Главное орудие — кинетический урон, торпеды — взрывной. Амфибия, иммунитет к минам.
price: 1600
shieldDisplayOnlyDeflection: true

maxHp: 1620
techLevel: 1
buildSpeed: 17s
radius: 22
displayRadius: 22
armour: 5
isBio: false
softCollisionOnAll: 6
copyFrom: ROOT:/通用特效/单位防护.ini
selfRegenRate: 0.16
tags: 地面,海上,悬浮

effectOnDeath: CUSTOM:气浪2*2,CUSTOM:爆炸*1,CUSTOM:冲击波*1,CUSTOM:气浪*3,CUSTOM:水波*1


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)





