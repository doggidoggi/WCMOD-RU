


[core]
name: 海蝎截击舰
displayText: Перехватчик «Морской скорпион»
class: CustomUnitMetadata
price: 800
maxHp: 800
displayDescription: -海蝎截击舰本是一种可以在太空中航行的小型探测器，\n-由于极大的库存和严重的零件缺失，\n-太空浪人只好将其废物利用，\n-将其原版的宇航引擎改成了水上引擎并加装了激光武器，\n-即便如此，他依然可以胜任突袭与制海任务，\n-并一直坚持到高级部队的赶到。\n-对地对空。能源伤害，反掩体

techLevel: 1
buildSpeed: 10s
availableInDemo: true
radius: 22
displayRadius: 22

selfRegenRate: 0.08
isBio: false
softCollisionOnAll: 4
tags: 地面,海上
effectOnDeath: CUSTOM:气浪2*2,CUSTOM:爆炸*1,CUSTOM:冲击波*1,CUSTOM:气浪*3,CUSTOM:水波*1

copyFrom: ROOT:/通用特效/单位防护.ini


[decal_损坏]
layer: afterBody
image: 损坏.png
onlyWhileAlive: true
teamColors: true
isVisible:if self.hp<self.maxHp * 0.36


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


