autoTrigger:if self.globalTeamTags(includes='强固建筑') and self.tags(includes= '建筑') and not self.tags(includes= '战略武器抗性')
isActive: false
isVisible: false
temporarilyAddTags:战略武器抗性

[action_加固建筑x2]
autoTrigger:if self.globalTeamTags(includes='强固建筑') and self.tags(includes= '建筑') and self.tags(includes= '防御建筑') and not self.tags(includes= '加固保险')
isActive: false
isVisible: false
temporarilyAddTags:加固保险
setUnitStats: maxHp= ${core.maxHp*1.4},hp= ${core.maxHp*1.4},armour=${core.armour*1.4}

[hiddenAction_加固建筑s]
autoTrigger: if self.globalTeamTags(includes='强固建筑') and self.tags(includes= '建筑')  and not self.hp(full=true)
addResources: hp=50
spawnEffects: CUSTOM:修复光圈,CUSTOM:修复光圈1*2


#————————————————————烟雾弹
[hiddenAction_烟雾弹标记]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='烟雾弹', withinRange=160,greaterThan=0) and not self.tags(includes= '免疫烟雾') and not self.tags(includes= '飞机') and not self.tags(includes= '潜艇') and not self.tags(includes= '英雄') and not self.tags(includes= '射程x')
temporarilyAddTags:烟雾弹减益
[hiddenAction_烟雾弹标记移除]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='烟雾弹', withinRange=160,lessThan=1) and self.tags(includes= '烟雾弹减益') 
temporarilyRemoveTags:烟雾弹减益
setUnitStats:maxAttackRange= ${attack.maxAttackRange*1},shootDelayMultiplier=1
[hiddenAction_烟雾弹]
autoTrigger: if self.tags(includes= '烟雾弹减益')
setUnitStats:maxAttackRange= ${attack.maxAttackRange*0.7},shootDelayMultiplier=1.3


#————————————————————维修
[hiddenAction_维修标记]
autoTrigger: if self.hp<self.maxHp and not self.tags(includes= '需要维修') and not self.tags(includes= '维修飞机') and numberOfUnitsInTeam(withTag='修复塔', withinRange=500,greaterThan=0) and not self.tags(includes= '步兵') and not self.tags(includes= '相位状态')
temporarilyAddTags:需要维修

[hiddenAction_维修标记1]
autoTrigger: if self.hp==self.maxHp and self.tags(includes= '需要维修')
temporarilyRemoveTags:需要维修

#————————————————————进入地堡不能被打
#（即使设置进入母体不能被伤害，但是依然可以被添加资源，日）

[hiddenAction_进来力]
autoTrigger: if not self.tags(includes= 'jabzhdja') and self.hasParent
isVisible: false
temporarilyAddTags:jabzhdja
[hiddenAction_出去力]
autoTrigger: if self.tags(includes= 'jabzhdja') and not self.hasParent and not self.tags(includes= '本来就有啊')
isVisible: false
temporarilyRemoveTags:jabzhdja

