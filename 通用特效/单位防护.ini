


[core]
softCollisionOnAll: ${int(core.radius * 0.7)}
strictLevel: 1
dont_load: true
#autoTriggerCooldownTime:0.1s
@memory enemyTeamId: number
# 亚空间潜行，克莱因瓶，增加 衰解免疫，和 寄生免疫
armour:0




[hiddenAction_威胁点数修正]
autoTrigger: if not self.globalTeamTags(includes='我是余晖') and self.resource.威胁点数>0
setResourcesWithLogic: 威胁点数=0
[hiddenAction_寄生]
requireConditional: if memory.enemyTeamId < 1
autoTriggerOnEvent: tookDamage(withTag= '灰影寄生虫')
setUnitMemory: enemyTeamId = eventSource.teamId + 2


[hiddenAction_寄生b]
autoTriggerOnEvent: destroyed
alsoTriggerAction: 寄生ba


[hiddenAction_寄生ba]
switchToTeam: memory.enemyteamId - 2
alsoTriggerAction: 寄生c, 寄生d,寄生e, 寄生f,寄生c1,寄生c2,寄生c3
alsoTriggerOrQueueActionConditional: if memory.enemyTeamId > 1 and self.resource.JSC>0 and not self.tags(includes= '寄生免疫')
addResources: hp = -99999


[hiddenAction_寄生c]
requireConditional: if memory.enemyTeamId > 1 and self.resource.JSC>0 and not self.tags(includes= '寄生免疫') and self.tags(includes= '地面') and not self.tags(includes= '海上') and ${core.radius} < 15
spawnUnits: 幼体*2
# addResources: hp = -99999


[hiddenAction_寄生d]
requireConditional: if memory.enemyTeamId > 1 and self.resource.JSC>0 and not self.tags(includes= '寄生免疫') and self.tags(includes= '地面') and not self.tags(includes= '海上') and ${core.radius} >= 15 and ${core.radius} < 35
