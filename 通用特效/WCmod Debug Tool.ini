  isVisible:if self.hasFlag(id=31) and not self.hasFlag(id=17)
  text_zh:返回主界面
  text:Regain Menu
  displayType:rally

  [action_changeTeamNew]
   pos:1
   buildSpeed:0
   text_zh:将生成%{memory.current_teamId + 1}号的单位
   text:Spawn team: %{memory.current_teamId}
   setUnitMemory: current_teamId = memory.current_teamId + 1 % 10
   isVisible:if not self.hasFlag(id=28) and not self.hasFlag(id=29) and self.hasFlag(id=31)

  [action_change-1Team]
   pos:1
   buildSpeed:0
   text_zh:开启中立单位生成
   text:Spawn neutral units
   setUnitMemory:current_teamId = -1
   addResources:setFlag=28
   isVisible:if not self.hasFlag(id=28) and not self.hasFlag(id=29) and self.hasFlag(id=31)

   [action_change-1Team2]
     pos:1
    buildSpeed:0
    text_zh:关闭中立单位生成
    text:Spawn normal units
    setUnitMemory:current_teamId = self.teamId()
    addResources:unsetFlag=28
    isVisible:if self.hasFlag(id=28) and self.hasFlag(id=31)

  [action_change-2Team]
   pos:1
   buildSpeed:0
   text_zh:开启全局敌对单位生成
   text:Spawn aggressive units
   setUnitMemory:current_teamId = -2
   addResources:setFlag=29
   isVisible:if not self.hasFlag(id=28) and not self.hasFlag(id=29) and self.hasFlag(id=31)

   [action_change-2Team2]
    pos:1
    buildSpeed:0
    text_zh:关闭全局敌对单位生成
    text:Spawn normal units
    setUnitMemory:current_teamId = self.teamId()
    addResources:unsetFlag=29
    isVisible:if self.hasFlag(id=29) and self.hasFlag(id=31)
