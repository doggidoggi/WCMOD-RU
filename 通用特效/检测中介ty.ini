


[core]
name: 检测中介ty
displayText: Детектор-маркер
strictLevel: 1
price: 0
radius: 10
maxHp: 9999

class: CustomUnitMetadata
techLevel: 1
showInEditor: false
buildSpeed: 5s
canNotBeDirectlyAttacked: true

isUnrepairableUnit: true
isUnselectable: true
disableAllUnitCollisions: true
hideScorchMark: true
ignoreInUnitCapCalculation: true
tags:反高空

[graphics]
image: SHARED:blank.png
isVisible: false


[attack]
canAttack: true
canAttackFlyingUnits: if self.hasFlag(id= 1)
canAttackLandUnits: if self.hasFlag(id= 0)
canAttackUnderwaterUnits: if self.hasFlag(id= 2)
maxAttackRange: 9999


[turret_1]
x: 0
y: 0
projectile: 1
delay: 0.2s
canAttackMaxAngle: 181

invisible: true
onShoot_triggerActions: 1


[projectile_1]
life: 0
deflectionPower: -1
directDamage: 0
invisible: true
explodeEffect: NONE

explodeEffectOnShield: NONE


[hiddenAction_1]
temporarilyRemoveTags: ANM_cat
resetCustomTimer: true

[hiddenAction_2]
autoTrigger: if self.customTimer(laterThanSeconds= 1.0)
temporarilyAddTags: ANM_cat


[hiddenAction_3]
autoTrigger: if not self.hasParent()
deleteSelf: true


[hiddenAction_4]
autoTrigger: if self.ammo != self.maxHp
setUnitStats: maxAttackRange = self.ammo, maxHp = self.ammo


[movement]
movementType: LAND


