price: 5000
maxHp: 10000
armour: 20
copyFrom: ROOT:/通用特效/单位防护.ini
footprint: -5,-3,5,5
constructionFootprint: -5,-3,5,5
displayDescription:【阶级t3】【建筑单位】【地面单位】\n-战术定位：空中单位生产设施，无武装。\n-无法在水上建造。\n-一种创世纪前线标准部署建筑，用以快速在前线生产和维护创世纪空军，\n-其能容纳大量技术人员和地勤人员，以及多条战机生产线，\n-这使得它可以快速生产大多数创世纪空中单位，\n-并用最先进的武器武装它们，同时它还有一部高精度无线电系统，\n-一旦取得许可便可从后方呼叫更强大的单位支援战场。
techLevel: 1
buildSpeed: 16s
tags: 地面,机场,建筑
radius: 75
nanoFactorySpeed:1
displayRadius: 75
effectOnDeath: CUSTOM:烟雾*4, CUSTOM:爆破*8,largeExplosion
isBio: false
isBuilding: true
unitsSpawnedOnDeath:建筑损毁
exit_moveAwayAmount: 180
canBuild_1_name: setRally
