[core]
name: 创世纪锻造厂
displayDescription: 【阶级t3】【建筑单位】【机械单位】【地面单位】【水上单位】（当部署在水上时）\n-战术定位:特殊资源生产设施/资源转换设施，无武装。锻造厂负责将钍原石打造成裂变燃料棒，\n-同时也能灵活的将钍进行出售弥补普通资源的不足。
