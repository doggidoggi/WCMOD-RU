description: -通过逆向余辉垂发单元技术，研发的新一代电磁弹射式导弹发射装置，\n-其通过轨道炮的原理将导弹抛射至高空再开启导弹发动机，\n-能极大程度上提升导弹武器的射程并使其能命中高空单位。\n-同时，这种革命性的新型导弹技术也能极大程度上减少远程导弹所需要的燃料，\n-从而大大缩短导弹体积。由于发射阶段无需为导弹点火，\n-这甚至使得一个垂发单元内能一次性存放数枚导弹，\n-极大提升了火力与续航能力。有效单位:守护者IFV，超坦克，地狱火导弹平台，地狱猎犬，噬海女妖级战略核潜艇，\n-双髻鲨级驱逐舰，地狱风暴。为有效单位的防空导弹武器添加对高空的能力，或为有效单位的战术武器的基础弹药提供二连射能力。\n-解锁火箭弹幕炮塔t3
