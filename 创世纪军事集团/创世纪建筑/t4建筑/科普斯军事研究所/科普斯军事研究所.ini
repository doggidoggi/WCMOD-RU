[action_地震弹头研发]
text: 地震弹头
buildSpeed: 100s
price: 7650,energy=1,钍=580
description: -通过对钍的深入研究，研究员们发现高浓度钍完全聚变所释放的能量相当惊人，\n-因此，新一代的聚变弹头代号“地震”被研发出来，\n-新弹头使用枪式反应原理，充分的对数块高纯度钍进行加压，使其在半固态的状态下触发聚变再发射，\n-这一反应能产生上万摄氏度的火球，威力足以震天撼地。\n-有效单位:超坦克，超坦克MK2，炽天使级空中炮艇，战列要塞，解锁地狱之火导弹平台战术核弹。\n-解锁黎明曙光级战略轰炸机的战略核导弹。解锁噬海女妖级战略核潜艇的达摩克里斯之剑。\n-解锁聚变鱼雷炮塔t3，\n-大幅提升有效单位的攻击力，同时将武器伤害转变为中性，\n-同时对目标单位附加燃烧效果，对建筑伤害加成50%。
iconImage: ROOT:/创世纪军事集团/单位特效/地震弹头.png
