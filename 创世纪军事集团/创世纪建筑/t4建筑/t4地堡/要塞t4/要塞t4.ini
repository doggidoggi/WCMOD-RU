[core]
name: 要塞t4
displayText: Крепостьt4
displayDescription:【Уровень t4】【Оборонительное здание】【Здание】【Наземный юнит】【Сверхтяжёлый юнит】\n-Тактическое назначение：суперюнитукрытие，允许размещатьсямеханический юнит，\n-вместимость десанта：24。иметьстратегическое оружие抗性。повышаетвнутреннийразмещатьсяюнитдальность至1200。\n-Генезис为了может在平坦地形上遏制Заревобронегруппа冲锋所建立的，坚固аогромный的永驻工事。\n-Крепость采用强固混凝土混合броня钢框 浇注进行строить，其铜墙铁壁般的оборонаспособностьможет抵御Зарево绝большинство炮火直射，\n-с往毁灭性的攻击在Крепость坚固的防护下都显得宛如瘙痒般无力。\n-Крепостьвнутреннийогромный的空间，более是允许большое количество的пехотавплоть доброня力量размещаться在其внутренний，\n-дажеещёможет额外поддерживает数个炮组和далеко程重炮обеспечивает额外огневая мощьподдержка。
