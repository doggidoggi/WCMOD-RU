[core]
name: 要塞t4
displayText: 要塞t2
displayDescription:【阶级t4】【防御类建筑】【建筑单位】【地面单位】【极端重型单位】\n-战术定位：超级单位掩体，允许驻扎机械单位，\n-载员数量：24。拥有战略武器抗性。提升内部驻扎单位射程至1200。\n-创世纪为了能在平坦地形上遏制余晖装甲集群冲锋所建立的，坚固而巨大的永驻工事。\n-要塞采用强固混凝土混合装甲钢框架浇注进行建造，其铜墙铁壁般的防御能力能抵御余晖绝大多数炮火直射，\n-以往毁灭性的攻击在要塞坚固的防护下都显得宛如瘙痒般无力。\n-要塞内部巨大的空间，更是允许大量的步兵乃至装甲力量驻扎在其内部，\n-甚至还能额外支持数个炮组和远程重炮提供额外火力支援。
class: CustomUnitMetadata
price: 38000,钍=600,bj= ${bjxq}
@global bjxq: 20
reclaimPrice: bj= ${bjxq}

maxHp: 125000
constructionFootprint:-7,-6,7,6
footprint: -7,-6,7,6
techLevel: 1
buildSpeed: 120s
isBio: false
fogOfWarSightRange: 47
copyFrom: ROOT:/通用特效/单位防护.ini
isBuilding: true
numBitsOnDeath: 12
unitsSpawnedOnDeath:建筑损毁*2
effectOnDeath: CUSTOM:烟雾*5, CUSTOM:爆破*12,largeExplosion*2
radius: 100
displayRadius: 100
softCollisionOnAll: 12
energyStartingPercentage: 0
energyMax: 16
energyRegen: 0.004
exit_x: 0
exit_y: -1
tags: 地面,建筑,防御建筑,要塞t4,极端重型,jabzhdja,战略武器抗性,本来就有啊
armour: 250
transportUnitsRequireTag:驻扎要塞,步兵,卧倒,机甲
