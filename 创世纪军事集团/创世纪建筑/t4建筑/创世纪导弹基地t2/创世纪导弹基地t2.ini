[action_1]
fireTurretXAtGround: 1
text: запускать死亡之眼ракета
price: energy=8
displayType: action
buildSpeed: 2s
pos: 0.4
description: -死亡之眼ракета将被判定为стратегическое оружие，запускать后，将生成一处ракетаточка приземления标记，\n-иможно自行修正точка приземления，ракета将在запускать后12秒命中目标，\n-ракета将по земле面和подводныйюнит造成伤害，命中目标后将对范围100内的враг造成самый高70000点кинетический урон，\n-之后将产生二次爆炸，对范围300内的враг，造成самый高28000点взрывной урон，\n-и在之后的数秒内持续产生大范围对здание特化伤害。\n-死亡之眼大概是Генезиссамыйспециальный的一вид弹道ракета，\n-与常规弹药不同，死亡之眼的бой部и非炸药，а является一整根顶部加入немного超合金的金属棒，\n-более难можетможно贵的是，这вид弹药ещёиметьмощный主动制导способность，способенэффективный猎杀被он盯上的юнит，\n-从轨道高度飞向地面的огромный金属棒足с一击贯穿大部分враг，\n-по земле下здание自然такжеможет产生毁灭性的结构удар，\n-поэтому，该弹药在进行针对重 юнит和здание的сражение时表现良好。
displayRemainingStockpile: true
highPriorityQueue: false
onlyOneUnitAtATime: true
whenBuilding_playAnimation: 舱盖
iconImage: 破坏.png
stopLastAnimation: true
isLocked: if self.queueSize > 0.5 or not self.globalTeamTags(includes='裂变技术2') or not self.globalTeamTags(includes='材料技术4')
isLockedMessage: Требуется технология деления 2和Улучшенные материалы，或者выполняется другое действие，пожалуйста, подождите。

