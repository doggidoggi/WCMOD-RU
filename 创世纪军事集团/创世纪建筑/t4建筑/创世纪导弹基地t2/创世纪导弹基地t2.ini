description: -雷神之锤ракета将被判定为стратегическое оружие，запускать后，将生成一处ракетаточка приземления标记，\n-иможно自行修正точка приземления，ракета将在запускать后12秒命中目标，\n-在主弹头命中前，会有两枚无функция的干扰弹头诱骗защита от стратегического оружиясооружение开火，\n-прикрытие主弹头命中目标，干扰弹头同样会被判定为стратегическое оружие。\n-ракета命中后，将对范围700内的地面вражескийюнит造成瘫痪эффект，造成немногонейтральный урон，\n-强制清空范围700内вражеский地面，空中，высотныйюнит的护盾，\n-и斩杀范围300内的все地面биологический юнит，对вражеский地面无人юнит施加самый高15000点нейтральный урон。\n-ракета爆炸后将生成一个范围415，持续14s的休克场，\n-在范围内的вражескийназемный юнит将被清空может量，禁用技может，и持续被休克и损失护盾。\n-雷神之锤ракета主体造成的все伤害均不受стратегическое оружие抗性减免。\n-雷神之锤的бой部为实验性的脉冲线圈组与核炸药，\n-在命中后会爆издаватьогромный的emp激波，\n-использоватьбольшое количество的ЭМИ在电路层面上彻底过载和уничтожать计算машина与чип，\n-或者强制使механический юнит的电路входит自я保护状态。
