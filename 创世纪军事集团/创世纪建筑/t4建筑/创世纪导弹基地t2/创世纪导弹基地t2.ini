isLocked: if self.tags(includes= '齿轮')
isLockedMessage: 其他动作进行中，请等待
[action_1]
fireTurretXAtGround: 1
text: 发射死亡之眼导弹
price: energy=8
displayType: action
buildSpeed: 2s
pos: 0.4
description: -死亡之眼导弹将被判定为战略武器，发射后，将生成一处导弹落点标记，\n-并可自行修正落点，导弹将在发射后12秒命中目标，\n-导弹将对地面和水下单位造成伤害，命中目标后将对范围100内的敌人造成最高70000点动能伤害，\n-之后将产生二次爆炸，对范围300内的敌人，造成最高28000点爆炸伤害，\n-并在之后的数秒内持续产生大范围对建筑特化伤害。\n-死亡之眼大概是创世纪最特殊的一种弹道导弹，\n-与常规弹药不同，死亡之眼的战斗部并非炸药，而是一整根顶部加入少量超合金的金属棒，\n-更难能可贵的是，这种弹药还拥有强大的主动制导能力，能够有效猎杀被他盯上的单位，\n-从轨道高度飞向地面的巨大金属棒足以一击贯穿大部分敌人，\n-对地下建筑物自然也能产生毁灭性的结构打击，\n-因此，该弹药在进行针对重型单位和建筑物的作战时表现良好。
displayRemainingStockpile: true
highPriorityQueue: false
onlyOneUnitAtATime: true
whenBuilding_playAnimation: 舱盖
iconImage: 破坏.png
stopLastAnimation: true
isLocked: if self.queueSize > 0.5 or not self.globalTeamTags(includes='裂变技术2') or not self.globalTeamTags(includes='材料技术4')
isLockedMessage: 你需要裂变技术2和先进材料技术，或者其他动作进行中，请等待。

[action_2]
fireTurretXAtGround: 2
text: 发射雷神之锤导弹
price: energy=5
displayType: action
buildSpeed: 2s
pos: 0.5
description: -雷神之锤导弹将被判定为战略武器，发射后，将生成一处导弹落点标记，\n-并可自行修正落点，导弹将在发射后12秒命中目标，\n-在主弹头命中前，会有两枚无功能的干扰弹头诱骗战略武器防御设施开火，\n-掩护主弹头命中目标，干扰弹头同样会被判定为战略武器。\n-导弹命中后，将对范围700内的地面敌方单位造成瘫痪效果，造成少量中性伤害，\n-强制清空范围700内敌方地面，空中，高空单位的护盾，\n-并斩杀范围300内的所有地面生物单位，对敌方地面无人单位施加最高15000点中性伤害。\n-导弹爆炸后将生成一个范围415，持续14s的休克场，\n-在范围内的敌方地面单位将被清空能量，禁用技能，并持续被休克并损失护盾。\n-雷神之锤导弹主体造成的所有伤害均不受战略武器抗性减免。\n-雷神之锤的战斗部为实验性的脉冲线圈组与核炸药，\n-在命中后会爆发出巨大的emp激波，\n-利用大量的电磁脉冲在电路层面上彻底过载和摧毁计算机与芯片，\n-或者强制使机械单位的电路进入自我保护状态。
displayRemainingStockpile: true
highPriorityQueue: false
onlyOneUnitAtATime: true
whenBuilding_playAnimation: 舱盖
iconImage: 雷标志.png
stopLastAnimation: true
isLocked: if self.queueSize > 0.5 or not self.globalTeamTags(includes='裂变技术2') or not self.globalTeamTags(includes='电磁脉冲武器1')
isLockedMessage: 你需要裂变技术2和电磁脉冲武器1，或者其他动作进行中，请等待。
[action_3]
fireTurretXAtGround: 3
text: 发射天空螺旋导弹
price: energy=1
displayType: action
buildSpeed: 2s
pos: 0.1
description: -天空螺旋导弹将被判定为战略武器，发射后，将生成一处导弹落点标记，\n-并可自行修正落点，导弹将在发射后12秒命中目标，\n-导弹将对地面单位造成伤害，命中目标后将对范围200内的敌人造成最高18000点爆炸伤害，\n-小体积量产短程弹道导弹，\n-拥有较为简单的结构与大量的产量，\n-虽然爆炸威力略有欠缺，但是该导弹导引头上内置的二次制导系统提供的高精度能有效的弥补这一点，\n-况且该导弹还能进行大量同时发射，能够以密集战术有效的突破敌方的拦截网。
displayRemainingStockpile: true
highPriorityQueue: false
onlyOneUnitAtATime: true
whenBuilding_playAnimation: 舱盖
iconImage: 战斧标记.png
stopLastAnimation: true
isLocked: if self.queueSize > 0.5
isLockedMessage: 其他动作进行中，请等待

[action_4]
fireTurretXAtGround: 4
text: 发射裂地者导弹
price: energy=4
displayType: action
buildSpeed: 2s
pos: 0.2
description: -裂地者导弹发射后，将生成一处导弹落点标记，\n-并可自行修正落点，25枚导弹将在发射后12秒中陆续命中目标，\n-导弹将对地面单位造成伤害，命中目标后将对范围120内的敌人造成最高5000点爆炸伤害，\n-裂地者导弹将被判定为战术武器。\n-量产化多弹头中型弹道导弹，其弹药携带大量子弹头，能够进行大面积的低精度火力覆盖，\n-更棒的是，这些子弹头自身也会被拦截系统识别并触发，\n-因此，该导弹十分适合用来过载主动拦截系统，\n-或者对大面积铺开的低强度敌人进行毁灭性的火力覆盖。
displayRemainingStockpile: true
highPriorityQueue: false
onlyOneUnitAtATime: true
whenBuilding_playAnimation: 舱盖
iconImage: X.png
stopLastAnimation: true
isLocked: if self.queueSize > 0.5 or not self.globalTeamTags(includes='弹幕架3')
isLockedMessage: 你需要弹幕架3，或者其他动作进行中，请等待。


[action_5]
fireTurretXAtGround: 5
text: 发射地狱烈焰导弹
price:energy=6
displayType: action
buildSpeed: 2s
pos: 0.3
description: -地狱烈焰导弹将被判定为战略武器，发射后，将生成一处导弹落点标记，\n-并可自行修正落点，导弹将在发射后12秒命中目标，\n-导弹将对地面单位造成伤害，命中目标后将对范围300内的敌人造成6000点无衰减爆炸伤害，\n-反掩体，对生物单位伤害加成，且对极端重型单位效果差，并将范围内所有单位施加最大燃烧效果，同时将产生范围300的燃烧区，\n-持续对范围内单位施加中性伤害，持续22秒，对生物单位和建筑伤害加成。\n-结合最新的纳米灼丝技术与天空螺旋弹体制造出的弹道燃烧导弹，\n-该弹头落地后形成的高温燃烧火墙拥有巨大的毁伤面积，\n-不管事封锁道路，摧毁建筑单位抑或是给予聚在一起的敌人当头棒喝，\n-该弹药都能完美的完成。
displayRemainingStockpile: true
highPriorityQueue: false
onlyOneUnitAtATime: true
whenBuilding_playAnimation: 舱盖
iconImage: 火焰.png
stopLastAnimation: true
isLocked: if self.queueSize > 0.5 or not self.globalTeamTags(includes='温压弹2')
isLockedMessage: 你需要空气燃料炸弹2，或者其他动作进行中，请等待
[action_核弹]
displayType: action
price: energy=12,70000,钍=700
buildSpeed: 0s
pos: 1
text: 部署和平守卫者
whenBuilding_cannotMove:true
onlyOneUnitAtATime: true
canPlayerCancel: false
description: 终极武器，无法拦截，建造后将生产一枚携带三枚分弹头的和平守卫者导弹，\n-生产无法取消，且生产期间导弹基地无法补充弹药或发射其他任何导弹。\n-发射后，将生成3处导弹落点标记，并可自行手动修正导弹落点，\n-三枚导弹将分别在发射后的12秒/20秒/28秒命中指定的三个目标，\n-并将对目标点为圆心，范围750以内的敌方地面，空中，高空单位，\n-造成最高100000点中性伤害，以及大量附加中性伤害(冲击波)，\n-并且将瞬间斩杀距离爆心150范围内的任何地面单位，不包括处于无敌状态的单位和水下单位。\n-计算伤害时和平守卫者将被视为战略武器，\n-部署和平守卫者的巨大雷达信号是无法隐藏的，开始部署即会警告在场的所有玩家，请注意。\n-同一时间只能部署一颗。和平守卫者是人类有史以来威力最为强大的核武器，\n-其战斗部为三个一亿吨TNT炸药当量的氢弹分弹头，\n-推进部则是直接利用战前遗留的载人或载货火箭改装而来，\n-由于这种改装并未考虑体积原因，因此弹体过于巨大，发射井甚至无法完全容纳，\n-其拥有能覆盖到月球和地球上任意一处地方的航程与极其恐怖的威力，\n-就像那句古老史诗记载的那样\n-“现在我成了死神，世界的毁灭者”。
showMessageToAllPlayers: 监测到和平守卫者
isLocked: if (not self.globalTeamTags(includes='纳米煅炉') and not self.globalTeamTags(includes='同步轨道加速器')) or self.queueSize > 0.5 or not self.globalTeamTags(includes='裂变技术2') or self.globalTeamTags(includes='有和平了')
isLockedMessage: 你需要裂变技术2，以及同步轨道加速器以及模块化纳米锻炉的其中之一，\n-或者你已经部署了一枚和平守卫者了，\n-或者其他动作进行中，请等待。
isVisible: if not self.tags(includes= '齿轮')
temporarilyAddTags:齿轮
alsoQueueAction:动画
iconImage: 和平.png
addGlobalTeamTags:有和平了
