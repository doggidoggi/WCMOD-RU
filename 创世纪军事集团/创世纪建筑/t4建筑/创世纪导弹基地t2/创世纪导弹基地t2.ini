[core]
name: 创世纪导弹基地t2
displayDescription:【阶级t4】【建筑单位】【地面单位】\n-战术定位：路基远程战略武器/战术武器发射平台。\n-无法在水上建造。\n-通过战前的固定式弹道导弹发射井改造的固定式导弹发射平台，\n-这种经过现代化升级的发射基地能够发射多种类型的弹药，\n-同时容量也获得了巨大的升级，可以在发射井内储存为数不少的待发弹，\n-作为创世纪综合性价比最高的多用途弹道打击力量，\n-这种导弹基地发射的多种重型导弹在战斗中的重要性是任何机动发射平台都无法替代的。
class: CustomUnitMetadata
price: 15000,钍=300,bj= ${bjxq}
@global bjxq: 30
reclaimPrice: bj= ${bjxq}
maxHp: 60000
effectOnDeath: CUSTOM:烟雾s*4, CUSTOM:爆破*8,largeExplosion
unitsSpawnedOnDeath:建筑损毁,清理标签
footprint: -6,-1,6,6
constructionFootprint: -6,-1,6,6
techLevel: 1
buildSpeed: 60s
radius: 100
displayRadius: 100
isBuilding: true
isBio: false
copyFrom: ROOT:/通用特效/单位防护.ini
armour: 30

energyMax: 12
energyRegen: 0
energyNeedsToRechargeToFull: false
energyStartingPercentage: 0
