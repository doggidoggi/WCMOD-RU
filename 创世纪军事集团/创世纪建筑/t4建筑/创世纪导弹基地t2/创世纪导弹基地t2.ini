[action_核弹]
displayType: action
price: energy=12,70000,钍=700
buildSpeed: 0s
pos: 1
text: развёртыватьХранитель мира
whenBuilding_cannotMove:true
onlyOneUnitAtATime: true
canPlayerCancel: false
description: 终极оружие，无法перехватывать，строить后将производство一枚несёт三枚分弹头的Хранитель мираракета，\n-производство无法取消，且производство期间Ракетная база无法补充弹药或запускать其он任何ракета。\n-запускать后，将生成3处ракетаточка приземления标记，иможно自行手动修正ракетаточка приземления，\n-三枚ракета将分别在запускать后的12秒/20秒/28秒命中指定的三个目标，\n-и将对目标点为圆心，范围750с内的вражеский地面，空中，высотныйюнит，\n-造成самый高100000点нейтральный урон，а такжебольшое количество附加нейтральный урон(冲击波)，\n-и且将мгновенно斩杀距离爆心150范围内的任何наземный юнит，不包括处于无敌状态的юнит和подводныйюнит。\n-计算伤害时Хранитель мира将被视为стратегическое оружие，\n-развёртыватьХранитель мира的огромный雷达信号是无法隐藏的，开始развёртывать即会警告在场的все玩家，请Внимание。\n-同一时间толькоможетразвёртывать一颗。Хранитель мира是человечество有史с来мощностьсамый为мощный核оружие，\n-其бой部为三个一亿吨TNT炸药当量的氢弹分弹头，\n-推进部则是直接использоватьдовоенный遗留的载人或载货火箭модифицироватьа来，\n-из-за这видмодифицироватьи未考虑体积原因，поэтому弹体过于огромный，запускать井даже无法完全容纳，\n-其иметьможет覆盖доЛуна和地球上任意一处地方的航程与крайне恐怖的мощность，\n-就像那句古老史诗记载的那样\n-“сейчася成了死神，世界的毁灭者”。
showMessageToAllPlayers: 监测到和平守卫者
