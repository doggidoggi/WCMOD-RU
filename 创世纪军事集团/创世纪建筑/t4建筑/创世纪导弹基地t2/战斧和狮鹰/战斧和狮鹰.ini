energyMax: 12
energyRegen: -0.01
fogOfWarSightRange: 40
explodeOnDeath: false
energyStartingPercentage: 1

[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true
[hiddenAction_不能这么干]
autoTrigger:if self.hasActiveWaypoint(type='patrol') or self.hasActiveWaypoint(type='guard')
clearAllWaypoints: true
showMessageToPlayer:导弹不能执行巡逻或者保护单位的命令。
[hiddenAction_添加]
autoTrigger: if self.resource.1>0.5 and not self.tags(includes= '1号')
temporarilyAddTags:1号

[hiddenAction_添加1]
autoTrigger: if self.resource.2>0.5 and not self.tags(includes= '2号')
temporarilyAddTags:2号



[hiddenAction_添加2]
autoTrigger: if self.resource.4>0.5 and not self.tags(includes= '4号')
temporarilyAddTags:4号



[hiddenAction_损坏]
spawnUnits:战斧和狮鹰1(addResources=1:1,spawnSource= self.getOffsetRelative(x= 0, y= 0,dirOffset=0))
autoTrigger: if self.isEnergyEmpty() and self.tags(includes= '1号')
deleteSelf: true


[hiddenAction_损坏1]
autoTrigger: if self.isEnergyEmpty() and self.tags(includes= '2号')
deleteSelf: true


[hiddenAction_损坏zx]
spawnUnits:战斧和狮鹰1(addResources=3:1,spawnSource= self.getOffsetRelative(x= 0, y= 0,dirOffset=180))
autoTrigger: if self.isEnergyEmpty() and self.tags(includes= '4号')
deleteSelf: true


[hiddenAction_添1加1]
autoTrigger: if self.resource.2>0.5 and self.resource.3<25
fireTurretXAtGround: 2
fireTurretXAtGround_withOffset: 0,0
addResources:3=1
alsoQueueAction:添加x,添加x1,添加x2

[hiddenAction_添加x]

fireTurretXAtGround: 2
fireTurretXAtGround_withOffset: 0,0
addResources:3=1
[hiddenAction_添加x1]

fireTurretXAtGround: 2
fireTurretXAtGround_withOffset: 0,0
addResources:3=1
[hiddenAction_添加x2]

fireTurretXAtGround: 2
fireTurretXAtGround_withOffset: 0,0
addResources:3=1
[hiddenAction_添麻烦加x]
autoTrigger: if self.resource.3>=25
deleteSelf: true

