armour: 999989
techLevel: 2
radius: 0
displayRadius: 0
armourMinDamageToKeep: 0
showInEditor:false
hideScorchMark: true
disableAllUnitCollisions: true
canNotBeDirectlyAttacked: true
isUnselectable: true
isBio: false
