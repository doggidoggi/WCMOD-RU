showOnMinimap:false
energyMax: 1
energyRegen: -1
fogOfWarSightRange: 40
explodeOnDeath: false
isBuilding: true
[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true
[hiddenAction_添加]
autoTrigger: if self.isEnergyEmpty() and not self.tags(includes= '1号') and self.resource.1>0.5
temporarilyAddTags:1号
fireTurretXAtGround: 1
fireTurretXAtGround_withOffset: 0,0

[hiddenAction_添加1]
autoTrigger: if self.isEnergyEmpty() and not self.tags(includes= '2号') and self.resource.2>0.5
temporarilyAddTags:2号
fireTurretXAtGround: 2
fireTurretXAtGround_withOffset: 0,0

[hiddenAction_麻]
autoTrigger: if self.isEnergyEmpty()and (self.resource.1>0.5 or self.resource.2>0.5) and self.timeAlive(laterThanSeconds=8)
deleteSelf: true

[hiddenAction_干扰弹]
autoTrigger: if self.resource.3>0.5
fireTurretXAtGround: 干扰弹
fireTurretXAtGround_withOffset: 0,0
deleteSelf: true
