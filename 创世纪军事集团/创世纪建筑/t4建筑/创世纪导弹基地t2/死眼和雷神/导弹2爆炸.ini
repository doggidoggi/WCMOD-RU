[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true
[hiddenAction_声音]
autoTrigger: if not self.tags(includes= '声音') and self.resource.1>0.5
temporarilyAddTags:声音
playSoundAtUnit:ROOT:/通用特效/刺耳爆炸.wav
[hiddenAction_火焰区]
autoTrigger: if self.resource.1>0.5
fireTurretXAtGround: 1
fireTurretXAtGround_withOffset: 0,0


[hiddenAction_火焰区1]
autoTrigger: if self.resource.1>0.5
fireTurretXAtGround: 2
fireTurretXAtGround_withOffset: 0,0
[hiddenAction_散热]
autoTrigger: if self.resource.1>0.5
addResources:太麻烦=0.4,太麻烦1=-0.04,太麻烦2=0.01
spawnEffects: CUSTOM:上火1水*2,CUSTOM:上火1,CUSTOM:上火*3,CUSTOM:烟雾11*2,CUSTOM:冲击
[hiddenAction_损坏]
autoTrigger: if self.resource.1>0.5 and self.energy<1 and not self.tags(includes= '弹坑')
spawnEffects: CUSTOM:弹坑
temporarilyAddTags:弹坑
