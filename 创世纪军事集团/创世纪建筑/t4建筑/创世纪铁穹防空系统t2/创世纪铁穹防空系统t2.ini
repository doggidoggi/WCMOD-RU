[action_开启导弹]
text: 开启防空导弹架
displayType: action
buildSpeed: 1s
pos: 0.4
displayRemainingStockpile: false
highPriorityQueue: true
price:0
canPlayerCancel: false
onlyOneUnitAtATime: false
iconImage: ROOT:/通用特效/开.png
temporarilyAddTags:能用导弹
isVisible: if not self.tags(includes= '能用导弹')
whenBuilding_cannotMove: false
allowMultipleInQueue:false
description: 开启防空导弹架，使铁穹防空系统能发射幻象导弹攻击空中和高空中的 非伴生 单位。\n-幻象巡航导弹将造成爆炸溅射伤害，并向爆点周围释放造成大量二次伤害的爆裂物。\n-同时幻象导弹拥有长距离索敌能力，但是每枚导弹将消耗0.25能量。
isLocked: if self.queueSize > 0.5
isLockedMessage: 其他动作进行中，请等待
