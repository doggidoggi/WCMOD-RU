[core]
name: 创世纪铁穹防空系统t2
displayDescription: 【阶级t4】【长距离索敌】【防御类建筑】【建筑单位】【地面单位】【水上单位】（当部署在水上时）\n-战术定位:战略武器防御设施，\n-对于创世纪来讲，对付余晖的太空力量最实用的理论大概就是古人类的行星防御学说了。\n-以这套先进理论为基础的创世纪，很快就研发出了防御进攻两种方案：\n-后者是雷暴炮塔的雏形，而前者就是铁穹防空系统。\n-这台反导系统装备了包含拦截弹和重型防空导弹在内的多种弹药，\n-能够在执行区域拦截任务的同时进行高效率的防控工作。\n-铁穹的部署皆在为了限制余晖的航空航天力量，\n-对于创世纪而言，这座牢不可破的钢铁苍穹就是他们的天空守护神。
price: 18000,钍=300,bj= ${bjxq}
@global bjxq: 20
reclaimPrice: bj= ${bjxq}
maxHp: 70000
footprint: -7,-2,7,5
constructionFootprint: -7,-2,7,5
armour:85
techLevel: 1
buildSpeed: 45s
fogOfWarSightRange: 88
radius: 100
displayRadius: 100
copyFrom: ROOT:/通用特效/单位防护.ini
effectOnDeath: CUSTOM:烟雾s*4, CUSTOM:爆破*8,largeExplosion
unitsSpawnedOnDeath:建筑损毁
isBuilding: true
isBio: false
energyMax: 13
energyRegen: 0
energyNeedsToRechargeToFull: false
energyStartingPercentage: 0
tags: 导弹防御,地面,反高空,建筑
