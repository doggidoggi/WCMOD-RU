


[core]
name: 机枪塔t4
displayDescription: 【阶级t4】【防御类建筑】【建筑单位】【地面单位】【水上单位】（当部署在水上时）\n-战术定位：反生物机枪塔。武器配置：\n-▲20毫米机枪X2 对地对空 动能伤害 反掩体 对空中，生物，伴生单位伤害加成 \n-装备20MM机枪的防御塔，这种自动炮塔能够有效对付各种小型单位和轻装甲单位，\n-面对重甲单位时则无能为力。
