description: самый大化Зенитное орудие的уровень，加固其结构强度иувеличивает伤害和дальность，\n-увеличивает对высотныйспособностьи将伤害类 转化为动может，иусиленный урон по щитам。\n-为Зенитное орудие换装передовой轨道пусковая установка，\n-这видЗенитное орудие连Заревоистребитель的护盾都может轻松打穿，\n-может说，这вид炮塔способен营造出真正的禁飞区。

