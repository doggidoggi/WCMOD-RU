explodeEffect: CUSTOM:弹坑*1
explodeEffectOnShield: CUSTOM:弹坑*1
lightColor: #FFFFBE67
lightSize: 3
mutator7_ifUnitWithTags: 极端重型
mutator7_directDamageMultiplier: 0.8
mutator7_areaDamageMultiplier: 0.8
mutator30_ifUnitWithTags: 轻型掩护
