displayText:Жезл рассеивания тьмы
displayDescription:【Уровень t4】【Сверхтяжёлый юнит】【Оборонительное здание】【Здание】【Наземный юнит】【Надводный юнит】(при развёртывании на воде)\n-Тактическое назначение：终极по землеоборонасооружение вооружение：\n-▲同步轨道加速炮X1 только по земле кинетический урон 无视常规护甲 усиленный урон по щитам \n-一видтолькоможетразвёртывать在重 оборона基座上的实验 оборонаоружие，\n-из-за其高昂的成本和恐怖的способность使其几乎только在Генезис的Ядро区块外围появляется。\n-Жезл рассеивания тьмы是专为уничтожатьразличные地面суперюнита生的，\n-использовать同步轨道加速устройство搭建的加速装置，\n-может将огромный的磁化钨棒推进至高超音速，с破云之势将来犯之敌一击贯穿。\n-就像он的名字一样，这вид重 оборона平 запускать的呼啸磁棒足с撕开暗夜，为不屈的反抗者们带来光明。
