description: 该юнит有способность射击极далеко距离上的被锁定юнит。\n-允许Система ПРО «Гроза»在攻击地面，空中或者высотный中的 被锁定 вражескийюнит时，\n-использовать无限дальность的Ракета «Ураган»攻击враг，\n-Ракета «Ураган»将自动追击被锁定的вражескийюнит，\n-и持续对вражескийюнит造成взрывной урон，\n-每颗Ракета «Ураган»может持续开火30秒，\n-и优先攻击离самсамыйблизко的，被锁定的вражескийюнит。

