[core]
name: 雷暴导弹防御系统
displayText:Система ПРО «Гроза»
displayDescription:【Уровень t4】【Дальнее целеуказание】【Сверхтяжёлый юнит】【Оборонительное здание】【Здание】【Наземный юнит】【Надводный юнит】\n-(при развёртывании на воде)Тактическое назначение：终极универсальный оборонасооружение вооружение：\n-▲聚变торпедапусковая трубаX16 по земле по воздуху 对высотный 无法攻击伴生юнит энергетический урон\n-▲Ракета «Ураган»пусковая установкаX1 толькоможет攻击地面 空中 высотный中被锁定的юнит  взрывной урон\n-Система ПРО «Гроза»是Генезис为了Ядро区域免受Заревобоевой корабль威胁，\n-и学习Древние Люди星球оборона理论后разрабатывать的终极оборонасооружение。\n-这个恐怖的蜂巢在搭载了может通过3d打印实时补充的大ракета的одновременно，\n-ещёиметьбольшое количество定向聚变торпеда，хотя该平 的разрабатывать初衷是轨道оборона，\n-но这些ракетапо земле攻击такжедовольно行之эффективный，\n-однако，в качествеГенезиснемногиеможет直接威胁轨道боевой корабль的оборона性оружие，\n-其产量весьма稀少，толькоможет在ГенезисЯдро区域看доони。
armour: 120
price:35000,钍=638,bj= ${bjxq}
@global bjxq: 45
reclaimPrice: bj= ${bjxq}
maxHp:90000
mass:9000
buildSpeed:12s
