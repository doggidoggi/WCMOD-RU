[core]
name: 雷暴导弹防御系统
displayText:雷暴导弹防御系统
displayDescription:【阶级t4】【长距离索敌】【极端重型单位】【防御类建筑】【建筑单位】【地面单位】【水上单位】\n-（当部署在水上时）战术定位：终极泛用型防御设施 武器配置：\n-▲聚变鱼雷发射管X16 对地 对空 对高空 无法攻击伴生单位 能源伤害\n-▲飓风导弹发射器X1 只能攻击地面 空中 高空中被锁定的单位  爆炸伤害\n-雷暴导弹防御系统是创世纪为了核心区域免受余晖战舰威胁，\n-并学习古人类星球防御理论后研发的终极防御设施。\n-这个恐怖的蜂巢在搭载了可以通过3d打印实时补充的大导弹的同时，\n-还拥有大量定向聚变鱼雷，虽然该平台的研发初衷是轨道防御，\n-但这些导弹对地攻击也相当行之有效，\n-不过，作为创世纪少数能直接威胁轨道战舰的防御性武器，\n-其产量十分稀少，只能在创世纪核心区域看到他们。
armour: 120
price:35000,钍=638,bj= ${bjxq}
@global bjxq: 45
reclaimPrice: bj= ${bjxq}
maxHp:90000
mass:9000
buildSpeed:12s
selfRegenRate: 2
fogOfWarSightRange: 102
footprint:-8,-6,8,7
constructionFootprint:-8,-6,8,7
copyFrom: ROOT:/通用特效/单位防护.ini
unitsSpawnedOnDeath:建筑损毁*2
effectOnDeath: CUSTOM:烟雾*5, CUSTOM:爆破*12
techLevel:1
radius:100
buildingSelectionOffset: -8
isBuilding: true
isBio: false
tags:地面,建筑,极端重型,jabzhdja,防御建筑,本来就有啊,反高空,免疫烟雾
