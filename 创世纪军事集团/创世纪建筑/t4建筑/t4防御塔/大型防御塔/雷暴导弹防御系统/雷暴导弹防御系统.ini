description: 该单位有能力射击极远距离上的被锁定单位。\n-允许雷暴导弹防御系统在攻击地面，空中或者高空中的 被锁定 敌方单位时，\n-使用无限射程的飓风导弹攻击敌人，\n-飓风导弹将自动追击被锁定的敌方单位，\n-并持续对敌方单位造成爆炸伤害，\n-每颗飓风导弹能持续开火30秒，\n-并优先攻击离自己最近的，被锁定的敌方单位。

