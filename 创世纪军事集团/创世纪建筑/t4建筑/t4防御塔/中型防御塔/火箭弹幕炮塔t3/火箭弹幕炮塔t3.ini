[core]
name: 火箭弹幕炮塔t3
displayText: Ракетная башняt3
displayDescription: 【Уровень t4】【Оборонительное здание】【Здание】【Наземный юнит】【Надводный юнит】(при развёртывании на воде)\n-Тактическое назначение：重 далеко程反群体ракетная установка，вооружение：\n-▲火箭弹пусковой отсекX2 только по земле взрывной урон 对极端重 юнитэффект差 爆炸后生成爆裂物\n-▲противокорабельныйракетный отсекX2 толькоможет攻击надводный юнит взрывной урон \n-充分运用Реактивная установка技术，имеет встроенныйбольшое количество火箭弹的中 оборона炮 ，\n-способен凭借着恐怖的огневая мощь爆 迅速摧垮враг的наступление，\n-одновременноещёможетиспользовать极далеко的удар范围压制вражеский炮兵和далеко程огневая мощь。\n-нонуждаетсяВнимание的是，其爆 完后，обладать较长的перезаряжает时间。
