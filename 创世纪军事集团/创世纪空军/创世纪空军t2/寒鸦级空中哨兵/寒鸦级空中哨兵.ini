[core]
name: 寒鸦级空中哨兵
class: CustomUnitMetadata
displayDescription: 【阶级t4】【机械单位】【空中单位】【高空单位】【战术武器防御】【需要停机坪】【弹药有限】\n-战术定位:先进功能型战机，武器配置：▲电磁脉冲线圈X1 对地对空对高空 中性伤害 对护盾伤害加成 附带休克效果 \n-寒鸦空中作战辅助系统是创世纪随着战场态势更新而研发的一款全新武器，\n-寒鸦放弃了常规的导弹，重炮等武器，\n-转而在机身上装备了大量的实验型武器。\n-有传言称寒鸦的机组成员中科学家的数量甚至比士兵还多，\n-战争末期的几乎每一场大规模战役中都能见到寒鸦在阵线后方默默为友军提供支援，\n-其上的各种新科技有着几乎决定战役走向的能力。\n-但比较可惜的是由于高昂的造价使创世纪没能力大规模列装寒鸦，\n-为此当一只寒鸦出现于天空时，便是创世纪下一次大规模行动的预兆。
price: 8000,tjp= ${tjpxq},bj= ${bjxq},钍=100
@global tjpxq: 1
@global bjxq: 15
reclaimPrice: tjp= ${tjpxq},bj= ${bjxq}
maxHp: 9500
fogOfWarSightRange: 55
techLevel: 1
selfRegenRate: 0.7
buildSpeed: 30s
copyFrom: ROOT:/通用特效/单位防护.ini
availableInDemo: true
armour: 20
radius: 80
displayRadius: 80
softCollisionOnAll: 10
isBio: false
tags: 飞机,反高空,高空,大炸鸡
energyMax: 60
energyRegen: 0
energyNeedsToRechargeToFull: true
canOnlyBeAttackedByUnitsWithTags:反高空
effectOnDeath:CUSTOM:碎片,CUSTOM:碎片1,CUSTOM:碎片2,CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
effectOnDeathGroundCollision: CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
