


[core]
name: 超战机1
displayText:超战机
showInEditor: false
displayDescription:【阶级t4】【机械单位】【空中单位】【高空单位】【长距离索敌】\n-战术定位:先进空优战斗机，武器配置：▲轨道炮X2 只能对高空 动能伤害 \n-▲反舰鱼雷X2 只能对高空 爆炸伤害 ▲机炮X4 对空对高空 动能伤害 \n-▲粉碎者转轮炮X2 对空对高空 爆炸伤害 ▲空对空导弹X2 只能对高空 爆炸伤害\n-▲长距离索敌空对空导弹X2 只能攻击被锁定的空中和高空单位 爆炸伤害\n-一种由科普斯军事研究所设计，并结合了多方科技诞生的超级战机，\n-超战机是创世纪夺取制空权的底牌，没有之一，\n-在拥有完全碾压所有制空机速度与机动性的同时，\n-超战机还拥有蔑视一切常规战机的凶悍火力与极限射程。\n-超战机能在任何已知的余辉空中单位的战斗中稳操胜券，\n-甚至凭借它所搭载威力恐怖的轨道炮和鱼雷，就连星舰也难逃被击落的命运。\n-在战争末期的战役中，超战机使无数高高在上的星舰在地面坠毁。
price: 7000,钍=70
maxHp: 12000
techLevel: 1
buildSpeed: 30s
fogOfWarSightRange: 35
armour: 7
radius: 54
displayRadius: 54
isBio: false
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/扎针1.md
softCollisionOnAll: 10
energyMax: 6
energyRegen: 0.024
energyNeedsToRechargeToFull: true
tags: 飞机,高空,反高空,超战机
canOnlyBeAttackedByUnitsWithTags:反高空
effectOnDeath:CUSTOM:碎片,CUSTOM:碎片1,CUSTOM:碎片2,CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
effectOnDeathGroundCollision: CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
showActionsWithMixedSelectionIfOtherUnitsHaveTag: 超战机
