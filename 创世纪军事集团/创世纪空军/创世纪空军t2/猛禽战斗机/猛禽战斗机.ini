


[core]
name: 猛禽战斗机
displayText: Истребитель «Хищник»
displayDescription: 【Уровень t4】【Механический юнит】【Воздушный юнит】【Высотный юнит】【Дальнее целеуказание】【雷达隐形】\n-Тактическое назначение:空优боймашина，вооружение：▲ракета «воздух-воздух»X2 по воздуху对высотный взрывной урон \n-▲长距离целеуказаниеракета «воздух-воздух»X2 толькоможет攻击被锁定的высотныйюнит взрывной урон\n-Хищникистребитель在довоенный便是человечествосамыйпродвинутый制空истребитель的代言人，\n-можетэффективныйуменьшает反射面的外形与隐形涂层使она一度становиться黑暗中的隐形杀手，\n-война开始后幸存下来的F22被统一改造成黑色Хищникистребитель，\n-这видтольконемного配 给элитный部队的боймашинаобладать无与伦比的манёвренность和огневая мощь，\n-比起Генезис其он空优истребитель，Хищник飞得более高более快，载荷量более大，особенно是对Заревобоевой корабльболее为смертельный，\n-其挂载的新 ракета «воздух-воздух»можетэффективный毁伤帝国余辉的部分боевой корабль。
