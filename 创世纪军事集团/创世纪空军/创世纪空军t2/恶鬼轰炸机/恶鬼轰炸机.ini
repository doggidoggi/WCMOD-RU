[core]
name: 恶鬼轰炸机
displayText: Бомбардировщик «Демон»
class: CustomUnitMetadata
displayDescription: 【Уровень t4】【Механический юнит】【Воздушный юнит】【нуждаетсяАэродром】【弹药有限】Тактическое назначение:高速бомбардировщик，\n-только по земле，根据загружает弹药类 不同决定дальность，伤害，伤害类 等。\n-Бомбардировщик «Демон»早在довоенный就被大масштабпроизводство，是有史с来第一款完全无人操作的стратегиябомбардировщик。\n-恶鬼的Ядро技术来源于破译了的Древние Люди部分科研数据，\n-и结合了человечество现有的技术разрабатывать出来的新式бомбардировщик。\n-在保留了中 бомбардировщик的高速与灵活的情况下又иметь着不亚于重 бомбардировщик的挂载способность，\n-передовой隐形技术позволяетонможет轻易的突破довоенныйвсе雷达阵列，\n-независимо от从何вид角度出 评判，恶鬼的всеспособность几乎无можно挑剔。\n-а在Зарево入侵开始后，Бомбардировщик «Демон»极高的соотношение цена/качество与庞大的库存，\n-позволяетон饱受Генезис军官的青睐，даже если是在资源紧缺的情况下依旧может实现量产，\n-这款бомбардировщик击毁过бесчисленные的Заревоюнит，为Генезис立下了赫赫战功。\n-однако有趣的是，потому чтодовоенный版本采用了部分Древние Люди遗留在Луна上的дрон技术，\n-приводит к其系统может被Зарево轻易破解，поэтомупослевоенный统一改造成了载人操作版本。
price: 9000,tjp= ${tjpxq}
@global tjpxq: 1
