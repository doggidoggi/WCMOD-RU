


[core]
name: 战隼攻击机
displayText: Штурмовик «Боевой Сокол»
displayDescription:【Уровень t4】【Механический юнит】【Воздушный юнит】Тактическое назначение:по земле/противолодочный攻击машина\n-вооружение：▲重 转轮炮X1 по земле и воздуху кинетический урон пробивает укрытия 对极端重 юнит伤害加成\n-▲по земле火箭弹X6 только по земле взрывной урон 对极端重 юнит伤害加成 \n-▲Дрон «Колибри»X2 по земле и воздуху кинетический урон пробивает укрытия ▲深水炸弹X1 толькоможетпротиволодочный взрывной урон\n-Штурмовик «Боевой Сокол»是КорпусИнститутсамый新разрабатывать的по земле攻击вертолёт，\n-这вид造 怪异，проектировать奇特的攻击машина在проектировать上得до了Скитальцыбольшое количество的援助，\n-а这всё的结晶就是Штурмовик «Боевой Сокол»。\n-这вид先наступление击машинаиметь极大的运载量和较高的скорость，\n-与此одновременно，онещё挂载了深水炸弹和противотанковыйракета，\n-是地面重 юнит的终极杀手，几乎没有任何наземный юнитможет在战隼的удар下下逃脱。
