


[core]
name: 战斗雷霆机库
strictLevel: 1
price: 0
radius: 10
maxHp: 1

class: CustomUnitMetadata
showInEditor: false
canNotBeDirectlyAttacked: true
disableDeathOnZeroHp: true
isUnrepairableUnit: true

isUnselectable: true
disableAllUnitCollisions: true
hideScorchMark: true
ignoreInUnitCapCalculation: true
maxTransportingUnits: 6

transportUnitsCanUnloadUnits: false
transportUnitsAddUnloadOption: false
transportUnitsRequireTag: 战斗雷霆
transportUnitsHealBy: 4
transportUnitsRequireMovementType: air
tags:反高空,免疫烟雾
transportUnitsKeepBuiltUnits: true
@memory 灰机: number
[hiddenAction_有链炮]
autoTrigger: if parent.tags(includes= '用链炮') and self.hasParent 
temporarilyAddTags: 用链炮
temporarilyRemoveTags:用激光,用赛博
[hiddenAction_有激光]
autoTrigger: if parent.tags(includes= '用激光') and self.hasParent 
temporarilyAddTags: 用激光
temporarilyRemoveTags:用链炮,用赛博
[hiddenAction_有赛博]
autoTrigger: if parent.tags(includes= '用赛博') and self.hasParent 
temporarilyAddTags: 用赛博
temporarilyRemoveTags:用链炮,用激光
[graphics]
image: NO.png
#isVisible: false
disableLowHpSmoke: true
showQueueBar: false
showTransportBar: false
showEnergyBar: false
showShotDelayBar:false

[attachment_drone1]
x: 75
y: 100
isVisible:true
addTransportedUnits: true
canAttack: false
setDrawLayerOnBottom:false
lockRotation:true
idleDir: 45
[attachment_drone2]
@copyFromSection: attachment_drone1
x: 75
y: 125
[attachment_drone0]
@copyFromSection: attachment_drone1
x: 75
y: 150

[attachment_drone3]
@copyFromSection: attachment_drone1
x: -75
y: 100
idleDir: -45
[attachment_drone4]
@copyFromSection: attachment_drone1
x: -75
y: 125
idleDir: -45
[attachment_drone5]
@copyFromSection: attachment_drone1
x: -75
y: 150
idleDir: -45
[hiddenAction_0]
autoTrigger: if not self.hasParent
deleteSelf: true


[hiddenAction_drone]
autoTrigger: if self.queueSize < 0.5 and memory.灰机 < 6
alsoQueueAction: SDD


[hiddenAction_SDD]
buildSpeed: 4.5s
requireConditional: if memory.灰机 < 6
addUnitsIntoTransport: 战斗雷霆


[hiddenAction_set0]
autoTriggerOnEvent: newMessage(withTag= '灰机a')
setUnitMemory: 灰机 = memory.灰机 + 1


[hiddenAction_set1]
autoTriggerOnEvent: newMessage(withTag= '灰机d')
setUnitMemory: 灰机 = memory.灰机 - 1


[attack]
canAttack: true
canAttackFlyingUnits: true
canAttackLandUnits: false
canAttackUnderwaterUnits: false
maxAttackRange: 3500


[turret_233]
x: 0
y: 0
projectile: 233
delay: 0s
canAttackMaxAngle: 181
warmup:3s
invisible: true
canAttackFlyingUnits: if self.isInMap
canAttackLandUnits: false
canAttackUnderwaterUnits: false
unloadUpToXUnitsAndGiveAttackOrder: 1
[projectile_233]
life: 0
deflectionPower: -1
directDamage: 0
invisible: true

[movement]
movementType: AIR
maxTurnSpeed: 9999
turnAcceleration: 9999

