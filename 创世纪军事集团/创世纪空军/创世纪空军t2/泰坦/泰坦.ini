name: 泰坦
displayDescription: 【阶级t4】【机械单位】【空中单位】【高空单位】【英雄单位】【战术武器防御】【战略武器防御】\n-战术定位:游戏终结者，武器配置：▲重型火箭弹幕炮X6 只能对地 爆炸伤害 \n-▲特米纳斯浮空雷发射舱X2 对地对空对高空 爆炸伤害 ▲火神炮X4 对空对高空 动能伤害\n-▲旋风SRM发射舱X4 对空对高空 爆炸伤害 ▲高射炮X8 只能对高空 爆炸伤害\n-▲玄鸟轰炸机X6 只能对地 爆炸伤害 ▲战斗雷霆X6 对空对高空 动能伤害 \n-泰坦是创世纪尖端航空航天技术王冠上最璀璨夺目的瑰宝，是一座真正的空天要塞。\n-创世纪将最先进的武器，最先进的战术，乃至最精锐的作战人员全部毫无保留的用于其上。\n-巨大的裂变反应堆赐予他无穷的动力，宽广的飞行甲板与大量舰载机赋予了它无与伦比的远程打击的能力，\n-泰坦能够如同上帝一般从天空对任何来犯之敌降下毁灭性的浩劫。\n-不论有何种作战需要，无论面对的敌人有多么强大，剿灭敌人还是支援战场，\n-泰坦总能以优雅的姿态完成一项项似乎不可能完成的任务，\n-这是人类天空的守护神，也是一座象征着人类不屈精神的丰碑。
