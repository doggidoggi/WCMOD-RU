description: 命令Титан的目标定位Ядро标记一片区域，对目标地区进行стратегия核弹齐射。\n-использовать后，将对选定的目标区域вокруг450范围内的地面вражескийюнит进行标记，\n-之后，Титан将использовать核弹对被标记的юнит进行持续40秒的连续射击，\n-核弹攻击距离为无限，每 核弹将对范围200内的вражескийназемный юнит，\n-造成самый高18000点может源溅射伤害，стратегия核弹将被视为стратегическое оружие，\n-использовать这项技может将会耗尽всеможет量，一旦использовать将无法取消，\n-одновременно将警告在场все玩家，请Внимание。
