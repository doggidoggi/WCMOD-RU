displayText: Титан
displayDescription: 【Уровень t4】【Механический юнит】【Воздушный юнит】【Высотный юнит】【英雄юнит】【Защита от тактического оружия】【Защита от стратегического оружия】\n-Тактическое назначение:游戏终结者，вооружение：▲重 火箭弹幕炮X6 только по земле взрывной урон \n-▲Парящая мина «Терминус»пусковой отсекX2 по земле и воздуху对высотный взрывной урон ▲火神炮X4 по воздуху对высотный кинетический урон\n-▲旋风SRMпусковой отсекX4 по воздуху对высотный взрывной урон ▲Зенитное орудиеX8 только по высотным взрывной урон\n-▲Бомбардировщик «Чёрная Птица»X6 только по земле взрывной урон ▲Боевой громX6 по воздуху对высотный кинетический урон \n-Титан是Генезис尖端воздушный航天技术王冠上самый璀璨夺目的瑰宝，是一座真正的空天Крепость。\n-Генезис将самыйпередовойоружие，самыйпередовойтактика，вплоть досамыйэлитный的сражениеперсонал全部毫无保留的используется для其上。\n-огромный的裂变реактор赐予он无穷的动力，宽广的飞行甲板与большое количество舰载машина赋予了он无与伦比的далеко程удар的способность，\n-Титанспособен如同上帝一般从天空对任何来犯之敌降下毁灭性的浩劫。\n-不论有何видсражениенуждается，независимо от面对的враг有多么мощный，剿灭врагещё是поддержкаполе боя，\n-Титан总можетс优雅的姿态完成一项项似乎неможет完成的任务，\n-这是человечество天空的守护神，также是一座象征着человечество不屈精神的丰碑。
