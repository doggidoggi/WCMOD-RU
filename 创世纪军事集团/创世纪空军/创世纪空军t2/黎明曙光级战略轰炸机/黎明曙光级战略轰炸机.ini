[core]
name: 黎明曙光级战略轰炸机
class: CustomUnitMetadata
displayDescription: 【阶级t4】【机械单位】【极端重型单位】【空中单位】【高空单位】【需要停机坪】【弹药有限】【长距离索敌】\n-战术定位:先进重型轰炸机，\n-根据携带弹药的不同而决定对地/对空/伤害类型/伤害以及射程。\n-战前生产的各式战略轰炸机早已在开战初期被余晖摧毁殆尽，\n-创世纪空军急需重建远程空中战略打击力量应对余晖的各种庞然大物。\n-黎明曙光是科普斯军事研究所按照战前PAK DA计划为蓝本制造的新一代战略轰炸机，\n-其拥有极其恐怖的载弹量和远程打击能力，足以威慑到所有已知的余晖单位，\n-他甚至可以飞抵近地轨道，并以多种手段快速收割战略目标。\n-黎明曙光可以挂载巡航导弹对地面进行精确打击，\n-哪怕是超级单位也几乎可以一击必杀，只需一击就能将其变成燃烧的废墟，\n-她甚至还可以携带反舰导弹，给余辉战舰重重一击。\n-正如她的名字一样，她就是人类无尽黑暗之中的一丝黎明曙光。
price: 17500,tjp= ${tjpxq},bj= ${bjxq},钍=200
@global tjpxq: 1
@global bjxq: 25
reclaimPrice: tjp= ${tjpxq},bj= ${bjxq}
maxHp: 30000
selfRegenRate: 0.7
techLevel: 1
buildSpeed: 70s
availableInDemo: true
radius: 60
displayRadius:90
energyMax: 60
energyRegen: 0
fogOfWarSightRange: 43
energyNeedsToRechargeToFull: true
isBio: false
softCollisionOnAll: 30
copyFrom: ROOT:/通用特效/单位防护.ini
armour: 105
effectOnDeath:CUSTOM:碎片,CUSTOM:碎片1,CUSTOM:碎片2,CUSTOM:碎片3,CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
effectOnDeathGroundCollision: CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
tags: 飞机,高空,大炸鸡,反高空,极端重型
canOnlyBeAttackedByUnitsWithTags:反高空
