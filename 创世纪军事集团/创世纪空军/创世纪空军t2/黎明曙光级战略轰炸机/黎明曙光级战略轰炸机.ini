[core]
name: 黎明曙光级战略轰炸机
displayText: Стратегический бомбардировщик класса «Заря»
class: CustomUnitMetadata
displayDescription: 【Уровень t4】【Механический юнит】【Сверхтяжёлый юнит】【Воздушный юнит】【Высотный юнит】【нуждаетсяАэродром】【弹药有限】【Дальнее целеуказание】\n-Тактическое назначение:продвинутый重 бомбардировщик，\n-根据несёт弹药的不同а决定по земле/по воздуху/伤害类 /伤害а такжедальность。\n-довоенныйпроизводство的各式стратегиябомбардировщик早已在开战начало被Заревоуничтожать殆尽，\n-Генезис空军急需重建далеко程空中стратегияудар力量противостоятьЗарево的различные庞然大物。\n-Заря是Военный институт Корпуса按照довоенныйPAK DA计划为蓝本производить的新一代стратегиябомбардировщик，\n-其иметькрайне恐怖的载弹量和далеко程ударспособность，足с威慑довсе已知的Заревоюнит，\n-ондажеможет飞抵близко地轨道，ис多вид手段быстрый收割стратегия目标。\n-Заряможет挂载крылатая ракетапо земле面进行精确удар，\n-哪怕是суперюниттакже几乎может一击必杀，только нужно一击就может将其变成燃烧的废墟，\n-онадажеещёможетнесётпротивокорабельныйракета，给余辉боевой корабль重重一击。\n-正如она的名字一样，она就是человечество无尽黑暗之中的一丝Заря。
