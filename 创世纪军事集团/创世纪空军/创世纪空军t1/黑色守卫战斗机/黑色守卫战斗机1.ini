


[core]
name: 黑色守卫战斗机1
displayText: 黑色守卫战斗机
showInEditor: false
displayDescription: 【阶级t3】【机械单位】【空中单位】战术定位:先进空优战斗机，\n-武器配置：▲重型空对空导弹X1 只能对高空 爆炸伤害\n-▲空对空导弹X4 只能对高空 爆炸伤害 ▲机炮X1 只能对高空 动能伤害\n-黑色守卫战斗机是利用幸存的SU27，SU30，SU35，歼11等型号统一改造而来的，\n-在战前，这种多用途战斗机是大国，是强国的有力象征之一，\n-在与余辉的战斗中，这种拥有恐怖挂载能力的战斗机，\n-也在战斗中爆发出巨大的威力，甚至为数不多的余辉战舰击毁记录中有许多都是他的功劳，\n-黑色守卫战机装备精良，配备先进的合金装甲和大量重型制空武器，\n-他们可以顶着极其猛烈的炮火，在瞬间撕碎任何敢于进犯创世纪领空的敌人。
price: 3200,钍=30
maxHp: 5500

armour: 15
techLevel: 2
buildSpeed: 20s
availableInDemo: true
radius: 43
canOnlyBeAttackedByUnitsWithTags:反高空

displayRadius: 43
isBio: false
copyFrom: ROOT:/通用特效/单位防护.ini
softCollisionOnAll: 10
fogOfWarSightRange: 32
showActionsWithMixedSelectionIfOtherUnitsHaveTag: 黑手
tags: 飞机,高空,黑手,反高空
transportSlotsNeeded: 1
effectOnDeathGroundCollision: CUSTOM:爆炸*1
energyMax: 100
energyRegen: 0
energyNeedsToRechargeToFull: true
[action_先进目标定位核心1]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/目标定位1.png
text: 先进目标定位核心1
isActive: false
isVisible: if self.globalTeamTags(includes='目标定位1')
[hiddenAction_目标定位生效]
autoTrigger: if self.globalTeamTags(includes='目标定位1')
setUnitStats: maxAttackRange= ${attack.maxAttackRange*1.35},fogOfWarSightRange= ${core.fogOfWarSightRange*1.35}
[action_弹幕架3]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/弹幕3.png
text: 弹幕架3
isActive: false
isVisible: if self.globalTeamTags(includes='弹幕架3')
[action_b]
displayType: action
price: 0
buildSpeed: 5s
isVisible: true
whenBuilding_cannotMove: false
text:降低高度
description: 降低黑色守卫战斗机的高度，使其成为常规空中单位。\n-恢复射程和对常规空中单位的能力，但失去了攻击高空单位的能力。
iconImage: ROOT:/通用特效/低空.png
allowMultipleInQueue:false
convertTo: 黑色守卫战斗机
isLocked: if self.tags(includes= '冲锋')  or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415) or self.resource.sz>0
convertTo_keepCurrentFields:maxHp,moveSpeed
convertTo_keepCurrentTags:true
temporarilyAddTags:低空
temporarilyRemoveTags:高空,反高空
[action_高空]
text: 高空单位
isVisible: true
isLocked: true
price: 0
displayType: infoOnlyNoBox
buildSpeed: 0s
pos: 0.1
iconImage: ROOT:/通用特效/高空.png
description: 处于极高高度的战机和战舰。\n-在此高度下，只有地面和空中特殊的反高空单位，以及高空单位才能攻击到该单位，\n-同时，大部分高空单位可以互相攻击，并可以攻击普通空中单位，\n-只有特殊的高空单位才能对地攻击。

[action_冲锋]
text: 加力飞行
displayType: action
buildSpeed: 0s
pos: 0.1
displayRemainingStockpile: false
isLocked: if self.queueSize > 0.5  or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
highPriorityQueue: true
price: energy=1
canPlayerCancel: false
onlyOneUnitAtATime: false
isVisible: if not self.tags(includes= '冲锋') and self.energy>99
 
description: 超载飞机引擎，暂时获得难以想象的速度。\n-开启后速度将提升50%，直至能量耗尽。\n-加速时无法升高或者降低高度。与其他增益叠加时，将取最大值。\n-如果单位处于衰解状态将移除增益。衰解时不能启用加速。
iconImage:  ROOT:/通用特效/加速.png
temporarilyAddTags: 冲锋
spawnEffects: CUSTOM:气浪1*5, CUSTOM:气浪2*5,CUSTOM:冲击波*1
[action_冲冲冲]
autoTrigger: if self.tags(includes= '冲锋') and self.energy(greaterThan=1) and self.resource.sz<0.5
isVisible: false
addResources: energy= -20
#spawnEffects:CUSTOM:闪光1
setUnitStats: moveSpeed= ${movement.moveSpeed * 1.8}

[action_冲冲]
autoTrigger: if (self.tags(includes= '冲锋') and self.energy(lessThan=1)) or self.resource.sz>0
temporarilyRemoveTags: 冲锋
isVisible: false
setUnitStats: moveSpeed= ${movement.moveSpeed * 1}

[action_冲]
autoTrigger: if not self.tags(includes= '冲锋') and self.energy(lessThan=99)
isVisible: false
addResources: energy=7
