


[core]
name: 堡垒直升机
displayDescription: 【阶级t3】【机械单位】【空中单位】\n-战术定位:反装甲直升机，武器配置：▲链炮X1 只能对地 动能伤害 反掩体 \n-▲反坦克导弹X2 只能攻击地面机械单位 无法攻击建筑物 爆炸伤害 \n-▲火箭发射舱X2 只能攻击地面建筑物 爆炸伤害\n-面对余辉的重装单位，创世纪急需一款有效的反装甲飞行器，\n-于是，创世纪将各国武装直升机统一改造为了堡垒直升机，\n-堡垒直升机配备了大量反装甲武器和重型护甲，\n-这种飞行坦克与生俱来的本领就是和防空武器正面对抗，他能在密集的防空火力下为其他空军杀出一条血路。
price: 3300
maxHp: 5500
techLevel: 1
buildSpeed: 15s
copyFrom: ROOT:/通用特效/单位防护.ini
armour: 28
radius: 39
