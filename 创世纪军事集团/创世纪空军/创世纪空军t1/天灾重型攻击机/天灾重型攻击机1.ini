price: 0
buildSpeed: 5s
isVisible: true
whenBuilding_cannotMove: false
text:降低高度
description: 降低天灾重型攻击机的高度，使其成为常规空中单位。\n-恢复对地能力和射程，但失去了攻击高空单位的能力。
