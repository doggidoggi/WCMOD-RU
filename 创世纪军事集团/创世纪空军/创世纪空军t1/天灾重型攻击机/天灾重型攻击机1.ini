


[core]
name: 天灾重型攻击机1
displayText: 天灾重型攻击机
showInEditor: false
displayDescription: 【阶级t3】【机械单位】【空中单位】战术定位:重型泛用型攻击机，\n-武器配置：▲榴弹炮X6 只能对地 爆炸伤害 \n-▲火箭发射舱X4 只能对地 爆炸伤害 ▲轨道炮X2 只能对高空 动能伤害\n-▲空对空导弹X4 只能对高空 爆炸伤害\n-为了真正能有效击沉余辉进入大气内的战舰，\n-创世纪科学家们也曾尝试打造自己的，代号为“天灾”的空天战舰，\n-但由于科技能力的限制，“天灾”计划的指标与计划最终向现实妥协。\n-万般无奈下，创世纪科学家只好利用已经成熟的技术将其改造成重型直升机。\n-天灾重型攻击机专为参加与余辉的重型攻坚战而生，\n-其携带8枚反舰导弹和最先进的轨道炮科技，\n-同时拥有采用新型合金材料打造的强固机体结构。\n-天灾重型攻击机绝对是创世纪空军中最具威力，也是最恐怖的大型攻城单位之一。
price: 8000,钍=270
maxHp: 18000
techLevel: 2
buildSpeed: 42s
fogOfWarSightRange: 38
armour: 20
radius: 82
displayRadius: 82
showActionsWithMixedSelectionIfOtherUnitsHaveTag: 天灾
isBio: false
canOnlyBeAttackedByUnitsWithTags:反高空
#effectOnDeathGroundCollision: CUSTOM:爆炸*1
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/扎针1.md
softCollisionOnAll: 10
tags: 飞机,高空,反高空,天灾
energyMax: 4
energyRegen: 0.016
energyNeedsToRechargeToFull: true
effectOnDeath:CUSTOM:碎片,CUSTOM:碎片1,CUSTOM:碎片2,CUSTOM:碎片3,CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
effectOnDeathGroundCollision: CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
