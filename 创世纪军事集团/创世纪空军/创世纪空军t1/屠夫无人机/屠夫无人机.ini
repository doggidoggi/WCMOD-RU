


[core]
name: 屠夫无人机
displayDescription: 【阶级t3】【机械单位】【无人单位】【空中单位】\n-战术定位:高速反建筑/舰船轰炸机，武器配置：\n-▲反建筑炸弹X2 只能对地 爆炸伤害 对建筑物伤害加成 \n-▲反舰鱼雷X1 只能攻击水上和潜航单位 爆炸伤害 只有在水上才能攻击 \n-屠夫无人机是一种结构简单的中型无人机，\n-强大的载重可以让屠夫无人机挂载更重的炸弹和装甲，\n-屠夫无人机经常作为突袭部队点名敌方关键单位，\n-并在投下炸弹或鱼雷后加速逃逸扬长而去。
