


[core]
name: 血翼战斗机
displayDescription: 【阶级t3】【机械单位】【空中单位】\n-战术定位:泛用型战机，武器配置：▲导弹发射舱X2 对地对空 爆炸伤害 \n-▲转轮机枪X2 对地对空 动能伤害 反掩体\n-当这种概念新颖的战斗机方案被提出时，遭到了科研界的批评风潮，\n-科学家认为，如此复杂且过于超前的战斗机不符合创世纪实际需要，\n-但这项计划却得到了太空浪人的资助和科技的支持。\n-最终，由血翼原型机组成的测试中队在一场对余辉战役中大杀四方，\n-这才让创世纪高层认可了这款造价昂贵且先进的战斗机。\n-血翼战斗机是精英中的精英，因此在创世纪空军中数量少之又少，\n-但是血翼战斗机的出动往往代表着行动的胜利。
price: 2000,钍=30
maxHp: 2000
techLevel: 1
buildSpeed: 16s
fogOfWarSightRange: 20
armour: 12
radius: 29
displayRadius: 29
isBio: false
