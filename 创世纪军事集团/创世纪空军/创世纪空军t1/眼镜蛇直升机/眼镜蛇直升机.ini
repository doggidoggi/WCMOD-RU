


[core]
name: 眼镜蛇直升机
displayDescription:【阶级t3】【机械单位】【空中单位】战术定位:步兵运输直升机，载员数量：5，\n-载员可以向外开火，只能装载生物单位。武器配置：\n-▲重机枪X1 只能对地 动能伤害 反掩体 \n-▲火箭发射舱X2 只能对地 爆炸伤害\n-眼镜蛇直升机是美国黑鹰直升机的改进版本，\n-这种装备即便是放在现在依然不过时。\n-眼镜蛇直升机配备武器的同时又具有运输能力，是战场上的多面手，\n-这种直升机能适应战场上各种各样的复杂情况。\n-因此，每一架眼镜蛇直升机都是创世纪珍贵的财富。
