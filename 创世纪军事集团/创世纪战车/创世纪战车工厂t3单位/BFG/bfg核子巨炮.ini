displayDescription:【阶级t4】【机械单位】【地面单位】【英雄单位】【无人机指挥单位】\n-战术定位:游戏终结者，无法被运输。武器配置：▲火神炮X2 对地对空 动能伤害 \n-▲巨型轨道炮X1 只能对地 能源伤害 ▲布雷器x2 只能对地 爆炸伤害\n-这是人类史上最大的远程火炮项目，也绝对是创世纪制造过最为宏伟的工业奇迹。\n-BFG是以太空浪人路基巨型反舰轨道炮为基础，创造的庞大的战略级远程打击武器。\n-其设立之初便是考虑在超远距离上，规避余辉的反导系统对其重型防御设施集群进行打击，\n-只要将他架起，Bfg那门口径硕大无比的轨道炮就能以媲美弹道导弹的射程，向目标点投放毁灭性的炮击。\n-BFG仅仅一颗普通炮弹的威力就能令整块大陆颤栗，\n-不管是余晖建立的要塞群，还是苦心经营的装甲集团，他都能在它们的视距外轻易的将其毁灭，\n-这门巨炮开火时那惊天动地的声音就仿佛吹响了创世纪军队反攻的号角。\n-英雄单位，BFG是独一无二的。
mass:999999999
techLevel: 2
transportSlotsNeeded: 200
buildSpeed: 120s
#availableInDemo: true
radius: 150
displayRadius: 150
isBio: false
softCollisionOnAll: 50
unitsSpawnedOnDeath: 小核爆*1
effectOnDeath:CUSTOM:碎片,CUSTOM:碎片1
copyFrom: ROOT:/通用特效/单位防护.ini
