description: 为BFGперезаряжает轨道标枪，\n-BFG会起до助推устройствороль将轨道标枪弹体投送至大气层之外，\n-之后轨道标枪将会加速至десятки倍音速，\n-и在引导系统的操控下落至地面命中目标，\n-对вражеский关键сооружение或者юнит造成毁灭性удар。\n-换装后，BFG将向目标запускать伤害为45000，造成动может点杀伤的炮弹。\n-轨道标枪将被视为стратегическое оружие。даже если轨道标枪может被защита от стратегического оружияперехватывать，\n-но对于некоторые没有瞬 эффект，且перехватывать弹скорость较慢的оборона系统来说，\n-有можноможетпотому что角度问题априводит к轨道标枪успех突防。
