


[core]
name: bfg炮塔
displayText: BFG-Башня
strictLevel: 1
price: 0
radius: 10
maxHp: 1
class: CustomUnitMetadata
techLevel: 1
showInEditor: false
tags: bfg炮塔
canNotBeDirectlyAttacked: true
isUnrepairableUnit: true
disableAllUnitCollisions: true
ignoreInUnitCapCalculation: true
disableDeathOnZeroHp: true
[hiddenAction_复位]
autoTrigger:if parent.tags(includes= '开始变形') and not self.tags(includes= '阻挡')
setUnitStats:maxAttackRange=0.1
temporarilyAddTags:阻挡
[hiddenAction_复位1]
autoTrigger:if parent.tags(includes= '炮管变形') and not self.tags(includes= '阻挡1')
temporarilyAddTags:阻挡1
alsoQueueAction:转换

[action_转换]
convertTo: bfg炮塔中介
displayType: action
resetUnitStats:true
price: 0
buildSpeed: 3s
isVisible: false
highPriorityQueue: true
whenBuilding_cannotMove: true
[decal_炮座影子]
image: 影子.png
total_frames: 1
layer: afterBody
#layer: onTop
isVisible:true
yOffsetRelative:0
xOffsetRelative:-5
onlyWhileAlive:true
basePositionFromTurret: 1
[decal_炮仓影子]
image: 炮仓影子.png
total_frames: 1
layer: afterBody
#layer: onTop
isVisible:true
yOffsetRelative:0
xOffsetRelative:0
onlyWhileAlive:true
basePositionFromTurret: 5
[decal_炮架影子]
image: 炮架影子.png
total_frames: 1
layer: afterBody
#layer: onTop
isVisible:true
yOffsetRelative:0
xOffsetRelative:0
onlyWhileAlive:true
basePositionFromTurret: 4
[decal_炮管影子]
image: 炮管影子.png
total_frames: 1
layer: afterBody
#layer: onTop
isVisible:true
yOffsetRelative:0
xOffsetRelative:0
onlyWhileAlive:true
basePositionFromTurret: 3
[decal_炮仓灯]
image: 炮仓灯.png
total_frames: 1
isVisible:if not parent.tags(includes= '开始变形')
#layer: afterBody
layer: onTop
yOffsetRelative:0
xOffsetRelative:0
onlyWhileAlive:true
basePositionFromTurret: 5
[decal_镭射]
image: 镭射.png
total_frames: 1
isVisible:if not parent.tags(includes= '开始变形')
#layer: afterBody
layer: onTop
yOffsetRelative:132
xOffsetRelative:33.5
onlyWhileAlive:true
basePositionFromTurret: 5
[decal_装填]
image: 装填动画.png
total_frames: 41
frame: select(self.tags(includes= '切枪'), (self.customTimer * 18) % 41, 0)
# 8为图片帧数，17改速度，1/17s下一帧
basePositionFromTurret: 5
layer:onTop
isVisible:if self.tags(includes= '切枪')
onlyWhileAlive:true
yOffsetRelative:-0.5
xOffsetRelative:-0.5

[hiddenAction_装填]
addResources: 弹药=1
[hiddenAction_装]
displayType: action
price: 0
buildSpeed: 0s
isVisible: false
whenBuilding_cannotMove:false
allowMultipleInQueue:false
autoTrigger: if self.resource.弹药>0.5 and not self.tags(includes= '切枪')
alsoQueueAction: ax
[action_ax]
displayType: action
price: 0
buildSpeed: 1s
isVisible: false
highPriorityQueue: true
whenBuilding_cannotMove: false
alsoQueueAction: bx
resetCustomTimer: true
temporarilyAddTags: 切枪
playSoundAtUnit:部署.ogg
[action_bx]
displayType: action
price: 0
buildSpeed: 2.2s
isVisible: false
highPriorityQueue: true
whenBuilding_cannotMove: false
temporarilyRemoveTags: 切枪
addResources:弹药=-1



[graphics]
total_frames: 1
image: NO.png
showQueueBar: false
showTransportBar: false
showEnergyBar: false
teamColorsOnTurret: true
showShotDelayBar:false

[attack]
