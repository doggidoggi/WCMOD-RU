layer: afterBody
#layer: onTop
isVisible:if not self.tags(includes= '切枪')
yOffsetRelative:-17
xOffsetRelative:4
[decal_炮塔动画影子]
image: 导弹动画影子.png
total_frames: 15
frame: select(self.tags(includes= '切枪'), (self.customTimer * 15) % 15, 0)
# 8为图片帧数，17改速度，1/17s下一帧
layer:onTop
isVisible:if self.tags(includes= '切枪')
onlyWhileAlive:true
yOffsetRelative:-17
xOffsetRelative:4
[decal_炮塔1]
image: 导弹动画.png
total_frames: 15
frame: select(self.tags(includes= '切枪'), (self.customTimer * 15) % 15, 0)
# 8为图片帧数，17改速度，1/17s下一帧
layer:onTop
isVisible:if self.tags(includes= '切枪')
onlyWhileAlive:true
yOffsetRelative:-14
xOffsetRelative:0

