[core]
name: 地狱火导弹平台
displayText: Платформа ракет «Адский огонь»
class: CustomUnitMetadata
price: 6000,钍=70
maxHp: 11800
displayDescription: 【Уровень t4】【Механический юнит】【Наземный юнит】Тактическое назначение:тактическое оружиезапускать平 ，\n-размер юнита:10，вооружение：▲тактикаракетапусковая трубаX1 только по земле взрывной урон 将被视为тактическое оружие \n-在余辉войнаначало，大部分的洲际弹道ракета便被余辉的精确ударуничтожать，\n-а残存的弹道ракетазапускать平 ，在经过Генезис一系列改造之后，\n-便становиться了Генезиссамый为мощный超далеко程огневая мощь。经过改造后的запускать平 можетбыстрыйразворачиватьи在целеуказание攻击后быстрый收起脱离，\n-其иметь的мощныйогневая мощьспособен在超далеко距离эффективный的удар余辉的高价值地面目标，\n-одновременно，Платформа ракет «Адский огонь»более是может根据поле боя环境搭载不同的специальный弹头сражение。\n-независимо от如何，这便是человечествосамый为мощныйвооружение昔日荣光的残存。
techLevel: 1
buildSpeed: 25s
radius: 58
displayRadius: 58
isBio: false
softCollisionOnAll: 6
tags: 地面,常规弹药
copyFrom: ROOT:/通用特效/单位防护.ini
