[core]
name: 地狱火导弹平台
class: CustomUnitMetadata
price: 6000,钍=70
maxHp: 11800
displayDescription: 【阶级t4】【机械单位】【地面单位】战术定位:战术武器发射平台，\n-单位体积:10，武器配置：▲战术导弹发射筒X1 只能对地 爆炸伤害 将被视为战术武器 \n-在余辉战争初期，大部分的洲际弹道导弹便被余辉的精确打击摧毁，\n-而残存的弹道导弹发射平台，在经过创世纪一系列改造之后，\n-便成为了创世纪最为强大的超远程火力。经过改造后的发射平台可以快速展开并在索敌攻击后快速收起脱离，\n-其拥有的强大火力能够在超远距离高效的打击余辉的高价值地面目标，\n-同时，地狱火导弹平台更是能根据战场环境搭载不同的特殊弹头作战。\n-无论如何，这便是人类最为强大武装昔日荣光的残存。
techLevel: 1
buildSpeed: 25s
radius: 58
displayRadius: 58
isBio: false
softCollisionOnAll: 6
tags: 地面,常规弹药
copyFrom: ROOT:/通用特效/单位防护.ini
unitsSpawnedOnDeath: 损毁3*1
energyMax: 8
energyRegen: 0.0085
energyNeedsToRechargeToFull: true
transportSlotsNeeded: 10
