displayText: Сияние Чёрной Вдовы1
showInEditor: false
displayDescription: 【Уровень t4】【Беспилотный юнит】【Механический юнит】【Наземный юнит】【英雄юнит】【Преодолевает утёсы】【дрон指挥юнит】【Амфибия】\n-Тактическое назначение:游戏终结者，не может транспортироваться。по земле и воздуху对высотныйпротиволодочный。\n-вооружение：▲тактика核弹пусковой отсекX2 по земле и воздуху энергетический урон ▲高爆зенитная ракетаX5 только по высотным взрывной урон \n-▲罐式РельсотронX5 только по высотным кинетический урон ▲霰弹зенитное орудиеX2 по воздуху对высотный взрывной урон \n-▲火神炮X2 по земле и воздуху对высотный кинетический урон ▲РельсотронX2 только по земле взрывной урон ▲碾压X1 только по земле нейтральный урон \n-Сияние Чёрной Вдовы的诞生，是человечество科学技术，工业производство全方位胜利的产物。\n-这个无人指挥的攻击 манёвр堡垒堪称человечество有史с来самый伟大的工业奇迹。\n-Сияние Чёрной Вдовытолькотолько是体 就已经逼близко重 авианосец，其动力源为一 大 多项聚变堆а также数个裂变堆组成，\n-其澎湃的动力может驱动Сияние Чёрной Вдовыиспользоватьмасштаб空前的оружие库和实验性оборудование，\n-независимо от того其搭载的количество惊人的тактическое оружиезапускать单元，ещё是那 口径夸张的质量投射устройство，\n-从Сияние Чёрной Вдовы的оружие库中随意跳出一вещь，都может将Зарево杀个片甲不留。\n-Сияние Чёрной Вдовыдаже独立搭载了一套重工业系统和龙  ，позволяетонможетпроизводить多вид多样的дрон，\n-称得上一人成军。человечество的勇气铸成мы不屈的坚甲，\n-人性的光辉赐予мы无尽的力量，человечество，绝不退让！
