[core]
name: 黑寡妇之耀2
displayText: 黑寡妇之耀
showInEditor: false
displayDescription: 【阶级t4】【无人单位】【机械单位】【地面单位】【英雄单位】【可翻越悬崖】【无人机指挥单位】【水陆两栖】\n-战术定位:游戏终结者，无法被运输。对地对空对高空反潜。\n-武器配置：▲战术核弹发射舱X2 对地对空 能源伤害 ▲高爆防空导弹X5 只能对高空 爆炸伤害 \n-▲罐式轨道炮X5 只能对高空 动能伤害 ▲霰弹防空炮X2 对空对高空 爆炸伤害 \n-▲火神炮X2 对地对空对高空 动能伤害 ▲轨道炮X2 只能对地 爆炸伤害 ▲碾压X1 只能对地 中性伤害 \n-黑寡妇之耀的诞生，是人类科学技术，工业生产全方位胜利的产物。\n-这个无人指挥的攻击型机动堡垒堪称人类有史以来最伟大的工业奇迹。\n-黑寡妇之耀仅仅是体型就已经逼近重型航空母舰，其动力源为一台大型多项聚变堆以及数个裂变堆组成，\n-其澎湃的动力能驱动黑寡妇之耀使用规模空前的武器库和实验性设备，\n-无论是其搭载的数量惊人的战术武器发射单元，还是那门口径夸张的质量投射器，\n-从黑寡妇之耀的武器库中随意跳出一件，都能将余晖杀个片甲不留。\n-黑寡妇之耀甚至独立搭载了一套重工业系统和龙门架，使得它能制造多种多样的无人机，\n-称得上一人成军。人类的勇气铸成我们不屈的坚甲，\n-人性的光辉赐予我们无尽的力量，人类，绝不退让！
