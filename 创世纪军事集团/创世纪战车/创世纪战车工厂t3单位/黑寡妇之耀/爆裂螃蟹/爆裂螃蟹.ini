


[core]
name: 爆裂螃蟹
displayText: «Взрывной краб»
displayDescription:огонь暴огонь乍
class: CustomUnitMetadata
price: 0
maxHp: 6000
techLevel: 1
buildSpeed: 0s
canNotBeGivenOrdersByPlayer: true
radius: 15
isBio: false
softCollisionOnAll: 20
fogOfWarSightRange: 10
selfRegenRate: 0.16
tags: 地面,射程x,伴生单位,无人单位
copyFrom: ROOT:/通用特效/单位防护.ini
fireTurretXAtSelfOnDeath: 2
energyMax: 7000
energyRegen: -1
dieOnZeroEnergy: true
[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true
[hiddenAction_转行]
convertTo: 爆裂螃蟹水下
autoTrigger: if self.isOverLiquid
isActive: false
temporarilyRemoveTags: ↯
convertTo_keepCurrentTags: true
refundAllQueuedItems: true
convertTo_keepCurrentFields:maxHp,moveSpeed
temporarilyAddTags:潜艇
[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999
[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯
[hiddenAction_zz1]
autoTrigger:if not self.isInMap
addResources: hp= -999999

[action_紫砂]
autoTrigger: if self.isOverLiquid and not self.isOverwater()
isVisible: false
addResources: hp=-999999

[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯
setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


