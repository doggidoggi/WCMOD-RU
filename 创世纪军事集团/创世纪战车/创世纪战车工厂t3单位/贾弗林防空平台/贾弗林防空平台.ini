buildSpeed: 0s
pos: 0.15
iconImage: ROOT:/通用特效/长距离.png
description: 该单位有能力射击极远距离上的被锁定单位。\n-允许贾佛林防空平台在使用主炮攻击 空中单位 和 高空单位 中的 被锁定 敌方单位时，\n-将轨道炮的射程提升至1750。
