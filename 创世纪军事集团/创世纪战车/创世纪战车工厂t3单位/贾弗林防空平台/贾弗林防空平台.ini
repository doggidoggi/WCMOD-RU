


[core]
name: 贾弗林防空平台
price: 5000,钍=40
maxHp: 18000
displayDescription: 【阶级t4】【机械单位】【地面单位】【长距离索敌】战术定位:先进反单体防空炮，\n-单位体积:8，武器配置：▲480毫米多段式轨道炮X1 对空对高空 动能伤害 \n-对极端重型单位伤害加成▲重机枪X1 对地对空 动能伤害 反掩体\n-以洲际弹道导弹移动平台为基础，改装而成的创世纪终极防空平台。\n-贾弗林配有一台480毫米口径多段式轨道炮，在钍基熔盐裂变堆的充能下，\n-轨道炮能将钨合金钢针加速到数十倍音速，哪怕击落近地轨道星舰也不在话下。\n-在各种先进的技术和夸张的指标的加持下，贾弗林成为了最行之有效的防空武器，\n-部署在创世纪核心区域的贾弗林防空平台也成为了余辉为数不多忌惮的人类兵器，\n-只可惜，在生产力几近崩溃的后期，生产超导线圈和钍裂变堆已经逐渐变成了奢求，\n-贾弗林防空平台因此只作为最后一道防线来镇守创世纪的核心区域。

techLevel: 1
buildSpeed: 17s
radius: 40
displayRadius: 40
isBio: false
transportSlotsNeeded: 8
softCollisionOnAll: 10
armour: 17
unitsSpawnedOnDeath: 损毁3*1
tags: 地面
copyFrom: ROOT:/通用特效/单位防护.ini

energyRegen: 0
energyMax: 1
energyStartingPercentage: 1
