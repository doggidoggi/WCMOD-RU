[core]
name: 黑寡妇
displayText: Чёрная Вдова
displayDescription: 【Уровень t4】【Механический юнит】【Наземный юнит】【Сверхтяжёлый юнит】【Дальнее целеуказание】【Преодолевает утёсы】\n-【дрон指挥юнит】Тактическое назначение:重 функция 攻击мех，не может транспортироваться，免疫休克，\n-вооружение：▲重 粉碎машинаX1 только по земле нейтральный урон пробивает укрытия 造成休克эффект \n-▲Дрон «Вендиго»пусковой отсекX4 по земле и воздуху взрывной урон \n-▲长距离целеуказаниеракетаX4 толькоможет攻击地面被锁定的вражескийюнит взрывной урон \n-▲зенитная ракета垂 X10 по земле и воздуху взрывной урон 对非极端重 юнит伤害加成。\n-сГенезис落后且老旧的科学技术为основа创造的奇迹。\n-Чёрная Вдова是一座无懈можно击的钢铁堡垒，огромный的身躯не только搭载了различныетактикаоборудование，\n-ещёимеет встроенный了一个функция全面的дрон工厂和数目庞大的дрон连队。\n-однакоонсамый令人印象深刻的是前端那庞大的液压粉碎машина，\n-Чёрная Вдова真正的мощность在于можетс极高的скорость хода向враг的阵线 起猛冲，\n-其庞大的身躯和液压粉碎машинаможет将余辉的花哨玩具粉碎成扭曲的金属零вещь，\n-命令Чёрная Вдова去追赶余辉的地面部队，看着они在惊恐之中被压成废铁，\n-是时候让они见识一下什么才是真正的钢铁巨兽了。
