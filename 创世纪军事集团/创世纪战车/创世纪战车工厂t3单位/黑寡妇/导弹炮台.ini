


[core]
name: 导弹炮台
strictLevel: 1
price: 0
radius: 10
maxHp: 1

class: CustomUnitMetadata
techLevel: 1
showInEditor: false
#tags:SMIB
canNotBeDirectlyAttacked: true

isUnrepairableUnit: true
disableAllUnitCollisions: true
ignoreInUnitCapCalculation: true
disableDeathOnZeroHp: true
energyMax: 4
tags:反高空
energyRegen: 0.033
energyNeedsToRechargeToFull: true
[hiddenAction_激素]
autoTrigger: if parent.resource.兴奋剂 >0 and parent.tags(includes= '冲锋')
isVisible:false
setUnitStats: shootDelayMultiplier=0.5
temporarilyAddTags: 麻烦
[hiddenAction_消耗完毕1]
autoTrigger: if parent.resource.兴奋剂<1 and self.tags(includes= '麻烦')
temporarilyRemoveTags: 麻烦
isVisible:false
setUnitStats: shootDelayMultiplier=1
[attachment_b1]
x: 0
y: 0
onCreateSpawnUnitOf: 检测中介ty(addResources= ammo: 1500 | setFlag= 1)
# 对地对空
# 600是检测范围，0：对地，1：对空，2：反潜
prioritizeParentsMainTarget: false
alwaysAllowedToAttackParentsMainTarget: false

