


[core]
name: 休克打击坦克
price: 3000,钍=45
maxHp: 8500
displayDescription: 【阶级t4】【机械单位】【地面单位】【休克免疫】战术定位:瘫痪攻击型坦克，\n-单位体积:6，武器配置：▲EMP线圈X1 只能对地，中性伤害 附带休克效果 \n-穿透护盾并对无人单位，生物单位伤害加成 反掩体 \n-休克打击坦克是创世纪科研部的一次大胆的尝试，鉴于传统的武器均无法对余辉造成有效的伤害，\n-而余辉的绝大多数单位都由精密器械构成，于是创世纪认为EMP武器绝对能对余辉造成毁灭性的打击。\n-战争中期，随着泛用性钍裂变堆和超导线圈的实现，第一批休克打击坦克被制造出来并装配部队，\n-而休克打击坦克也不负众望的取得了振奋人心的战果，无论多么强悍的机械，只要被休克打击坦克击中，\n-其所有电子系统都会暂时或永久性瘫痪，并且使其反应堆熄火动弹不得 。\n-这种可怕的武器的存在令余辉的地面机甲部队再也不敢横行霸道。
fogOfWarSightRange: 25
techLevel: 1
buildSpeed: 18s
radius: 42
displayRadius: 42
isBio: false

softCollisionOnAll: 10
armour: 5
unitsSpawnedOnDeath: 损毁2*1
tags: 地面,驻扎要塞
copyFrom: ROOT:/通用特效/单位防护.ini
transportSlotsNeeded:6
[decal_炮塔]
