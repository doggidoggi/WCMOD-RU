


[core]
name: 暴雨火箭炮
displayText: РСЗО «Ливень»
price: 4500
maxHp: 5500
displayDescription: 【Уровень t4】【Механический юнит】【Наземный юнит】Тактическое назначение:攻城ракетная установка，размер юнита:6，\n-вооружение：▲火箭пусковой отсекX6 только по земле взрывной урон усиленный урон по зданиям\n-在与余辉война的前期，Генезисдовольно一部分部队ещё在использоватьдовоенныйпроизводство的各式ракетная установка，\n-随着война的 展，这些老式ракетная установка在面对余辉масштаб化的машина械怪兽时，显得愈 吃力。\n-为了遏制余辉броня兵团的быстрый推进，Генезисещё是从匮乏的资源中抽调出一部分，研制了РСЗО «Ливень»。\n-РСЗО «Ливень»запускатьмощность堪比крылатая ракета的重 火箭，хотязапускатьскоростьмедленный，\n-нотолько要命中即会对任何强度的地面目标造成毁灭性удар，\n-每当Генезисфронт的部队看доРСЗО «Ливень»倾泻的弹雨将余辉炸成碎片时，\n-они的内心中又会再次坚信человечество有战胜余辉的希望。
fogOfWarSightRange: 22
techLevel: 1
buildSpeed: 10s
radius: 40
displayRadius: 40
isBio: false
transportSlotsNeeded: 6
softCollisionOnAll: 10
unitsSpawnedOnDeath: 损毁2*1
