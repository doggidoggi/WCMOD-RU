#—————————休克
[hiddenAction_↯a]
autoTrigger: if self.resource.xk>0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯
[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯


[hiddenAction_掩体1取消]
autoTrigger:if self.hasParent and self.tags(includes= '轻型掩体')
isVisible:false
temporarilyRemoveTags:轻型掩体
[hiddenAction_掩体1生成]
autoTrigger:if not self.hasParent and not self.tags(includes= '轻型掩体')
isVisible:false
temporarilyAddTags:轻型掩体





