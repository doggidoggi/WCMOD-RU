


[core]
name: 镭射坦克
displayText: 镭射坦克
displayDescription: 【阶级t3】【机械单位】【地面单位】战术定位:远程反装甲战车，\n-单位体积:4，武器配置：▲激光炮X1 只能对地 能源伤害\n-创世纪在战争中逐渐认识到了能量武器的威力，\n-并开始从太空浪人的理论入手开发自己的能量武器。\n-镭射坦克是创世纪与太空浪人科技的融合体，\n-镭射坦克配备的热熔毁光虽然更加原始，不成熟且不稳定。\n-甚至其使用的光学镜片寿命不超过一百次射击，\n-但是科学家们决定将这些没必要的抛到一边，\n-从而专精镭射坦克的爆发能力与远距离压制能力，\n-只需要经过短暂的蓄能，\n-镭射坦克喷射出的死亡激光就能像热刀切黄油一般，\n-将重型装甲部队杀的片甲不留。
