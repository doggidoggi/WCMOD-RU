


[core]
name: 激光中介1
displayText: Лазерный посредник1
strictLevel: 1
price: 0
radius: 10
maxHp: 1

class: CustomUnitMetadata
techLevel: 1
showInEditor: false
tags: 激光炮塔
canNotBeDirectlyAttacked: true

isUnrepairableUnit: true
disableAllUnitCollisions: true
ignoreInUnitCapCalculation: true
disableDeathOnZeroHp: true
autoTriggerCooldownTime_allowDangerousHighCPU: true

autoTriggerCooldownTime: 0.02s

@memory atkTarget1: unit
@memory num1: float
[decal_炮塔影子1]
image: SHADOW:镭射坦克炮塔.png
total_frames: 1
layer: beforeBody

isVisible:true
yOffsetRelative:1.5
xOffsetRelative:1.5
onlyWhileAlive:true
alpha:0.65
imageScale:0.85
[decal_损坏]
layer: afterBody
image: 损耗.png
onlyWhileAlive: true
teamColors: true
isVisible:if parent.hp<parent.maxHp * 0.36
imageScale:0.85
[hiddenAction_0]
autoTrigger: if not self.hasParent
deleteSelf: true


[hiddenAction_1]
autoTrigger: if self.hasFlag(id= 0) and not parent.isEnergyRecharging
addResources: unsetFlag= 0
setUnitMemory: atkTarget1 = null


[hiddenAction_2]
autoTrigger: if parent.isEnergyRecharging and not self.hasFlag(id= 0)
addResources: setFlag= 0
setUnitMemory: num1 = 0, atkTarget1 = parent.attacking.getOffsetRelative(y= distanceBetween(self, parent.attacking) * -0.1, dirOffset= directionBetween(self, parent.attacking) - parent.attacking.dir )
alsoQueueAction: 3


[hiddenAction_3]
buildSpeed: 0.01s
fireTurretXAtGround: 1
fireTurretXAtGround_withTarget: memory.atkTarget1
setBodyRotation: directionBetween(self, memory.atkTarget1)
setUnitMemory: num1 = memory.num1 + 1, atkTarget1 = memory.atkTarget1.getOffsetRelative( y= min( 0.02 * memory.num1, 1.3) )

alsoQueueAction: 3
alsoTriggerOrQueueActionConditional: if memory.num1 < 150 and parent.isEnergyRecharging and not parent.tags(includes= "↯")

[graphics]
image: 镭射坦克炮塔.png
imageScale: 0.85
showQueueBar: false
showTransportBar: false
# lock_body_rotation_with_main_turret: true

# lock_leg_rotation_with_main_turret: true


[attack]
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits: false
canAttackUnderwaterUnits: false
maxAttackRange: 0

disablePassiveTargeting: true
isFixedFiring: true
turretSize: 24
turretTurnSpeed: 4

shootDelay: 0.01s
aimOffsetSpread: 0


[turret_2]
x: 0
y: 0
canShoot: false


[turret_1]
x: 0
y: 0
barrelY: 26
attachedTo: 2
projectile: 1

turnSpeed: 4
shoot_flame: CUSTOM:光球
shoot_sound: NONE
shoot_sound_vol: 0.5
canShoot: true

shoot_light: #80FFBE67
limitingMinRange: 99999
canOnlyAttackUnitsWithTags: jabzhdja


[projectile_1]
# 激光位置
directDamage: 0
life: -4
instantReuseLast: true
instant: true

laserEffect: true
lightColor: #FFFFBE67
lightSize: 0.5
explodeEffect: CUSTOM:闪光
# 伤害改下面的炮弹3

beamImage: 激光2.png
spawnProjectilesOnCreate: 3


[projectile_3]
@copyFromSection: template_能源
areaDamage: 70
areaRadius: 60
life: 1
instant: true

largeHitEffect: false
armourIgnoreAmount: 30
explodeOnEndOfLife: true
deflectionPower: -1
areaRadiusFromEdge: true

explodeEffect: CUSTOM:弹坑*1
explodeEffectOnShield: CUSTOM:弹坑*1
lightColor: #FFFFBE67
lightSize: 3
shieldDamageMultiplier: 0.75

[effect_弹坑]
# image: 弹坑.png
image: ROOT:/通用特效/弹坑.png
spawnChance: 0.4
life: 240
attachedToUnit: false

drawUnderUnits: true
scaleFrom: 0.65
scaleTo: 0.65
createWhenOverLiquid: false
createWhenOverLand: true


[effect_闪光]
life: 5
spawnChance: 0.7
priority: critical
attachedToUnit: false
scaleFrom: 0.6

scaleTo: 0.7
image: 光束.png
dirOffsetRandom: 180
alsoPlaySound: ROOT:/太空浪人/单位特效/激光.ogg


[effect_光球]
life: 5
spawnChance: 0.5
priority: critical
attachedToUnit: false
scaleFrom: 0.4

scaleTo: 0.4
# image: 光球.png
image: ROOT:/创世纪军事集团/单位特效/光球.png
xOffsetRelative: 1.25


[movement]
movementType: AIR
moveSpeed: 0
maxTurnSpeed: 4
targetHeight: 0
targetHeightDrift: 0

moveIgnoringBody: true


