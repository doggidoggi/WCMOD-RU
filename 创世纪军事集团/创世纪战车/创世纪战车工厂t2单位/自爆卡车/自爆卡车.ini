


[core]
name: 自爆卡车
displayText: 自爆卡车
displayDescription: 【阶级t3】【机械单位】【地面单位】战术定位:自杀式攻击战车，无法被装载，\n-武器配置：▲自杀式凝固汽油弹X1 只能对地 自杀式攻击 爆炸伤害 反掩体 \n-在面临绝境时，自爆卡车成了创世纪反击的最后手段。\n-自爆卡车由创世纪最常见的货运卡车改造而来。\n-他们所仅有的武器就是堆满卡车的易爆物。\n-这种看似穷途末路的武器一旦命中便会引发浩劫般的爆炸。\n-有很多家破人亡的人都会自愿坐上自爆卡车。
