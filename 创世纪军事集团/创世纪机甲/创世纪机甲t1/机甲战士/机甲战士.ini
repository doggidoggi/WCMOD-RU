


[core]
name: 机甲战士
copyFrom:ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/扎针.md,ROOT:/通用特效/步兵掩体.md
price: 900
maxHp: 1500
displayDescription:【阶级t3】【生物单位】【地面单位】战术定位:高级泛用型步兵，单位体积:2\n-▲转轮机枪X2 对地对空 动能伤害 反掩体\n-▲追踪导弹X2 对地对空 爆炸伤害\n-创世纪步兵居高不下的伤亡率直接促成了机甲战士的研发，\n-机甲战士是一种泛用型的中型外骨骼，\n-其配备反装甲飞弹和两门转轮机枪可以同时应对轻型和重型目标。\n-机甲战士无论对于步兵还是坦克都是绝佳的搭配。
techLevel: 1
buildSpeed: 8s
#availableInDemo: true
radius: 20
displayRadius: 20
tags: 地面,机甲,机甲战士,步兵
transportSlotsNeeded: 2
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
unitsSpawnedOnDeath: 损毁*1
isUnrepairableUnit:true
[action_恐怖地雷3]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/恐怖3.png
text: 恐怖地雷3
isActive: false
isVisible: if self.globalTeamTags(includes='恐怖地雷3') 
[action_恐怖地雷2]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/恐怖2.png
text: 恐怖地雷2
isActive: false
isVisible: if self.globalTeamTags(includes='恐怖地雷2') and not self.globalTeamTags(includes='恐怖地雷3')
[action_外骨骼]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/外骨骼.png
text: 外骨骼技术
isActive: false
isVisible: if self.globalTeamTags(includes='外骨骼')
[hiddenAction_外骨骼生效]
autoTrigger: if self.globalTeamTags(includes='外骨骼') and not self.tags(includes= '外骨骼保险')
setUnitStats: moveSpeed= ${movement.moveSpeed * 1.3},maxHp= ${core.maxHp*1.2},hp= ${core.maxHp*1.2}, maxTurnSpeed = ${movement.maxTurnSpeed* 1.65}
temporarilyAddTags:外骨骼保险
[hiddenAction_外骨骼生效麻烦1]
autoTrigger: if self.globalTeamTags(includes='外骨骼')
setUnitStats:armour= ${core.armour+10}
[action_电磁炮1]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/轨道1.png
text: 轨道发射器1
isActive: false
isVisible: if self.globalTeamTags(includes='轨道发射器1')

[action_man1]
