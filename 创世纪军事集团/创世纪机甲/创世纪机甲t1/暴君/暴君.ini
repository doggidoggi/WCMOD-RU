


[core]
name: 暴君
displayText: Тиран
price: 9000,钍=150
maxHp: 10000
displayDescription: 【Уровень t3】【Механический юнит】【Наземный юнит】【Преодолевает утёсы】【дрон指挥юнит】\n-Тактическое назначение:重 多функция攻击мех，не может транспортироваться，вооружение：\n-▲РельсотронX2 только по земле кинетический урон ▲автопушкаX1 только по земле кинетический урон\n-▲зенитная ракетаX2 только по воздуху взрывной урон 在与余辉的сражение中，工厂一旦暴露就会被вражеский太空力量уничтожать，\n-于是，Генезис开始寻求一видможетбыстрый移动иразвёртывать于поле боя上的移动车间，\n-在加装了большое количество实验性оружие后，Тиран便поэтому应运а生。\n-Тираннесёт的портативный工厂может在极短的时间内构建出большое количествомашина械人，\n-одновременно，残酷的Тиран又может用различные辅助性оружие为фронт部队обеспечивает灵活的поддержка，\n-这вид实验性的сражениемашина械人даже连浪人都весьма赞叹，\n-Тиран的появляется很大程度上уменьшает了производство力的损失，\n-是一款标志着человечество尖端производить水平的войнамашинаустройство，不负盛名。
techLevel: 1

buildSpeed: 40s
radius: 75
displayRadius: 75
armour: 25
energyMax: 10

energyRegen: 0.0035
fogOfWarSightRange: 26
copyFrom: ROOT:/通用特效/单位防护.ini
transportSlotsNeeded: 4000
unitsSpawnedOnDeath: 损毁3*1
tags: 暴君,地面

