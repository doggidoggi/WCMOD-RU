


[core]
name: 镇压者
displayDescription: 【阶级t3】【机械单位】【地面单位】【无人单位】【伴随式无人机】【伴生单位】\n-战术定位:护卫机器人，无法被运输。武器配置：▲120毫米炮X1 只能对地。动能伤害 \n-镇压者是完全由暴君控制的无人作战单元，\n-因此他只会守护在暴君附近，不会听从您的指挥。\n-其结构十分简单可以由暴君快速大量组装，\n-作为暴君的贴身侍卫，镇压者配备一门120毫米坦克炮。\n-他们可以快速镇压任何敢于靠近并挑战暴君的敌人。\n-离暴君太远会导致镇压者损坏。
copyFrom: ROOT:/通用特效/单位防护.ini
price: 800

maxHp: 4000
techLevel: 1
buildSpeed: 4s
radius: 23
canNotBeGivenOrdersByPlayer: true
armour: 5
isBio: false
softCollisionOnAll: 6
unitsSpawnedOnDeath: 损毁*1
tags: 地面,镇压者,寄生免疫,伴生单位,无人单位
energyMax: 30

energyRegen: 0
[action_tz1]
autoTrigger: if self.noUnitInTeam(withTag='暴君', withinRange=330) and self.energy<1
isVisible: false
addResources:  hp=-${int(core.maxHp* 0.03)}

[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999

[action_弹幕架1]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/弹幕1.png
text: 弹幕架1
isActive: false
isVisible: if self.globalTeamTags(includes='弹幕架1')

isAlsoViewableByAllies: true


[action_恐怖地雷2]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/恐怖1.png
text: 恐怖地雷2
isActive: false
isVisible: if self.globalTeamTags(includes='恐怖地雷2') and not self.globalTeamTags(includes='恐怖地雷3')
isAlsoViewableByAllies: true
[action_恐怖地雷3]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/恐怖3.png
text: 恐怖地雷3
isActive: false
isVisible: if self.globalTeamTags(includes='恐怖地雷3')

[hiddenAction_1]
autoTrigger: if numberOfUnitsInEnemyTeam(greaterThan=0, withinRange=1000) and self.resource.xk < 1 
addWaypoint_target_nearestUnit_tagged: 地面
addWaypoint_type: attackmove
addWaypoint_target_nearestUnit_team: enemy



[hiddenAction_21]
autoTrigger: if not self.hasUnitInTeam(withTag='暴君', withinRange=200) and self.resource.xk < 1
isVisible: false
clearAllWaypoints: true
addWaypoint_target_nearestUnit_tagged: 暴君
addWaypoint_target_nearestUnit_team: own

addWaypoint_maxTime: 1s
addWaypoint_type: move


[action_t1]
autoTrigger: if self.noUnitInTeam(withTag='暴君', withinRange=330)
isVisible: false
addResources: energy=-1


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)
[action_man1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999

