[core]
name: 重型工程车
displayText: Тяжёлая инженерная машина
displayDescription: 【Уровень t4】【Механический юнит】【Амфибия】【Инженерный юнит】【Дистанционный сапёр】\n-Тактическое назначение: продвинутый амфибийный строитель，размер юнита：7，вооружение：\n-▲重 автопушкаX3 только по земле взрывной урон \n-在面对сложный的поле боя环境，а также余辉猛烈的炮火时，\n-Робот-Работник等其онюнит-здание往往显得力不从心。\n-在其онюнит-здание无法способенфронтсооружение的建设和维护时，\n-Генезис便会从大后方抽调используется для修建高класссооружение的Тяжёлая инженерная машинаподдержкаполе боя。\n-Тяжёлая инженерная машинанесётбольшое количествозданиедрон和重 3D打印оборудование，\n-通常тольконуждается一 就можетспособен整个бронетанковая рота的维护。\n-其имеет встроенный的全套здание蓝图такжеподдерживаетон建设всеГенезис的高精尖оборудование。\n-самый重要的是，Тяжёлая инженерная машинане толькообладать便捷的水路两栖способность，\n-ещёоснащённый了一 大口径скорострельная пушка和重 бронированный корпус，\n-这может保证онможет在самый猛烈的炮火下幸存。
transportSlotsNeeded:7
price: 4200
maxHp: 11000
techLevel: 1
fogOfWarSightRange: 20
buildSpeed: 10s
radius: 62
isBio: false
