


[core]
name: 修复无人机
displayText: Ремонтный дрон
#displayText: 哨戒机枪
class: CustomUnitMetadata
displayDescription: 눈_눈
price: 0

maxHp: 1500
mass: -1
techLevel: 1
buildSpeed: 6s
transportSlotsNeeded: 999
radius: 13
fogOfWarSightRange: 13
softCollisionOnAll: 5
copyFrom: ROOT:/通用特效/单位防护.ini
isBio: false
