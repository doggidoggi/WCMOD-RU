dieOnZeroEnergy: true
tags: 地面,伴生单位
canRepairBuildings: true
autoRepair: true
canRepairUnits: true
nanoRepairSpeed: 2
nanoRange: 190
[hiddenAction_man1]
autoTrigger: if self.isOverLiquid and not self.isOverPassableTile(type='WATER')
isVisible: false
deleteSelf:true
[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true
[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999
[hiddenAction_取消回收1]
requireConditional: ${section.autoTrigger}
autoTrigger: if self.hasActiveWaypoint(type= 'reclaim') and self.activeWaypointTarget.teamId != self.teamId
autoTriggerOnEvent: newWaypointGivenByPlayer
clearAllWaypoints: true
[graphics]
total_frames: 1
image: 底座.png
image_wreak: NONE
image_shadow: AUTO
teamColorsOnTurret: true
repairEffect: CUSTOM:尾巴, CUSTOM:尾巴1

