


[core]
name: 追击舰1
displayText: 追击舰
price: 3500
maxHp: 2000
displayDescription: 【阶级t2】【机械单位】【地面单位】（在陆地上时）【水上单位】（在水域上时）【水陆两栖】\n-战术定位:两栖泛用型战舰，单位体积：4 武器配置：\n-▲自动炮X4 只能对地 动能伤害\n-追击舰是创世纪的高速轻型巡逻艇，\n-主要用于应对小型水域中的低强度战斗。\n-凭借先进的气垫设计可以同时在水上和地面对敌人展开打击。
techLevel: 1
fogOfWarSightRange: 18
buildSpeed: 15s
copyFrom: ROOT:/通用特效/单位防护.ini
radius: 35
showInEditor: false
