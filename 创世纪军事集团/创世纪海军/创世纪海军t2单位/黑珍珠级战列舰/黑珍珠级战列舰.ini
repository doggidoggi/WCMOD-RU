


[core]
name: 黑珍珠级战列舰
displayDescription: 【阶级t3】【战术武器防御】【机械单位】【水上单位】【极端重型单位】\n-战术定位:重型远程火力炮舰，武器配置：\n-▲战列舰主炮X12 只能对地 爆炸伤害 \n-▲高射炮X6 只能对空 爆炸伤害 \n-在开战初期，人类战前组建的现代化海军力量在面对余晖第一波攻势时就已经损失殆尽。\n-在危机时刻，创世纪联盟需要一种能够快速维持战线，拥有较强防护能力的应急产物，\n-创世纪联盟不得不从仓库中解封部分二战以及冷战时期的战列舰，\n-将他们统一拆解后，按照相同的规格加入部分新规零件重新组装，\n-这种改装得来的舰船就被称为黑珍珠，\n-其改装基底厚重的装甲搭配额外附加的装甲板，能够更有效抵挡余晖的攻击，\n-也能高效执行对岸轰炸任务，在战争中得到了大量应用，\n-实战证明了他即使是与战争中后期生产的各种新锐军舰相比，他也是能在战场上发挥巨大效能的高性价比舰船。
techLevel: 1
selfRegenRate: 0.7
unitsSpawnedOnDeath: 中型水上单位死亡*1
buildSpeed: 30s
price: 12000
maxHp: 25000
armour: 105
radius: 115
isBio: false
tags: 地面,海上,极端重型
copyFrom: ROOT:/通用特效/单位防护.ini
