


[core]
name: 勇士级护卫舰
price: 4000
maxHp: 7000
displayDescription: 【阶级t3】【机械单位】【水上单位】\n-战术定位:泛用型战舰，武器配置：\n-▲舰炮X1 只能对地 动能伤害 \n-▲反舰导弹X2 只能对地 爆炸伤害 \n-▲防空导弹垂发单元X1 只能对空 爆炸伤害\n-勇士级护卫舰是战争前期研发的创世纪主力战舰，\n-其特点包括造价低廉，技术成熟以及较高的自动化水平，\n-得益于新颖的构形，其具有极高的机动力，\n-同时，勇士级丰富的火力配置也使他能够执行多种任务。\n-作为创世纪的“大船伴侣”，该战舰具有极高的性价比。
techLevel: 1
buildSpeed: 17s
radius: 66
displayRadius: 66

isBio: false
softCollisionOnAll: 7
armour: 15
fogOfWarSightRange: 23
unitsSpawnedOnDeath: 中型水上单位死亡*1
