



[core]
name: 阿特拉斯级运输船MK2
displayText: Транспортное судно класса «Атлас»MK2
displayDescription:【Уровень t4】【Наземный юнит】【Механический юнит】【Парящий юнит】【тяжёлое укрытие】【Амфибия】【Сверхтяжёлый юнит】\n-Тактическое назначение:重 вооружение运输舰，вместимость десанта：24，не может транспортироваться，пассажиры внутри не могут стрелять наружу，\n-вооружение：▲ракетная установкаX3 только по земле взрывной урон▲Зенитное орудиеX5 по земле и воздуху взрывной урон\n-Атлас运输корабльтолькотолькоиспользуется чтобы运输боевой корабль零вещь多少让人有一вид大材小用的感觉，\n-于是部分Альянс Генезис部队использоватьАтлас运输корабль为载体，\n-通过большое количество爆改将其модифицировать成может向фронт投送большое количество兵力和огневая мощьподдержка的抢滩десантный корабль，\n-后来，из-за其优秀性，该蓝图также被上传становитьсяАтлас的官方модифицировать模板之一。\n-在иметь极大的，дажеможет装下极端重 юнит运载空间的одновременно，\n-该юнитещёоснащённый了火箭弹幕пусковая установка和Дымовая гранатаиспользуется чтобыприкрытие登陆部队，\n-额外увеличивает的бронепластинатакже使онспособен冒着猛烈的炮火碾碎水雷和障碍物冲上登陆目标的海岸，\n-и在释放登陆部队后在其后防обеспечивает强劲的огневая мощьподдержка。
