


[core]
name: 灰鲭鲨级重型驱逐舰
displayText: Тяжёлый эсминец класса «Голубая акула»
displayDescription: 【Уровень t4】【Механический юнит】【Надводный юнит】【Дальнее целеуказание】\n-Тактическое назначение: универсальный боевой корабль，вооружение：▲舰炮X2 только по земле кинетический урон\n-▲противокорабельныйракетапусковая трубаX4 только по землевзрывной урон\n-▲长距离целеуказание垂 单元X1 толькоможет攻击地面被锁定的юнит взрывной урон\n-▲海峰вооружениевертолётX1 только по земле 动может/взрывной урон машина炮пробивает укрытия\n-Голубая акулакласс是довоенный欧洲国家曾计划производить的新一代海洋猎手，\n-можно惜из-за财政问题和Материаловедениеи没有投产，\n-а在войнасередина，Генезис的双髻鲨классбоевой корабль逐渐暴露出надёжный性不足等问题，\n-于是Генезис找出довоенный该 корабль的蓝图，重新производитьи配 给了部分海军部队。\n-Голубая акула的оружие组весьма多样化，независимо от того地面ещё是надводный юнит都无法逃脱он的追杀。\n-在поле боя上被Голубая акула的оружие组命中абсолютный是一вещь倒霉的事情，\n-像он的名字一样，Голубая акула就是海洋上随时准备给任何敢于入侵的врагсмертельный一击的狂鲨。
