[core]
name: 海狼级战列巡洋舰
displayDescription: 【阶级t4】【机械单位】【水面单位】【极端重型单位】\n-战术定位:先进制海战舰，武器配置：▲反舰导弹发射筒X4 只能攻击水面单位 爆炸伤害\n-▲重型轨道炮X1 只能对地 动能伤害 对极端重型单位伤害加成\n-▲火箭鱼雷发射架X1 只能攻击水面单位和潜航单位 爆炸伤害 \n-▲高射炮X6 只能对空 爆炸伤害 ▲防空导弹垂发单元 只能对空 爆炸伤害\n-经过多次实战，创世纪终于明白装甲与火力才是现在战舰的需要，\n-而新型舰船的任务则交给了科普斯科技集团，\n-经过多次重新设计，并借鉴了太空浪人战舰构造后，海狼级战列巡洋舰诞生了。\n-海狼级战列巡洋舰绝对是创世纪海军中的杀手锏之一，\n-由核动力驱动的海狼级搭载了以前同吨位战舰绝对无法相提并论的火力，\n-海狼级的设计重点在于高效的摧毁任何水上和水下的敌人，\n-因此其还装备有最新型的反潜雷达和火箭鱼雷发射器。\n-最令人眼前一亮的是，海狼级装甲与火力极为优异的同时航速也丝毫不落下风，\n-相比于其他皮薄大馅的船体，海狼级战列巡洋舰更像是创世纪海军的荣耀。
techLevel: 1
price: 15500,钍=195,bj= ${bjxq}
reclaimPrice: bj= ${bjxq}
