[core]
name: 战列要塞
displayText: Линкор-Крепость
displayDescription: 【Уровень t4】【Механический юнит】【Надводный юнит】【Дальнее целеуказание】【Сверхтяжёлый юнит】【Иммунитет к шоку】\n-Тактическое назначение:重 далеко程огневая мощь炮舰，вооружение：▲ВПУ зенитных ракетX2 только по высотным взрывной урон\n-▲гигантский舰炮X9 только по земле взрывной урон 对非极端重 юнит伤害加成 \n-▲автопушкаX4 по земле и воздуху взрывной урон ▲зенитная ракетаX4 только по воздуху взрывной урон\n-▲长距离целеуказаниепо землеракетаX4 толькоможет攻击被锁定的наземный юнит взрывной урон\n-Линкор-Крепость是человечество历史上самый大的надводный人造物之一，\n-в качествеГенезиссам用老旧的科学技术催生出的另一个奇迹，\n-其оснащение了三联装大口径重炮а такженеисчислимый的各式ракета阵列，\n-在по воздуху方面также有огневая сеть对различные виды空中враг进行эффективныйудар\n-можно惜的是，из-за现有самый大功率的реактортакже无法全力带动这масштаб空前的人造岛屿，\n-其移动скорость奇慢无比，比起海军，онболее适合в качестве一个огневая мощь点，\n-прикрытиесоюзники进行а坚定的推进，然后碾碎всё敢于阻挡Генезис进军步伐的部队。
