[core]
name: 超战舰
displayDescription: 【阶级t4】【机械单位】【水上单位】【休克免疫】【极端重型单位】\n-战术定位:先进重型泛用型战舰，武器配置：\n-▲轨道炮X2 只能对地 动能伤害 ▲大口径火箭炮X2 只能对地 爆炸伤害 \n-▲自动炮X4 对地对空 动能伤害 对护盾伤害加成 \n-▲大口径臼炮X2 只能对地 爆炸伤害\n-▲防空导弹垂发单元X2 对地对空 爆炸伤害 对极端重型单位伤害加成\n-毫不夸张的说，超战舰绝对是人类造船史上一个无法逾越的高峰。\n-其采用前卫的双体船设计，使其可以在保持高航速的同时，\n-搭载数个核子反应堆和与之相连的大型武器，\n-核电驱动的轨道炮足以击穿人类认知中的大部分装甲，\n-除了这门恐怖的轨道炮以外，还拥有独立的防空火力网以及能够击垮任何水面战舰的反舰武器组。\n-这使得它几乎可以单舰击溃余晖的小型海空立体打击。\n-若创世纪真有能够改变战局的水面战舰，那只能是数量仅有不过20艘的超战舰，\n-余辉的花哨玩具们该好好考虑考虑自己的处境了。
techLevel: 1
price: 8000,钍=255,bj= ${bjxq}
