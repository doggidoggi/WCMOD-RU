[core]
name: 建造噬海女妖级战略核潜艇
displayText: 噬海女妖级战略核潜艇
displayDescription:  【阶级t4】【极端重型单位】【机械单位】【长距离索敌】【潜航单位】\n-战术定位:战术武器/战略武器重轰炸潜艇，武器配置：\n-▲重型反舰鱼雷发射管X4 只能攻击水面和潜航单位 爆炸伤害\n-▲战术导弹垂发单元X2 只能对地 爆炸伤害 战术武器 \n-▲长距离索敌战术导弹垂发单元X2 只能攻击地面中被锁定的单位 爆炸伤害\n-噬海女妖的存在让任何与人类为敌的势力感到无尽的恐惧。\n-作为科普斯利用月球芯片提取出的科技为基础，开发出来的最强悍的战略核潜艇，\n-噬海女妖在各项性能上都远超现代任何一款潜艇。\n-他在海底对于敌人来说几乎是无法察觉的，\n-且还能够在发射一轮潜射导弹后，以极高的航速和恐怖的深度逃离战场，\n-也因为难以被追踪，噬海女妖的存活率在创世纪海军的所有舰艇里都是名列前茅的，\n-当它出现在战场时敌人的结局就已经注定，就如同吞噬一切的海妖一般，\n-噬海女妖将在深渊中寻猎，并吞噬一切人类之敌。
techLevel: 1
price: 10000,钍=300,bj= ${bjxq}
