[core]
name: 占星师级两栖攻击舰
displayDescription:【阶级t4】【机械单位】【水面单位】【战略武器防御】\n-战术定位:功能型多用途航母，武器配置：\n-▲重型蜂鸟X5 对地对空 动能伤害 突击炮对建筑物伤害加成\n-▲温迪戈发射架X2 对地对空 爆炸伤害\n-▲机炮X2 对地对空 动能伤害 反掩体 \n-▲导弹发射舱x2 对地对空 爆炸伤害\n-战前意大利曾经计划投产的，实际体积已经如同轻型航母的核动力海上堡垒，\n-在战争中后期被创世纪从数据库中找出并进行了量产，\n-其上搭载了一组多用途VTOL无人机的同时还搭载了多种部队，\n-甚至还包括了一套战术武器发射单元以及内置轻工厂，\n-先进装备的加持可谓是让占星师级武装到了牙齿。\n-这使其几乎可以孤舰担任一个舰队的攻击前锋，\n-精明的指挥官总是能利用占星师级取得战场上的优势。
