[core]
name: 建造复仇女神级航空母舰
displayText: Постройка авианосца «Немезида»
displayDescription: 【Уровень t4】【Механический юнит】【Надводный юнит】【英雄юнит】【Защита от тактического оружия】【Защита от стратегического оружия】\n-Тактическое назначение:游戏终结者，вооружение：▲Истребитель «Громовой ангел»X8 по земле и воздуху кинетический урон \n-▲Утренняя звездастратегиябомбардировщикx4 только по земле энергетический урон▲Вендигопусковая установкаX6 по земле и воздуху взрывной урон\n-▲海峰вооружениевертолётX6 только по земле 动может/взрывной урон машина炮пробивает укрытия\n-▲«Взрывной краб»пусковая установкаX4 толькоможет攻击наземный юнит和подводный юнит взрывной урон\n-▲Орбитальная спутниковая пушкаX1 только по земле кинетический урон ▲大口径автопушкаX12 по земле и воздуху对высотный взрывной урон \n-▲集束торпедапусковая трубаX2 только по надводным и подводным юнитам взрывной урон ▲зенитная ракетапусковой блокX2 по воздуху对высотный \n-▲重 ракета垂 单元X10 толькоможет攻击地面 空中 высотный中的极端重 юнит взрывной урон\n-▲舰炮X2 только по земле кинетический урон ▲зенитная ракетаX2 только по воздуху взрывной урон\n-Авианосец класса «Немезида»是довоенный某супер大国为完全制霸海洋аразрабатывать的终极боевой корабль，\n-得益于与余辉война所引 的наука进步，如今Авианосец класса «Немезида»终于变为了现实。\n-Немезидакласс是Генезис海军стратегияИнститут打造出的супер海всплытие动堡垒，одновременнотакже是Генезис海军的旗舰。\n-其имеет встроенный的самый大масштаб舰载式钍裂变堆может支撑起如同岛屿般宽阔的корпус корабля高速移动，\n-其宽广的飞行甲板дажеможетодновременно停泊десятки个连队的舰载машина都不在话下，\n-Немезидаещёимеет встроенный了корветмашина ，卫星запускать 和大масштаб的производствосооружение等夸张оборудование，几乎может称之为一корабль即一舰队。\n-当这 авианосецпоявляется在поле боя上时，胜利такжеоднако是时间问题。\n-这 承载着человечество怒火的боевой корабль，将带着бесчисленные冤死在这场война中的человечество灵魂向余辉разворачиватьсамый恐怖的复仇，\n-致Немезида号，致Генезис海军，致全体человечество！
