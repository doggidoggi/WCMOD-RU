[core]
name: 复仇女神级航空母舰
displayDescription: 【阶级t4】【机械单位】【水上单位】【英雄单位】【战术武器防御】【战略武器防御】\n-战术定位:游戏终结者，武器配置：▲雷烬天使战斗机X8 对地对空 动能伤害 \n-▲晨曦之星战略轰炸机x4 只能对地 能源伤害▲温迪戈发射架X6 对地对空 爆炸伤害\n-▲海峰武装直升机X6 只能对地 动能/爆炸伤害 机炮反掩体\n-▲爆裂螃蟹发射架X4 只能攻击地面单位和潜航单位 爆炸伤害\n-▲轨道卫星炮X1 只能对地 动能伤害 ▲大口径自动炮X12 对地对空对高空 爆炸伤害 \n-▲集束鱼雷发射管X2 只能攻击水面和潜航单位 爆炸伤害 ▲防空导弹发射巢X2 对空对高空 \n-▲重型导弹垂发单元X10 只能攻击地面 空中 高空中的极端重型单位 爆炸伤害\n-▲舰炮X2 只能对地 动能伤害 ▲防空导弹X2 只能对空 爆炸伤害\n-复仇女神级航空母舰是战前某超级大国为完全制霸海洋而开发的终极战舰，\n-得益于与余辉战争所引发的科技进步，如今复仇女神级航空母舰终于变为了现实。\n-复仇女神级是创世纪海军战略研究所打造出的超级海上浮动堡垒，同时也是创世纪海军的旗舰。\n-其内置的最大规模舰载式钍裂变堆能支撑起如同岛屿般宽阔的船体高速移动，\n-其宽广的飞行甲板甚至能同时停泊数十个连队的舰载机都不在话下，\n-复仇女神还内置了护卫舰机架，卫星发射台和大规模的生产设施等夸张设备，几乎可以称之为一船即一舰队。\n-当这艘航母出现在战场上时，胜利也不过是时间问题。\n-这艘承载着人类怒火的战舰，将带着无数冤死在这场战争中的人类灵魂向余辉展开最恐怖的复仇，\n-致复仇女神号，致创世纪海军，致全体人类！
techLevel: 2
selfRegenRate: 2
generation_delay: 40
generation_credits: 65
price: 135000,bj= ${bjxq},钍=2000
@global bjxq:100
reclaimPrice: bj= ${bjxq}
maxHp: 185000
armour: 400
buildSpeed: 180s
softCollisionOnAll: 40
radius: 180
transportSlotsNeeded: 300
fogOfWarSightRange: 45
copyFrom: ROOT:/通用特效/单位防护.ini
isBio: false
unitsSpawnedOnDeath: 小核爆,清理标签
tags: 地面,海上,反高空,复仇女神,英雄,极端重型,jabzhdja,本来就有啊

maxTransportingUnits: 1
transportUnitsCanUnloadUnits: false
