whenBuilding_cannotMove: true
allowMultipleInQueue:false
description: 竖起飞鱼导弹艇的战术导弹发射架，\n-对地面敌人进行远距离打击。\n-竖起导弹架后，飞鱼导弹艇将停用鱼雷发射管，并停止移动，\n-启用战术导弹发射器对范围400-2000内的敌方地面单位进行攻击，\n-战术导弹将造成爆炸aoe伤害，发射将额外消耗能量，\n-同时将被判定为战术武器。
