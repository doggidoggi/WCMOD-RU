


[core]
name: 飞鱼级导弹艇
price: 0
maxHp: 7500
displayDescription:【阶级t4】【机械单位】【水上单位】【伴生单位】\n-战术定位:伴随式战舰，武器配置：\n-▲鱼雷发射管X2 只能攻击水面单位和潜航单位 爆炸伤害\n-▲战术飞弹发射舱X1 只能对地 爆炸伤害 战术武器\n-复仇女神利用内部舰载车间生产的小体积导弹艇，\n-装配了重型鱼雷管和战术导弹发射单元，能够为复仇女神扫清潜航障碍的同时，\n-发射战术导弹支援母体作战，但需要注意的是，飞鱼内部弹药有限，需要母体进行补给。
techLevel: 1
buildSpeed: 17s
radius: 55
displayRadius: 55
showInEditor: false
isBio: false
softCollisionOnAll: 7
armour: 15
fogOfWarSightRange: 23
unitsSpawnedOnDeath: 中型水上单位死亡*1

copyFrom: ROOT:/通用特效/单位防护.ini
tags: 地面,海上,冲锋,歼敌,伴生单位
energyMax: 10000
energyRegen: -1
energyStartingPercentage:1
[hiddenAction_冇了]
autoTrigger: if self.energy<1
temporarilyAddTags:冇了
[hiddenAction_回家]
autoTrigger: if self.energy<1
addWaypoint_target_nearestUnit_tagged: 复仇女神
addWaypoint_type: move
addWaypoint_target_nearestUnit_team: own
clearAllWaypoints: true
[hiddenAction_紫砂]
autoTrigger: if self.energy<1 and self.hasUnitInTeam(withTag='复仇女神', withinRange=280) and self.resource.零件<200
deleteSelf: true
addResources: 零件=45
[hiddenAction_紫砂x]
autoTrigger: if self.energy<1 and self.hasUnitInTeam(withTag='复仇女神', withinRange=250) and self.resource.零件>=200
deleteSelf: true
[hiddenAction_紫砂1]
autoTrigger: if self.noUnitInTeam(withTag='复仇女神') and self.energy<1
addResources:  hp=-99999
[action_s1]
autoTrigger: if not self.isOverLiquid
isVisible: false
addResources: hp=-999999
[hiddenAction_图]
autoTrigger: if self.tags(includes= '歼敌') and self.energy>1
addWaypoint_target_nearestUnit_tagged: 海上
addWaypoint_type: attackmove
addWaypoint_target_nearestUnit_team: enemy
[action_bkm]
autoTrigger: if not self.tags(includes= '保险') 
isVisible: false
playAnimation: attack
temporarilyAddTags:保险
[decal_导弹仓1]
image: 导弹平影.png
total_frames: 1
layer: onTop
isVisible: if not self.tags(includes= '开始')
