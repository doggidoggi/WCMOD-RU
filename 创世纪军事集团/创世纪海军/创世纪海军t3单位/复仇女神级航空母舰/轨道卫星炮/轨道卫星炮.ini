


[core]
name: 轨道卫星炮
displayDescription: 【阶级t4】【机械单位】【空中单位】【高空单位】【伴生单位】\n-战术定位:伴随式反单体浮游炮，武器配置：\n-▲巨型轨道炮X1 只能对地 动能伤害 \n-复仇女神尾部搭载的空天轨道炮平台，主体使用战前的宇宙探测卫星改造，\n-在其中单独装载了一台小型钍裂变堆保证能源供给，\n-同时使用一门伸缩轨道炮为主武器，该武器发射的大体积磁化合金棒在经过电磁力的加速与重力的加成之后，\n-将会变得无坚不摧，加之其使用攻顶弹道，对抗战舰的效果格外不错，\n-但需要注意的是，上帝之杖单次携带的弹药有限，弹药用光后要回到本体补充。
price: 0
maxHp: 20000
techLevel: 1
buildSpeed: 0s
copyFrom: ROOT:/通用特效/单位防护.ini
armour: 20
showInEditor: false
radius: 70
displayRadius: 70
softCollisionOnAll: 10
isBio: false
tags: 飞机,高空,卫星炮,可以回wx,伴生单位
canOnlyBeAttackedByUnitsWithTags:反高空
energyMax: 12
energyRegen: 0
energyNeedsToRechargeToFull: true
fogOfWarSightRange: 18
effectOnDeath:CUSTOM:碎片,CUSTOM:碎片1,CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
effectOnDeathGroundCollision: CUSTOM:巨大冲击波,CUSTOM:巨大爆炸,CUSTOM:巨大钢珠*2,CUSTOM:巨大闪光
[hiddenAction_紫砂1]
autoTrigger: if self.noUnitInTeam(withTag='复仇女神')
addResources:  hp=-99999
[action_高空]
text: 高空单位
isVisible: true
isLocked: true
price: 0
displayType: infoOnlyNoBox
buildSpeed: 0s
pos: 0.1
iconImage: ROOT:/通用特效/高空.png
description: 处于极高高度的战机和战舰。\n-在此高度下，只有地面和空中特殊的反高空单位，以及高空单位才能攻击到该单位，\n-同时，大部分高空单位可以互相攻击，并可以攻击普通空中单位，\n-只有特殊的高空单位才能对地攻击。
[hiddenAction_zz1]
autoTrigger:if not self.isInMap() and not self.hasParent
addResources: hp= -999999
[action_补充能量]
autoTrigger: if self.hasParent and self.energy<12
isVisible: false
addResources: energy=1
[hiddenAction_反馈]
