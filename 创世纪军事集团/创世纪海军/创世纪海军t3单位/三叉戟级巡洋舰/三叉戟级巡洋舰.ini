buildSpeed: 3s
pos: 0.1
displayRemainingStockpile: false
highPriorityQueue: true
price:0
canPlayerCancel: false
onlyOneUnitAtATime: false
iconImage: 连射.png
temporarilyAddTags:连射
temporarilyRemoveTags:爆发
isVisible: if not self.tags(includes= '连射')
whenBuilding_cannotMove: false
allowMultipleInQueue:false
description: 将蜂群导弹改为按波次发射的连射模式，\n-连射模式能对大片敌军造成持续伤害，理论效率要高于齐射模式。\n-不过连射模式不适合攻击高防护目标或者快速单位。\n-切换模式后，主炮将改为连射，大量减少装填时间，造成aoe伤害但无法穿甲，也无法攻击高空单位。
isLocked:if self.queueSize> 0  or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
