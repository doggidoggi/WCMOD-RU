


[core]
name: 三叉戟级巡洋舰
displayDescription: 【阶级t4】【机械单位】【水上单位】【战术武器防御】战术定位:防空/反潜战舰，武器配置：\n-该单位具有锁定敌人的能力。▲防空导弹发射巢X2 只能对空 爆炸伤害 \n-▲自动炮X6 对地对空 爆炸伤害▲防空导弹垂发单元X2 只能对高空 爆炸伤害\n-▲深水炸弹发射器X2 只能攻击潜航单位 爆炸伤害 三叉戟级巡洋舰是专精防空与反潜的先进巡洋舰，\n-这种搭载了恐怖火力的防空巡洋舰往往能够单舰形成大片的防空火力网，\n-并且配合最新的火控雷达和长距离索敌雷达让三叉戟可以击落超高空的余辉单位，\n-这种少数能有效拦截余辉空军且兼顾机动性的强力巡洋舰是创世纪海军防空火力的重要支柱。\n-并且在对付潜航的目标时三叉戟还能发射大量深水炸弹让敌方潜艇无处可逃。\n-但搭载过量防空火力的代价是三叉戟无法携带足够反舰武器，\n-让他伴随着其他战舰一同出击才是最理智的选择。
techLevel: 1
price: 7000
maxHp: 22500
armour: 28
buildSpeed: 19s
softCollisionOnAll: 40
radius: 85
transportSlotsNeeded: 3
fogOfWarSightRange: 45
unitsSpawnedOnDeath: 中型水上单位死亡*1
copyFrom: ROOT:/通用特效/单位防护.ini
isBio: false
tags: 地面,海上,反高空,连射,索敌单位
energyMax: 6
energyRegen: 0.0018
energyNeedsToRechargeToFull: true
