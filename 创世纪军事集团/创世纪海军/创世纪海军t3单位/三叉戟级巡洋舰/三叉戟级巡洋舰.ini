[action_爆发]
text: 爆发模式
displayType: action
buildSpeed: 3s
pos: 0.1
displayRemainingStockpile: false
highPriorityQueue: true
price:0
canPlayerCancel: false
onlyOneUnitAtATime: false
iconImage: 爆发.png
temporarilyAddTags:爆发
temporarilyRemoveTags:连射
isVisible: if not self.tags(includes= '爆发')
whenBuilding_cannotMove: false
allowMultipleInQueue:false
description: 将蜂群导弹改为爆发发射模式，\n-一次性发射所有的导弹集中攻击敌军单个单位。\n-虽然这种方法能极大提升对单个高防护目标的毁伤能力，\n-但是代价将会是装填时间延长。\n-切换模式后，主武器将改为齐射，大量延长装填时间，只造成点杀伤并附带85点穿甲，可以攻击高空单位。
isLocked:if self.queueSize> 0  or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isLockedMessage: 换装弹药中，请等待
[action_连射]
text: 连射模式
