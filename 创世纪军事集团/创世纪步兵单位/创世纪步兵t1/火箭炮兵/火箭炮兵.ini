[core]
name: 火箭炮兵
displayText: Ракетчик
class: CustomUnitMetadata
displayDescription:【Уровень t1】【Биологический юнит】【Наземный юнит】 Тактическое назначение: противотанковая пехота，\n-размер юнита:1 вооружение：▲AT4火箭пусковая установкаx1 только по земле взрывной урон。 \n-Ракетчикоснащённый瑞典AT4火箭пусковая установка，\n-不要轻视这вид这вид老式а又дешёвый的оружие，\n-Ракетчикможет埋伏在路边或者Бункер中，\n-予свражеский轻 броня位重创。

price: 250
maxHp: 70
mass: 45
techLevel: 1
fogOfWarSightRange: 17
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/步兵掩体.md
buildSpeed: 3.5s
softCollisionOnAll: 9
radius: 10
isBio: true
explodeOnDeath: false
isUnrepairableUnit:true
armour: 0
hideScorchMark: true
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3
tags: 步兵,地面,驻扎要塞,1格
[action_man1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999

[action_举枪]
autoTrigger: if numberOfUnitsInEnemyTeam(greaterThan= 0,withInRange=310, incompleteBuildings= true) and not self.tags(includes= '举枪')
isVisible:false
temporarilyAddTags:举枪
playAnimation:部署
[action_收枪]
autoTrigger: if numberOfUnitsInEnemyTeam(lessThan= 1,withInRange=310, incompleteBuildings= true) and self.tags(includes= '举枪')
isVisible:false
stopLastAnimation: true

alsoQueueAction: b
[action_b]
displayType: action
price: 0
playAnimation: 部署1
buildSpeed: 0.51s
isVisible: false
temporarilyRemoveTags:举枪
highPriorityQueue: true
whenBuilding_cannotMove: false

