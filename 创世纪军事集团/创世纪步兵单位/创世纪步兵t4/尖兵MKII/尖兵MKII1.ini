[action_b]
displayType: action
price: 0
buildSpeed: 0s
isVisible: true
whenBuilding_cannotMove: true
text: 展开主炮
alsoQueueAction: bx
description: 展开双联装155mm防空炮，\n-以及稳定装置，\n-使单位能攻击空中和高空单位，\n-不过因为稳定装置的副作用，\n-其对地效率和移动速度会降低。\n-展开武器后能攻击空中和高空单位，\n-降低移动速度，对地武器射程以及射速。\n-同时展开主炮后对地武器无法享受先进目标定位核心的增益。
isLocked: if self.resource.xk > 0 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
iconImage: ROOT:/通用特效/展开主炮.png
resetCustomTimer: true
temporarilyAddTags: 切枪
playSoundAtUnit:ROOT:/通用特效/展开主炮.ogg
allowMultipleInQueue:false
spawnEffects: CUSTOM:烟雾喷射*5,CUSTOM:烟雾喷射1*5
