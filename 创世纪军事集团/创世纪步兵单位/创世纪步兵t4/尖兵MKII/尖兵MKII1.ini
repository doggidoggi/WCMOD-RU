


[core]
name: 尖兵MK21
displayText: 尖兵MK2
copyFrom:ROOT:/通用特效/单位防护.ini
price: 5500,钍=108
maxHp: 15000
displayDescription: 【阶级t4】【可翻越悬崖】【机械单位】【地面单位】战术定位:先进防空机甲，单位体积:5\n-武器配置：▲155毫米高射炮X2 对空对高空 爆炸伤害 对极端重型单位加成。\n-▲转轮自动炮X1 只能对地 爆炸伤害\n-▲反装甲炮x1 只能对地 动能伤害\n-由科普斯军事研究所开发的尖兵机甲的原型机，\n-因为机械结构过于复杂且生产成本过高，\n-最终才在其基础上削减成了现在的普通尖兵机甲。\n-原型尖兵机甲不仅配备了两门155防空炮和快速填弹器，\n-还装有相当厚重的装甲和多样的对地武器。
techLevel: 1
armour: 15
buildSpeed: 8s
#availableInDemo: true
radius: 55
fogOfWarSightRange: 27
displayRadius: 55
unitsSpawnedOnDeath: 损毁2*1
tags: 地面,反高空,尖尖兵
transportSlotsNeeded: 5
showActionsWithMixedSelectionIfOtherUnitsHaveTag: 尖尖兵
showInEditor: false
[action_恐怖地雷1]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/恐怖1.png
text: 恐怖地雷1
isActive: false
isVisible: if self.globalTeamTags(includes='恐怖地雷1') and not self.globalTeamTags(includes='恐怖地雷3') 

[action_恐怖地雷3]
