


[core]
name: 狩猎者导弹1
displayText: 狩猎者
price: 3300
maxHp: 5300
displayDescription: 【阶级t4】【可翻越悬崖】【生物单位】【地面单位】战术定位:先进泛用型步兵，单位体积:5\n-武器配置：▲自动突击炮X1 只能对地 动能伤害 \n-▲火箭发射仓x1 只能对地 爆炸伤害 对建筑物伤害加成\n-一种以地狱猎犬结构为基础，进行再设计的中型主战机甲。\n-创世纪每次将与余辉作战的前线装甲兵团撤回时，都会从中挑选最优秀的驾驶员，\n-让这些既老道又疯狂的战争精英来驾驶创世纪的主战机甲——狩猎者。\n-相比于坦克而言，主战机甲在复杂地形中要更加灵活有效，\n-创世纪每个集团军中，都会配备由狩猎者和其他机甲组成的机甲营，\n-他们专门负责猎杀余辉的各种主力机甲和地面上的庞然大物。
isUnrepairableUnit:true
techLevel: 1
buildSpeed: 24s
radius: 33
displayRadius: 33
armour: 20
fogOfWarSightRange: 20
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/步兵掩体.md,ROOT:/通用特效/扎针.md
transportSlotsNeeded: 5
unitsSpawnedOnDeath: 损毁2*1
tags: 地面,狩猎者,机甲,步兵,驻扎要塞
showActionsWithMixedSelectionIfOtherUnitsHaveTag: 狩猎者
energyMax: 4

energyRegen: 0.035
energyNeedsToRechargeToFull: true
showInEditor: false
[action_man1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999
[action_恐怖地雷1]
