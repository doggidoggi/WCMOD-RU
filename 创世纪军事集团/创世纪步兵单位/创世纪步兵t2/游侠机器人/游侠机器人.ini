


[core]
name: 游侠机器人
displayText: Робот «Странник»
displayDescription: 【Уровень t2】【Механический юнит】【Наземный юнит】【Беспилотный юнит】【тяжёлое укрытие】\n-【Дистанционный сапёр】Тактическое назначение: вспомогательный пехотный робот，размер юнита:2\n-вооружение：▲反танкракетапусковая установкаX2 только по земле，взрывной урон。\n-一вид结构простой，灵活манёвр的量产 боймашинаустройство人。\n-那些运气不错的Генезиспехотное отделение通常都会оснащён一部Робот «Странник»。\n-Робот «Странник»оснащён重 合金盾牌можетэффективный保护вокруг的пехота，\n-одновременно用两 反танкракетапусковая установкатакжеможетсправляется с难缠的бронированная цель。\n-当然они的функцияне толькотолько有这些，\n-在运输弹药，保护伤员，扫雷排障，哪怕是休闲娱乐方面，\n-Робот «Странник»都为Генезиспехота立下过汗马功劳，\n-在несколькопехотное отделение中，Робот «Странник»даже被морпехи们当做兄弟。
