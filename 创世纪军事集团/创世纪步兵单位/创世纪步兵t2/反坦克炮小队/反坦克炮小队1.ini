


[core]
name: 反坦克炮小队1
displayText: 反坦克炮小队
class: CustomUnitMetadata
displayDescription:【阶级t2】【生物单位】【地面单位】战术定位:反装甲步兵，单位体积:2\n-武器配置：▲反坦克炮X1 只能对地 动能伤害 对生物单位效果差 \n- 哦，真该死，应该没法在创世纪陆军中找到比这还老的武器了。\n-你的爷爷的父亲甚至还用这件武器抗击过纳粹德国的入侵。\n-不过值得庆幸的是，他们说这姥爷炮对抗余辉和当年对抗纳粹一样有效，\n-虽然有夸大其词的成分，但某种程度上这种武器确实要比现在那些反坦克火箭有效一些。

price: 900
isUnrepairableUnit:true
showInEditor: false
maxHp: 600
mass: 90
techLevel: 1
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
buildSpeed: 9s
softCollisionOnAll: 5
radius: 16
isBio: true
armour: 7
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/步兵掩体.md
transportSlotsNeeded: 2
explodeOnDeath: false
hideScorchMark: true
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3
tags: 步兵,地面,反坦克炮,驻扎要塞
energyMax: 1
energyRegen: 0
energyNeedsToRechargeToFull: true
[action_man1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999
[hiddenAction_jb]
autoTrigger: if self.hasActiveWaypoint(type= 'move') 
clearActiveWaypoint: true
[action_1]
price: 0
text: 收起反坦克炮
buildSpeed: 2.5s
convertTo: 反坦克炮小队
displayType: action
iconImage: ROOT:/创世纪军事集团/单位特效/起立.png
description: 命令反坦克炮小队收起武器并进行移动。\n-收起后将无法攻击，并失去护甲值增益，但可以移动。
convertTo_keepCurrentFields:maxHp
convertTo_keepCurrentTags:true
[hiddenAction_离开地堡]
autoTrigger: if self.hasFlag(id=30) and not self.hasParent()
