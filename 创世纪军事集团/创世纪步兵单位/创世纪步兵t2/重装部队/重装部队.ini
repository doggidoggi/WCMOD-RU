


[core]
name: 重装部队
displayText: 重装步兵
class: CustomUnitMetadata
displayDescription: 【阶级t2】【生物单位】【地面单位】  战术定位:泛用型步兵，\n-单位体积:1，武器配置：▲M134机枪X1 对地对空，动能伤害。\n-重装步兵装备动力外骨骼使得他们能携带重型设备，\n-这些大块头挂载了重装甲和M134机枪甚至能和坦克对抗。

price: 320
transportSlotsNeeded: 1
maxHp: 450
isUnrepairableUnit:true
mass: 600
techLevel: 1
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
buildSpeed: 4s
radius: 10
softCollisionOnAll: 5
isBio: true
explodeOnDeath: false
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/步兵掩体.md
hideScorchMark: true
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3
tags: 步兵,地面,驻扎要塞,1格
armour: 0
[action_man1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999
[action_举枪]
autoTrigger: if numberOfUnitsInEnemyTeam(greaterThan= 0,withInRange=310, incompleteBuildings= true) and not self.tags(includes= '举枪')
isVisible:false
temporarilyAddTags:举枪
playAnimation:部署
[action_收枪]
autoTrigger: if numberOfUnitsInEnemyTeam(lessThan=1,withInRange=310, incompleteBuildings= true) and self.tags(includes= '举枪')
isVisible:false
stopLastAnimation: true

alsoQueueAction: b
[action_b]
displayType: action
price: 0
playAnimation: 部署1
buildSpeed: 0.51s
isVisible: false
temporarilyRemoveTags:举枪
highPriorityQueue: true
whenBuilding_cannotMove: false
[action_电磁炮1]
displayType: infoOnlyNoBox
iconImage: ROOT:/创世纪军事集团/单位特效/轨道1.png
text: 轨道发射器1
isActive: false
isVisible: if self.globalTeamTags(includes='轨道发射器1')
[graphics]
total_frames: 1
image: NO.png
image_wreak: 尸体.png
image_turret: NO.png
image_shadow: AUTO
shadowOffsetX: 2
shadowOffsetY: 2
teamColorsOnTurret: true
lock_body_rotation_with_main_turret: true
lock_leg_rotation_with_main_turret: true
