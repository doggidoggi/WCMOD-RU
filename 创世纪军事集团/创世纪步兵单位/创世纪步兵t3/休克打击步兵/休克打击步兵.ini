


[core]
name: 休克打击步兵
displayText: Шок-пехотинец
class: CustomUnitMetadata
displayDescription:【Уровень t3】【Биологический юнит】【Наземный юнит】Тактическое назначение:瘫痪攻击 пехота，\n-размер юнита:1，только по земле，вооружение：▲休克步枪X1 \n- нейтральный урон，对вражеский施加休克эффект усиленный урон по щитам且пробивает укрытия。\n- Шок-пехотинецоснащённыйАльянс Генезиссамыйпередовой休克步枪进行攻击，\n-这видпередовойEMPоружиехотя蓄может较慢，\n-но针对механический юнит的伤害однако是呈几何класс别的，\n-除此之外，ониещёможет对大部分механический юнит造成暂时瘫痪эффект。
price: 600
maxHp: 550
isUnrepairableUnit:true
mass: 600
techLevel: 1
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
buildSpeed: 5s
radius: 10
softCollisionOnAll: 5
isBio: true
explodeOnDeath: false
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/步兵掩体.md
hideScorchMark: true
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3
tags: 步兵,地面,驻扎要塞,1格
armour: 0
[action_man1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999
[action_举枪]
autoTrigger: if numberOfUnitsInEnemyTeam(greaterThan= 0,withInRange=420, incompleteBuildings= true) and not self.tags(includes= '举枪')
isVisible:false
temporarilyAddTags:举枪
playAnimation:部署
[action_收枪]
autoTrigger: if numberOfUnitsInEnemyTeam(lessThan= 1,withInRange=420, incompleteBuildings= true) and self.tags(includes= '举枪')
isVisible:false
stopLastAnimation: true

alsoQueueAction: b
[action_b]
displayType: action
price: 0
playAnimation: 部署1
buildSpeed: 0.51s
isVisible: false
temporarilyRemoveTags:举枪
highPriorityQueue: true
whenBuilding_cannotMove: false

