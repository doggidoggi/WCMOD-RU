description: использоватьспециальный的Электромагнит榴弹в качестве弹药。\n-Электромагнит榴弹将会瘫痪目标рядомвсемеханический юнит数秒，\n-и对护盾造成毁灭性的伤害。\n-为了实现тактикаэффект，轨道步枪将会充может后再запускать，\n-чтобы让восстанавливающийбоецможет在安全的地方瘫痪враг。\n-切换子弹后，主оружие将改为запускатьнейтральный урон类 ，\n-对враг施加范围性empэффект的炮弹，усиленный урон по щитам。\n-每次射击都会消耗может量，использовать此弹药时，восстанавливающийбоец的дальность将повышает至400。\n-无视укрытие。
