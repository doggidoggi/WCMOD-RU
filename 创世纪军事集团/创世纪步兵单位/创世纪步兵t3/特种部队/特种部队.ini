


[core]
name: 特种部队
displayText: Спецназ
class: CustomUnitMetadata
displayDescription:【Уровень t3】【Биологический юнит】【Наземный юнит】Тактическое назначение:функция пехота，амфибия，размер юнита:1\n-вооружение：▲轨道步枪X1 только по земле，伤害类 随оснащение改变а改变。\n-восстанавливающийбоецможет说是Генезиспехотасамыймощный存在，\n-不同于с往的нормальныйчеловечествопехота，восстанавливающийбоец都是采用优良基因的克隆人，\n-они生来就是самый优秀的боец和杀手，\n-не только没有痛觉，и不会被нормальныйчеловечество的情感影响，более是会абсолютный听从上класс命令，\n-这让восстанавливающийбоецстановитьсяАльянс Генезис的利刃，用着самыйпередовойоружие执行самый关键的任务и重创враг。

price: 2500,钍=65
isUnrepairableUnit:true
maxHp: 1500
tags: 步兵,特种部队,地面,寄生免疫,霰弹,驻扎要塞,1格
mass: 45
techLevel: 1
fogOfWarSightRange: 30
armour: 10
buildSpeed: 16s
radius: 13
isBio: true
explodeOnDeath: false
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3

hideScorchMark: true
