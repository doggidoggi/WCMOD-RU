description: использовать爆炸霰弹в качестве轨道步枪的弹药。\n-爆炸霰弹иметь进炸引信。\n-这вид子弹会在靠близковражескийюнит时爆炸и释放出бесчисленныесмертельный破片。\n-对биологический юниткрайнесмертельный，нонедостаток是对бронетехника几乎неэффективный。\n-切换子弹后，主оружие将改为запускатьвзрывной урон类 的aoe霰弹，\n-усиленный урон по биологическим юнитам且无视укрытие。

[action_狙击]
text: 狙击模式
displayType: action
buildSpeed: 0.2s
pos: 0.2
displayRemainingStockpile: false
highPriorityQueue: true
price:0
canPlayerCancel: false
onlyOneUnitAtATime: false
iconImage: 穿甲.png
isVisible:true
whenBuilding_cannotMove: true
allowMultipleInQueue:false
description: 命令восстанавливающийбоец站定и换装钢针穿甲弹，использоватьпередовой观瞄оборудование从далеко处狙击враг。\n-切换为狙击模式后，восстанавливающийбоец将暂时无法移动，\n-одновременно，восстанавливающийбоец将对范围440с内的вражеский地面或空中враг每2.5秒进行一次狙击，\n-每次狙击将造成кинетический урон，иусиленный урон по щитам，\n-每次狙击都将消耗может量，狙击模式下将无法恢复может量和использовать其онспособность，одновременнотакже无法乘坐任何载具。
isLockedMessage: не может在надводный进行狙击，或者может量不足с进行至少一次狙击，或者其ондействия进行中，пожалуйста, подождите
isLocked:if self.queueSize> 0 or self.isOverLiquid or self.energy<3.5
