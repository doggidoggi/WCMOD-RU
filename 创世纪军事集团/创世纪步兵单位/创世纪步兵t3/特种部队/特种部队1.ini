


[core]
name: 特种部队1
displayText: 再造战士
class: CustomUnitMetadata
displayDescription:【阶级t3】【生物单位】【地面单位】战术定位:功能型步兵，水陆两栖，单位体积:1\n-武器配置：▲轨道步枪X1 只能对地，伤害类型随装备改变而改变。\n-再造战士可以说是创世纪步兵最强大的存在，\n-不同于以往的正常人类步兵，再造战士都是采用优良基因的克隆人，\n-他们生来就是最优秀的战士和杀手，\n-不仅没有痛觉，而且不会被正常人类的情感影响，更是会绝对听从上级命令，\n-这让再造战士成为创世纪联盟的利刃，用着最先进的武器执行最关键的任务并重创敌人。
price: 2500,钍=65
transportSlotsNeeded:999
maxHp: 1500
isUnrepairableUnit:true
tags: 步兵,特种部队,地面,寄生免疫,霰弹,1格
mass: 45
showInEditor: false
techLevel: 1
fogOfWarSightRange: 30
armour: 10
buildSpeed: 16s
radius: 13
isBio: true
explodeOnDeath: false
effectOnDeath: CUSTOM:飘血*9,CUSTOM:飘血2*8,CUSTOM:飘血3

hideScorchMark: true
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/步兵掩体.md
softCollisionOnAll: 5
showActionsWithMixedSelectionIfOtherUnitsHaveTag: 特种部队
energyMax: 15

energyRegen: 0
energyNeedsToRechargeToFull: false

[action_man1]
autoTrigger: if self.isOverLiquid and not self.isOverPassableTile(type='WATER') and not self.hasParent()
isVisible: false
addResources: hp=-999999

[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999
[hiddenAction_return]
autoTrigger:if self.energy<3.5 or self.hasParent
