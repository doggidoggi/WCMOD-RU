description: Имперское Зарево — автоматизированная армия, созданная Империей Нова. Цель ИИ Зарева — устранить все угрозы на территории Империи\n-и обеспечить её безопасность и стабильность. Всех людей на Земле он считает чужаками, посягнувшими на имперские владения,\n-и потому отправляет войска защищать «свои» территории, ведя войну сразу на двух фронтах.\n-Войска Зарева опираются прежде всего на энергетическое и взрывное оружие и, как правило, располагают самыми мощными боевыми юнитами своей эпохи.\n-Это даёт Имперскому Зареву огромное преимущество в открытом бою и позволяет реализовать высокую боевую мощь без сложного микроконтроля и тактики.\n-Кроме того, Зарево возводит здания при помощи десанта с орбиты, что значительно экономит время.\n-Фракция почти не нуждается в тонком управлении: благодаря высоким характеристикам Зарево практически не уступает в прямом столкновении.\n-Сложность освоения: низкая.


