description:Космические Скитальцы изначально называются «Объединённый Орден Эвенора», но «Скитальцы» — их повсеместно распространённое прозвище.\n-Они представляют собой последних известных потомков Древних Людей. Покинув родину, превратившуюся в адскую пустошь,\n-их корабль-ковчег («Семя») рухнул на Землю, и теперь они вместе с человечеством сражаются против общего врага — Имперского Зарева.\n-Скитальцы — фракция кинетического и энергетического оружия.\n-Большинство их машин обладают самовосстановлением и высокой боевой мощью.\n-Биологические юниты быстро производятся в подавляющих количествах, а способность к ассимиляции позволяет рвать оборону врага,\n-создавая возможности и прикрытие для машин — стиль игры строится на быстрых компактных штурмах.\n-У Скитальцев есть уникальная механика телепортации, позволяющая мгновенно перебрасывать большие силы\n-или проводить разнообразные диверсионные удары для решающего перевеса.\n-Сложность освоения: средняя.
