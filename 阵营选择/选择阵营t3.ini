description:Если фракция не будет выбрана за оставшееся время, по умолчанию будет выбран Альянс Генезис.
[action_创]
isVisible: if not self.tags(includes= '创世纪')
isActive: true
iconImage: G.png
price: 0
text: Альянс Генезис
buildSpeed: 0s
pos: 0.1
highPriorityQueue: true
ai_isHighPriority: false

temporarilyAddTags:创世纪
temporarilyRemoveTags:余晖,浪人
playSoundToPlayer:创.wav
[action_选了创]
pos: 0.1
displayType: infoOnly
isGuiBlinking: true
iconImage:G.png
text:Выбрано
isActive: false
isVisible:if self.tags(includes= '创世纪')
description: Чтобы противостоять Имперскому Зареву, всё человечество объединилось в Альянс Генезис.\n-Несмотря на ограниченную мощь, Альянс по-прежнему остаётся главной силой в борьбе с Заревом и с трудом удерживает порядок в человеческом обществе.\n-Однако сражение за сражением доказывают: недооценивать боевой потенциал Генезиса — глупость и предубеждение.\n-Генезис — фракция, опирающаяся прежде всего на кинетическое и взрывное оружие.\n-Она прекрасно умеет использовать масштабную экономику, быстро превращая разные ресурсы в производство и боевую мощь, чтобы сокрушать противника.\n-Также располагает множеством тактических юнитов и тяжёлыми бомбардировщиками.\n-Боеспособность юнитов напрямую зависит от навыков игрока — при неумелом использовании их потенциал крайне низок.\n-При этом Генезис очень силён в обороне.\n-Сложность освоения: высокая.


