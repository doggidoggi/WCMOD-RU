


[core]
name: HK收割者
class: CustomUnitMetadata
price: 700
maxHp: 400
displayDescription: -为应对携带反装甲武器的小型突击部队，\n-余辉将坦克底盘与两门相位机枪和若干火箭弹结合在了一起，\n-这些看似不起眼的小家伙能在瞬间将一个班的陆战队员烧成灰烬，\n-即使在面对突击车辆与无人机时他也能用火箭弹轻松解决问题。\n-对地对空。机枪能源且反掩体，导弹爆炸

techLevel: 1
buildSpeed: 6.5s
#availableInDemo: true
radius: 19
displayRadius: 19

isBio: false
softCollisionOnAll: 6
effectOnDeath: CUSTOM:闪电*2
tags: 地面,无人单位
copyFrom: ROOT:/通用特效/单位防护.ini
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
maxShield: 360
shieldRegen: 0.07
armour: 3
unitsSpawnedOnDeath: 损毁*1


[action_s1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[graphics]
total_frames: 3
image: HK收割者底盘.png
image_wreak: HK收割者死亡.png
image_turret: HK收割者主体.png
image_shadow: AUTO

shadowOffsetX: 1
shadowOffsetY: 1
animation_moving_start: 0
animation_moving_end: 2
animation_moving_speed: 1

dustEffect: true
teamColorsOnTurret: true


[attack]
canAttack: true
canAttackFlyingUnits: true
canAttackLandUnits: true
canAttackUnderwaterUnits: false
turretSize: 20

turretTurnSpeed: 4
maxAttackRange: 275


[turret_1]
x: 18
y: -3
image: HK收割者炮塔.png
attachedTo: 3
idleDir: 10
warmup: 0
projectile: 1
delay: 6
turnSpeed: 3.0
turnSpeedAcceleration: 0.5
shoot_sound: ROOT:/余辉军团/单位特效/激光枪音效.ogg
shoot_sound_vol: 0.2
shoot_light: #FF4DD3F7
canShoot: true
size: 14
recoilOffset: -1
canAttackCondition: if self.resource.xk < 1
