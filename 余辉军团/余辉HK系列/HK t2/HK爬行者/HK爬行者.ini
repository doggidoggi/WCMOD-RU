


[core]
name: HK爬行者
displayText: HK爬行者
displayDescription: -HK爬行者是余辉设计的一款远程地雷，\n-他们善于埋伏在路边和各种关键节点，\n-用他们的导弹给敌人一个巨大的惊喜。\n-只能对地，必须部署后才能攻击，爆炸伤害，部署前水陆两栖，免疫地雷。
class: CustomUnitMetadata
price: 550

maxHp: 140
techLevel: 1
fogOfWarSightRange: 10
transportSlotsNeeded: 9999
buildSpeed: 3.5s
radius: 12
tags: 地面,悬浮
copyFrom: ROOT:/通用特效/单位防护.ini
isBio: false

energyMax: 1
energyRegen: 0.001
energyNeedsToRechargeToFull: true


[action_部署]
convertTo: HK爬行者部署
displayType: action
price: 0
text: 部署
isVisible: if not self.isOverLiquid

buildSpeed: 2s
whenBuilding_cannotMove: true
isLocked: if self.resource.xk > 0
isActive: if self.energy(full=true)


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[graphics]
total_frames: 1
image: HK爬行者.png
image_wreak: HK爬行者死亡.png
image_turret: NONE
image_shadow: AUTO

shadowOffsetX: 1
shadowOffsetY: 1


[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits: true
canAttackUnderwaterUnits: false
turretSize: 1

turretTurnSpeed: 2.5
maxAttackRange: 0


[movement]
movementType: HOVER
moveSpeed: 1
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.07
targetHeight: 3

targetHeightDrift: 2
maxTurnSpeed: 7
turnAcceleration: 0.25
moveSlidingMode: false
moveIgnoringBody: true


