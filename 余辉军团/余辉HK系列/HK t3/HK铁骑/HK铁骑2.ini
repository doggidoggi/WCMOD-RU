[core]
name: HK铁骑2
displayText: HK铁骑
copyFrom:ROOT:/通用特效/单位防护.ini
price: 1600
maxHp: 2000

maxShield: 2000
shieldRegen: 0.07
displayDescription: -铁骑机甲的历史最早可以追溯到古人类第二次大航海时期末期，\n-这款机甲被伯亚斯家族设计，并广泛配发在各大空间站和战舰上充当内部防御机甲。\n-其设计目的是为了制止其他敌对势力的突击小队潜入盗取甚至破坏战舰的行为。\n-这款机甲经久不衰，诺瓦帝国只要是台像样的战舰，上面的内部戒备力量就肯定少不了铁骑，\n-因此，余辉铁骑机甲的库存几乎可以用无穷无尽来形容。\n-由于充分考虑到舰内作战，无论是铁骑机甲的护盾还是装甲，在轻武器面前几乎都无懈可击。\n-但同时为了避免在交战中对战舰内部结构造成不必要的误伤，\n-铁骑机甲的武器和速度相比于其他主战机甲要逊色不少。\n-只能对地，能源伤害。
techLevel: 1
buildSpeed: 12s

#availableInDemo: true
radius: 28
armour: 25
showInEditor: false
displayRadius: 28

unitsSpawnedOnDeath: 损毁*1,反应堆1
tags: 地面,无人单位
#transportSlotsNeeded:2
energyMax: 6
energyRegen: 0.03

energyNeedsToRechargeToFull: true
