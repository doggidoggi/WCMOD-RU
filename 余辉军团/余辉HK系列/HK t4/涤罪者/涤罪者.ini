[core]
name: 涤罪者
price: 3000
maxHp: 4000
maxShield: 1000
shieldRenderRadius: 1
shieldRegen: 0.05
displayDescription:【阶级t4】【可翻越悬崖】【机械单位】【无人单位】【地面单位】战术定位:泛用型机甲，单位体积:3，\n-武器配置：▲等离子腕炮X1 只能对地 只能攻击地面机械单位 能源伤害 \n-▲等离子火焰喷射器X1 只能攻击地面建筑物和生物单位  中性伤害 反掩体 \n-▲重机枪X4 对地对空 能源伤害 反掩体 对伴生，空中单位伤害加成 \n-涤罪者是古人类战国末期，AI为了高效应对残酷的巷战研发的重装无人机甲，\n-与其他空降部队的单位相比，涤罪者着重强调量产化，\n-以牺牲反应堆功率被迫装配实体盾为代价换来极其恐怖的产量，\n-其头部遍布大量外置探针，尤其是对小型单位极其灵敏，\n-涤罪者能在眨眼的瞬间将一个小队的重装陆战队员烧成灰烬，\n-又或者是用等离子腕炮将敌方载具打个对穿。
techLevel: 1
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
buildSpeed: 10s
radius: 42
displayRadius: 42
armour: 10
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/爆炸素材库.md
transportSlotsNeeded: 3
unitsSpawnedOnDeath: 损毁2(offsetHeight=0,offsetDir=0,addResources=电磁:1)
tags: 地面,无人单位,涤罪者
energyMax: 5
energyRegen: 0.06
energyNeedsToRechargeToFull: true
effectOnDeath:CUSTOM:小型余晖死亡冲击波,CUSTOM:小型余晖死亡爆炸,CUSTOM:小型余晖死亡钢珠,CUSTOM:小型余晖死亡闪光
[resource_电磁]
displayName: 电磁
displayNameShort: 电磁
displayColor: #FF9D00FF
priority: 1
hidden: true

