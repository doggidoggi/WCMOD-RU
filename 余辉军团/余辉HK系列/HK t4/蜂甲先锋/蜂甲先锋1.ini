[core]
name: 蜂甲先锋1
displayText:  蜂甲先锋
displayDescription: 【阶级t4】【远程扫雷器】【机械单位】【地面单位】【无人单位】【可翻越悬崖】\n-战术定位:辅助型机器人 单位体积：3 武器配置：\n-▲破障锯刃 X1 只能对地 中性伤害 \n-▲EMP线圈 X1 只能对地 中性伤害 对护盾伤害加成 造成休克效果 \n-▲震撼飞弹 X2 只能攻击和伤害地面建筑物 \n-▲消防装置 X1 自动清除附近的危险物体 \n-蜂甲先锋是帝国空降部队必不可少的辅助型机甲，\n-这些轻便且高效的机器工兵总是负责为后续的部队开拓道路。\n-与诺瓦帝国其他机械怪兽所不同的是，\n-蜂甲先锋既没有配备毁天灭地的武器，也没有配备铜墙铁壁般的护盾，\n-他最大的价值在于其先进且多功能的子系统，\n-无论前方的道路多么复杂且危险，蜂甲先锋总是能为你的部队开辟出一条通往胜利的道路。
class: CustomUnitMetadata
showInEditor: false
price: 3500
maxHp: 6000
maxShield: 5800
shieldRenderRadius: 1
shieldRegen: 0.07
armour: 5
techLevel: 1
unitsSpawnedOnDeath: 损毁2(offsetHeight=0,offsetDir=0,addResources=电磁:1)
radius: 50
displayRadius: 50
softCollisionOnAll: 30
fogOfWarSightRange: 33
isBio: false
transportSlotsNeeded: 3
buildSpeed: 13s
copyFrom: ROOT:/通用特效/单位防护.ini
tags: 地面,无人单位,扫雷,主动扫雷,消防
