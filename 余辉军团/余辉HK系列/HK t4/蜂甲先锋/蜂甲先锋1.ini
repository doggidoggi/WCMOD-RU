alsoQueueAction: bx1
description: 向后折叠武器架，关闭消防装置并展开机体前端破障剧刃，\n-同时展开护板遮盖机体关键部位，准备与敌人展开进战。\n-冲锋模式下蜂甲先锋将只能进行进战，并造成中性伤害，\n-提升移动速度，获得护甲加成，并在死亡时造成大量能源伤害。\n-注意，冲锋模式下扫雷装置和地雷屏蔽能力将禁用，并且本体将不能被运输。

