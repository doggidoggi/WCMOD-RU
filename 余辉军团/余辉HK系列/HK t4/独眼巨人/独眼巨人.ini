[core]
name: 独眼巨人
price: 12500,蓝晶=1050,ry= ${ryxq}
@global ryxq:15
reclaimPrice: ry= ${ryxq}
maxHp: 10000
maxShield: 15000
shieldRenderRadius: 1
shieldRegen: 0.2
displayDescription:  【阶级t4】【可翻越悬崖】【无人单位】【机械单位】【地面单位】【极端重型单位】\n-战术定位:重型反单体攻城机甲，无法被运输，武器配置：\n-▲浮游炮组X4 对地对空 能源伤害 ▲等离子防空炮X4 只能对高空 爆炸伤害 \n-▲等离子轨道炮 只能对地 能源伤害 ▲死亡激光 只能对地 能源伤害 反掩体 对极端重型单位伤害加成\n-帝国空降部队在攻击地面反舰设施时，往往会因为火力不足而被地面防御设施压制，\n-为此，提米丽斯科技针对这一问题提出了最终解决方案——独眼巨人。\n-该机利用十分奇特的工程学构造使得能将其巨型机体叠放在空投仓内进行空降，\n-独眼巨人配备的重型质量加速器既能加速等离子体在安全距离贯穿敌方阵地，\n-也能使用聚焦模式持续投送光束摧毁敌方关键目标，\n-独眼巨人的出现往往是一座要塞被夷为平地，甚至是一颗星球被帝国征服的前兆。
techLevel: 1
buildSpeed: 40s
radius: 82
selfRegenRate: 1
displayRadius: 82
softCollisionOnAll: 20
armour: 100
