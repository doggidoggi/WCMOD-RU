


[core]
name: HK狮蝎
price: 1500
maxHp: 1000
displayDescription: -HK狮蝎十分初级且有效的核心单位，\n-其搭载的45毫米相位炮和光子榴弹发射器对绝大多数轻型单位是致命的。\n-只能对地，能源伤害
techLevel: 1

buildSpeed: 16s
maxShield: 400
shieldRegen: 0.1
radius: 15
displayRadius: 15
fogOfWarSightRange: 16
energyMax: 4
energyRegen: 0.017
energyNeedsToRechargeToFull: true
tags: 地面,无人单位
copyFrom: ROOT:/通用特效/单位防护.ini
armour: 2




[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
