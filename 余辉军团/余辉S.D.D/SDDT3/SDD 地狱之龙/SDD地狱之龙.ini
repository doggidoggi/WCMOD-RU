[core]
name: SDD地狱之龙
maxShield: 2500
shieldRegen: 0.07
class: CustomUnitMetadata
price: 2700,蓝晶=250

maxHp: 1500
armour: 12
displayDescription: -余辉总是能将那些诺瓦帝国只停留在纸面上的疯狂设计变为现实，\n-诺瓦帝国暮年之时，关于下一代战斗机的研发计划被提上日程，\n-“即能夺取制空权，又有对舰轰炸能力。”是这款战斗机设计的指标，\n-只不过这项研究才刚刚开始，诺瓦帝国就陷入了一片战火之中。\n-之后，余辉独立完成了这款战斗机的开发并大规模列装部队。\n-当那些叛乱者看到那只存在于图纸上的战斗机，以洪水之势向自己冲来时，\n-地狱之龙这个名字，也因此而诞生并威震八方。\n-地狱之龙是余辉技术的瑰宝，消灭战机和战舰都不在话下，\n-地狱之龙同时也是星区中最可怕的“巨舰猎手”。\n-对地对空，能源伤害，武器对护盾伤害加成，可以展开。\n-设计类型：帝国余辉 米德加德计划数据
techLevel: 1
buildSpeed: 17s

availableInDemo: true
radius: 44
displayRadius: 44
isBio: false
shieldRenderRadius: 50
fogOfWarSightRange: 22
softCollisionOnAll: 10
energyMax: 2.5
energyRegen: 0.02
energyNeedsToRechargeToFull: true

