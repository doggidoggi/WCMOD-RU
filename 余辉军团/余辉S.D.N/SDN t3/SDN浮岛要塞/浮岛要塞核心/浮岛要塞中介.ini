displayDescription: -浮岛要塞是名副其实的钢铁巨兽，他是诺瓦帝国国力最强有力的象征之一。\n-古人类战国时期末期，为了守护刚刚从亚尔佛里德手中夺来的海洋霸权，\n-浮岛要塞被帝国的科研部设计出来，并大量部署于各个海洋星球。\n-规模空前的浮岛要塞携带大量毁灭性武器以及坚不可摧的防御设备，\n-他们可以在眨眼的瞬间摧毁整个海上舰队，哪怕是面对空天舰也有一战之力。\n-这种单位在创世纪看来是近乎无敌的存在，也是余辉海面上最大的单位之一。\n-令人庆幸的是，浮岛要塞在诺瓦帝国末期的混战中损失殆尽 ，\n-即使是余辉拥有的数量也十分有限，他们一般只出现在余辉核心设施附近。\n-对地对空，导弹爆炸，其他能源，拥有舰载机。休克免疫\n-设计类型：诺瓦帝国 次世代计划数据
