[core]
name: SDN零素1
class: CustomUnitMetadata
price: 9500,蓝晶=550
maxHp: 8000
displayText: SDN零素
displayDescription: -在古人类语言中，“零素”是单词“海王星”的音译。\n-诺瓦帝国末期的大混战中，余辉很快便夺得了战场上绝对的主动权，\n-在那个星舰还未完全普及的年代，若想要完全占领一处宜居的海洋星球，\n-部署海军是必不可少的一步，于是，零素级便在余辉的设计下应运而生。\n-这种直接由报废星舰改造而来的海军，无论从体型还是火力上都堪称是越级般的存在。\n-在浮岛要塞产能不足的情况下，零素成功帮助余辉击退了一次又一次的突袭。\n-而现在，零素作为针对创世纪战斗中的海军主力，遍布于地球海洋的各个角落。\n-对地对空，导弹爆炸，其他能源。\n-设计类型：帝国余辉 瓦尔哈拉计划数据
