[core]
name: SDN颠覆者
class: CustomUnitMetadata
price: 3000
maxHp: 1500
shieldDisplayOnlyDeflection: true

shieldRenderRadius: 27
displayDescription: -只要是诺瓦帝国有海的地方，就会有颠覆者的存在。\n-在诺瓦帝国宜居海洋星球上，颠覆者被当做最普遍的重型地面防御设施使用，\n-他们的使命就是拦截任何胆敢闯入大气内的敌人，以及击落轨道上的星舰。\n-相比于其他路基对舰武器，颠覆者更隐蔽，更迅捷，更加神出鬼没，\n-这些狡猾的猎手能在浮出水面的时候发射大量防空导弹摧毁空中目标，\n-之后便如同幽灵一般，潜入深海之中并寻找再次重创敌人的机会。\n-潜水时反雷达，能攻击水面和水下单位，浮起时能攻击空中和高空单位，\n-爆炸伤害。\n-设计类型：诺瓦帝国 基石计划数据
techLevel: 1
#shieldDisplayOnlyDeflection: true
buildSpeed: 15s

availableInDemo: false
maxShield: 1500
shieldRegen: 0.07
radius: 55
energyMax: 8

energyRegen: 0.03
effectOnDeath: CUSTOM:爆炸5*1,CUSTOM:冲击波2,CUSTOM:水波1
softCollisionOnAll: 10
energyNeedsToRechargeToFull: true
tags: 潜艇,海上,寄生免疫,无人单位

showOnMinimapToEnemies: false
isBio: false
copyFrom: ROOT:/通用特效/单位防护.ini
fogOfWarSightRange: 18

