[core]
name: SDN圣枪
class: CustomUnitMetadata
price: 3500
maxHp: 3000
maxShield: 2500

shieldRenderRadius: 27
shieldRegen: 0.07
shieldDisplayOnlyDeflection: true
displayDescription: -圣枪是余辉自行研发的，一款专注于支援的水面快艇。\n-在诺瓦帝国后期的大混战中，圣枪经常被余辉用于清理叛军的残兵败将。\n-圣枪配有最先进的索敌模块和大量防空武器，无论是天空还是深海中隐藏的敌人在他们面前都会无所遁形。\n-同时圣枪还能释放大量被称为“气球”的自动索敌空雷，从而彻底封锁整个地区。\n-或许圣枪并没有余辉其他战舰那样强大而坚挺，但是在战场上小看他的人都付出了相应的代价。\n-对地对空反潜，可以生产气球，激光炮能源且反掩体，其余爆炸。\n-设计类型：帝国余辉 基础数据库
techLevel: 1

buildSpeed: 22s
availableInDemo: true
radius: 60
tags: 地面,海上
#showActionsWithMixedSelectionIfOtherUnitsHaveTag:	圣枪

fogOfWarSightRange: 27
displayRadius: 60
isBio: false
softCollisionOnAll: 7
energyMax: 10

energyRegen: 0.0025
armour: 10
effectOnDeath: CUSTOM:爆炸5*1,CUSTOM:冲击波2,CUSTOM:水波1
copyFrom: ROOT:/通用特效/单位防护.ini
[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999
[action_反物质2]
displayType: infoOnlyNoBox
iconImage: ROOT:/余辉军团/单位特效/反2.png
text: 反物质兵器2
isActive: false
isVisible: if self.globalTeamTags(includes='反物质2')


[action_2_护盾]
