[action_1_气球]
text: 释放气球
displayType: action
buildSpeed: 1.5s
pos: 0.1
displayRemainingStockpile: true

highPriorityQueue: true
price: energy=5
canPlayerCancel: false
spawnUnits: 气球*2
onlyOneUnitAtATime: true

description: 气球是一种自动寻导的自杀式无人机，\n-他难以被发现，并能对单个敌人造成最高1500点能源伤害。\n-释放后，他将自动寻找范围为1500以内的敌人，\n-直至被击落或者能源耗尽。
whenBuilding_playAnimation: 部署
isLocked: if self.resource.xk > 0 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)


[hiddenAction_↯a]
