[core]
name: SDN叹息
class: CustomUnitMetadata
price: 3500
maxHp: 3000
displayDescription: -因为古人类赖以生存的希诺星系，拥有大量全海洋覆盖的宜居星球。\n-因此，即使古人类早已能在宇宙种振翅翱翔，海军依然作为军队的主要的兵种之一。\n-SDN叹息诞生于第二次大航海时代早期，那个为了宜居星球互相争夺的时代促成了叹息的诞生。\n-即使经过了无数岁月的打磨，以及星系内战火的洗刷，\n-叹息级的蓝图依旧被沿用至今，这足以证明他的优秀与不可替代。\n-可以说，叹息级护卫舰几乎见证了整个古人类太空文明的兴衰。\n-对地对空，能源伤害。舰首主炮对护盾两倍伤害且反掩体。\n-设计类型：帝国余辉基础数据库

techLevel: 1
shieldDisplayOnlyDeflection: true
shieldRenderRadius: 32
buildSpeed: 20s
availableInDemo: true

radius: 48
displayRadius: 48
armour: 10
fogOfWarSightRange: 23
unitsSpawnedOnDeath: 反应堆1

isBio: false
softCollisionOnAll: 4
maxShield: 3000
tags: 地面,海上
copyFrom: ROOT:/通用特效/单位防护.ini
