


[core]
name: SDAF灼光坦克
class: CustomUnitMetadata
price: 900
maxHp: 700
maxShield: 700

shieldRegen: 0.07
displayDescription: -灼光坦克是一种轻型的余辉主战坦克，\n-他们所汇聚出来的高能激光对于轻型单位来说极为致命，\n-被击毁时其内部反应堆的挥发性燃料将发生爆燃，\n-以此给予敌人最后一击。\n-只能对地。能源伤害，反掩体
techLevel: 1
buildSpeed: 8s
radius: 20
armour: 5
displayRadius: 20
isBio: false
softCollisionOnAll: 6
copyFrom: ROOT:/通用特效/单位防护.ini
tags: 地面,无人单位
unitsSpawnedOnDeath: 热能*1
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}

[decal_损坏]
layer: afterBody
image: 损坏.png
onlyWhileAlive: true
teamColors: true
isVisible:if self.hp<self.maxHp * 0.36


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[graphics]
total_frames: 3
image: SDAF灼光坦克底盘.png
image_wreak: SDAF灼光坦克死亡.png
image_turret: SDAF灼光坦克炮塔.png
#turretImageScale:0.9

image_shadow: AUTO
teamColorsOnTurret: true
shadowOffsetX: 1
shadowOffsetY: 1
animation_moving_start: 0

animation_moving_end: 2
animation_moving_speed: 1
dustEffect: true


[attack]
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits: true
canAttackUnderwaterUnits: false
turretSize: 25

turretTurnSpeed: 4
maxAttackRange: 275
shootDelay: 30
aimOffsetSpread: -0.01


[turret_1]
x: 0
y: -4
projectile: 1
delay: 2
canAttackCondition: if self.resource.xk < 1
[turret_2]
x: 0
y: 0
#炮塔损坏
canShoot: false
image: 炮塔损坏.png

invisible: if self.maxHp * 0.36 < self.hp
attachedTo: 1
slave: true

[projectile_1]
@copyFromSection: template_能源
directDamage: 5
life: -4
instantReuseLast: true
beamImage: SHARED:beam3.png

beamImageStart: SHARED:beam1_start.png
sweepOffsetFromTargetRadius: 0.4
sweepSpeed: 10
instant: true
laserEffect: true

color: #FF00B3FF
lightColor: #FF004AFF
lightSize: 0.1
explodeEffect: CUSTOM:闪光,CUSTOM:烟雾2
explodeEffectOnShield: CUSTOM:闪光,CUSTOM:烟雾2

armourIgnoreAmount: 8
mutator30_ifUnitWithTags: 轻型掩护
mutator30_directDamageMultiplier: 1
mutator30_areaDamageMultiplier: 1
mutator31_ifUnitWithTags: 重型掩护
mutator31_directDamageMultiplier: 1
mutator31_areaDamageMultiplier: 1

[effect_闪光]
life: 5
spawnChance: 0.9
priority: critical
attachedToUnit: false
scaleFrom: 0.25

scaleTo: 0.25
image: 光束.png
dirOffsetRandom: 180


[effect_烟雾2]
priority: low
spawnChance: 1
stripIndex: effects
frameIndex: 0
life: 100

fadeOut: true
attachedToUnit: false
fadeInTime: 0.8
scaleTo: 1
scaleFrom: 0.5

alpha: 0.5
hSpeed: 1
drawUnderUnits: false
atmospheric: false
xSpeedAbsoluteRandom: 0.3


[movement]
movementType: LAND
moveSpeed: 0.85
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.17
maxTurnSpeed: 3.0

turnAcceleration: 0.25
moveSlidingMode : false
moveIgnoringBody: false


