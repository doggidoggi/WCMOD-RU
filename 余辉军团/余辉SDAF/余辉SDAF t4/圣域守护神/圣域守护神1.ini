[core]
name:圣域守护神1
showInEditor:false
displayText: 圣域守护神
price: 14250,蓝晶=1800,ry= ${ryxq}
@global ryxq:20
reclaimPrice: ry= ${ryxq}
maxHp: 15000
maxShield: 25000
shieldRenderRadius: 1
shieldRegen: 0.15
displayDescription:【阶级t4】【无人单位】【机械单位】【极端重型单位】【地面单位】【可翻越悬崖】\n-战术定位:重型泛用型攻击机甲，单位体积：24\n-武器配置：▲攻城型等离子轨道炮X1 能源伤害 只能攻击地面 极端重型 单位和建筑。\n-▲重型回声射线x1 能源伤害 只能攻击地面 非 极端重型 单位，无法攻击建筑 \n-▲防空导弹发射巢X4 对空对高空 爆炸伤害 \n-▲转轮等离子炮X3 只能对地 能源伤害\n-圣域守护神是机械之神赐予所有帝国前线指挥官的终极战争兵器，\n-同时他也是欧菲利亚的得意之作，其卓越的性能使所有的战争AI都以能驾驶圣域守护神为傲，\n-凭借着无与伦比的机体强度和夸张的武器配备，圣域守护神总是能在地面战场上大杀四方，\n-其火力更是与轨道轰炸的火力投射量不相上下。圣域守护神是机械之神的毁灭天使，\n-更是无可争辩的全能者，他们率领着自动化作战军团南征北战，\n-为机械之神献上了一个又一个世界。
techLevel: 1
fogOfWarSightRange: ${int(attack.maxAttackRange/17.5)}
buildSpeed: 17s
radius: 105
displayRadius: 105
armour: 165
selfRegenRate: 1.8
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/爆炸素材库.md
effectOnDeath:CUSTOM:通用实验*2,CUSTOM:通用闪光nk,CUSTOM:通用聚变nk,CUSTOM:通用云雾2nk*2,CUSTOM:通用云雾1nk*2,CUSTOM:通用云雾nk*2,CUSTOM:通用冲击波nk,CUSTOM:通用冲击波nk1,CUSTOM:通用冲击波nk2,CUSTOM:通用冲击波nk3,CUSTOM:通用聚变nk1,CUSTOM:通用光球1nk,CUSTOM:通用光球nk
transportSlotsNeeded: 24
tags: 地面,无人单位,极端重型,圣域守护神

