[core]
name: 圣裁审判官
displayDescription: 【阶级t4】【无人单位】【机械单位】【休克免疫】【极端重型单位】【地面单位】【可翻越悬崖】\n-战术定位:先进近距离攻击机甲，无法被运输，\n-武器配置：▲重型等离子长矛 只能对地 中性伤害 反掩体 对极端重型单位和建筑物伤害加成。\n-▲电弧腕刀 只能对地 中性伤害 反掩体 对非极端重型单位伤害加成，造成休克效果。\n-▲重型火箭弹发射仓 只能对地 爆炸伤害 \n-这是机械之神运用最先进的技术打造的神兵利器，\n-圣裁审判官是整个星系所有机甲中的最强者之一，\n-也是能真正将高级AI核心性能发挥至极致的卓越载体。\n-圣裁审判官在帝国陆战部队中主要担任指挥官的角色，\n-他们除了有能力指挥千军万马以外，甚至还拥有单机击破敌方整支军队的强悍战力，\n-再加上高级AI核心的精密配合，更使其能单机扫荡绝大多数的战场，\n-成为任何有幸目睹其作战身姿的敌人的噩梦。\n-驾驶圣裁审判官为机械之神立下不朽功勋的AI比比皆是，\n-而未臣服于机械之神的敌人们，则在口耳相传着关于圣裁审判官的可怕传说。
fogOfWarSightRange: 70
price: 47000,蓝晶=4700,ry= ${ryxq}
@global ryxq:47
reclaimPrice: ry= ${ryxq}
maxHp: 35000
shieldRenderRadius: 1
