[core]
name: 奥克塔罗斯1
showInEditor:false
displayText: 奥克塔罗斯
displayDescription: 【阶级t4】【长距离索敌】【无人单位】【机械单位】【极端重型单位】\n-【地面单位】战术定位:重型战术武器发射平台，单位体积：16，\n-武器配置：▲组合式重型质量投射器X2 爆炸伤害 只能对地 对无护盾单位伤害加成。\n-▲火箭炮X2 爆炸伤害 只能对地 对建筑物伤害加成。\n-奥克塔罗斯是一种极具毁灭性的战略级远程炮兵单位，\n-是帝国陆战部队攻城器械中的终极王牌，仅在最艰难的攻坚战中出场。\n-其主武器为直连一枚战舰级零点能反应堆的重型质量投射器，\n-这门恐怖的巨炮在展开模式下可投射多种弹药以应对不同作战需求，\n-而在行军状态下则收起变为机体的自卫武器。\n-奥克塔罗斯配备了先进的火控系统与AI核心，使得其有效射程可覆盖一颗中等规模的行星及其邻近卫星，\n-几乎没有任何目标能逃脱其精准的炮火打击。奥克塔罗斯是机械之神降下的天灾，象征着毁灭、\n-混乱与无可抵挡的狂暴力量。
transportSlotsNeeded: 16
price:15000,蓝晶=880,ry= ${ryxq}
@global ryxq:20
reclaimPrice: ry= ${ryxq}
maxHp: 10000
shieldRenderRadius: 1
maxShield: 15000
shieldRegen: 0.07
techLevel: 1
buildSpeed: 17s
radius: 80
fogOfWarSightRange: 125
armour: 120
isBio: false
softCollisionOnAll: 16
tags: 地面,极端重型,无人单位,等离子,免疫烟雾
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/爆炸素材库.md
energyMax: 15
energyRegen: 0.005
energyNeedsToRechargeToFull: true
effectOnDeath:CUSTOM:中余晖单位死亡冲击波,CUSTOM:中余晖单位死亡爆炸,CUSTOM:中余晖单位死亡钢珠,CUSTOM:中余晖单位死亡闪光
unitsSpawnedOnDeath: 损毁2(offsetHeight=0,offsetDir=0,addResources=电磁:6)
