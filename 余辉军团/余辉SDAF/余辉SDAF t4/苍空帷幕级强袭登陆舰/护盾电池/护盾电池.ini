


[core]
name: 护盾电池
displayText: Щитовая батарея
class: CustomUnitMetadata
displayDescription: 눈_눈
price: 1500
isBuilding: true
maxHp: 2200
mass: -1
techLevel: 1
buildSpeed: 6s
transportSlotsNeeded: 999
energyStartingPercentage: 1
radius: 15
footprint: -1,-1,1,1
constructionFootprint: -1,-1,1,1
fogOfWarSightRange: 15
softCollisionOnAll: 5
copyFrom: ROOT:/通用特效/单位防护.ini
isBio: false
energyMax: 20
energyRegen: 0
dieOnZeroEnergy: true
tags: 地面,伴生单位,反高空,无人单位,寄生免疫
[hiddenAction_man1]
autoTrigger: if self.isOverLiquid and not self.isOverPassableTile(type='WATER')
isVisible: false
deleteSelf:true
[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true
[action_ax]
autoTrigger: if self.timeAlive(laterThanSeconds=2)	and not self.tags(includes= '部署')
displayType: action
price: 0
buildSpeed: 0s
isVisible: false
temporarilyAddTags: 部署
playAnimation: attack
[action_加盾]
autoTrigger:if self.tags(includes= '部署')
spawnEffects: CUSTOM:波波,CUSTOM:光子*15
addResources:energy=-1
isVisible: false
fireTurretXAtGround: 恢复
fireTurretXAtGround_withOffset: 0,0
[action_清空能量]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
isVisible: false
addResources: energy=-9999

[graphics]
total_frames: 1
image: 电池.png
image_wreak: 死亡.png
image_shadow: SHADOW:电.png
teamColorsOnTurret: true
shadowOffsetX: 1
shadowOffsetY: 1

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits: false
canAttackUnderwaterUnits: false
turretSize: 22

turretTurnSpeed: 3
maxAttackRange: 190
[turret_恢复]
x: 0
y: 0
canShoot: false
idleDir: 0
invisible: true
size: 1.1
turnSpeed: 40
projectile: 恢复
delay: 0
[projectile_恢复]
areaDamage: -5
areaRadius: 200
shieldDamageMultiplier:100
life: 250
speed: 70
drawSize: 0.01
frame: 1
lightSize: 0
explodeEffect: NONE
friendlyFire: only-ignoreEnemy
areaDamageNoFalloff: true
areaHitUnderwaterAlways:true
areaHitAirAndLandAtSameTime: true
[arm_1]
