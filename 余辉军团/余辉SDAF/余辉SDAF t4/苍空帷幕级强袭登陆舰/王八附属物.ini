


[core]
name: 王八附属物
displayText: Дополнение «Король-черепаха»
strictLevel: 1
price: 0
radius: 10
maxHp: 1

class: CustomUnitMetadata
techLevel: 1
showInEditor: false
#tags:SMIB
canNotBeDirectlyAttacked: true

isUnrepairableUnit: true
disableAllUnitCollisions: true
ignoreInUnitCapCalculation: true
disableDeathOnZeroHp: true
energyMax: 4

energyRegen: 0.033
energyNeedsToRechargeToFull: true
tags:反高空
maxTransportingUnits: 6
transportUnitsCanUnloadUnits: false
transportUnitsAddUnloadOption: false
transportUnitsRequireTag:月影
transportUnitsHealBy: 0.5
transportUnitsRequireMovementType: air
transportUnitsKeepBuiltUnits: true
@memory 灰机: number
@memory 灰机list: unit[]
copyFrom: ROOT:/通用特效/爆炸素材库.md
[hiddenAction_drone]
autoTrigger: if self.queueSize < 0.5 and memory.灰机 < 6
alsoQueueAction: SDD
[hiddenAction_SDD]
buildSpeed: 2s
requireConditional: if memory.灰机 < 6
addUnitsIntoTransport: 月影战斗机
[hiddenAction_set0]
autoTriggerOnEvent: newMessage(withTag= '灰机a')
alsoTriggerAction: set1, count0
alsoTriggerActionRepeat: memory.灰机list.size + 2
[hiddenAction_set1]
requireConditional: if memory.灰机list[0] != null and memory.灰机list[thisActionIndex].hp <= 0 or thisActionIndex == 0
setUnitMemory: 灰机list[0] = null, 灰机list[thisActionIndex] = eventSource

[hiddenAction_unset0]
autoTriggerOnEvent: newMessage(withTag= '灰机d')
alsoTriggerAction: count0
alsoTriggerActionRepeat: memory.灰机list.size + 1

[hiddenAction_count0]
requireConditional: if memory.灰机list[thisActionIndex].hp > 0 or thisActionIndex == 0
setUnitMemory: 灰机 = select(thisActionIndex == 0, 0, memory.灰机 + 1)



[hiddenAction_akm]
autoTrigger: if not self.hasFlag(id= 1) and self.attachment(withTag= "ANM_cat") == null
addResources: setFlag=1
playAnimation: attack

[hiddenAction_bkm]
autoTrigger: if self.hasFlag(id= 1) and self.attachment(withTag= "ANM_cat") != null
stopLastAnimation: true
addResources: unsetFlag=1
[attachment_b1]
x: 0
y: 0
onCreateSpawnUnitOf: 检测中介ty(addResources= ammo: 2000 | setFlag= 0)
# 对地对空
# 600是检测范围，0：对地，1：对空，2：反潜
prioritizeParentsMainTarget: false
alwaysAllowedToAttackParentsMainTarget: false
[hiddenAction_创造]
autoTrigger: if attachment(slot= 'b1') == nullUnit
attachments_onlyOnSlots: b1
attachments_addNewUnits: 检测中介ty(addResources= ammo: 2000| setFlag= 0)

