shieldRegen: 0.1
showInEditor:false
displayDescription: 【Уровень t4】【Иммунитет к шоку】【Беспилотный юнит】【Механический юнит】【Воздушный юнит】\n-тактическое назначение: универсальный антиединичный истребитель, размер юнита:10, вооружение:\n-▲плазменная винтовка точного боя энергетический урон только по земле только в режиме меха.\n-▲ракета «воздух-воздух»X6 взрывной урон только по воздуху только в режиме истребителя.\n-▲излучатель плазменного потока энергетический урон только по воздуху только в режиме истребителя.\n-Эсланпесаэто от Малкольм Рейнблизкийсамдля Империяморская пехотабитьстроить  войнамашинаустройство, это Империя Новасухопутные войскав  абсолютныйпротив  основная сила, \n-может сказать, Эсланпеса выходит текущийэто против планетарный штурмтактический большой перетасовать, \n-Этот основноймеховможет в боймашина и мехов междупреобразованиеформа, \n-поэтомуможет прямоиз полётматьна выходит выпустить, внезапновходит вражескийпланетавыполняет боевой.\n-Эсланпесаможет в чистыйкромевражескийвоздушныйв цельпослебыстрыйизменитьформападение , \n-использоватьиспользует рукав  лучстрелокшагоружиеснаряднет пустойвыпустить уничтожитьвраги.\n-ммнет вопрос, Эсланпесатогдаэто Империяморская пехотав самыйострый меч, \n-онв один разразвойнав для Империяуничтожитьнет количество враги.
