[core]
name: 焚天惩戒者
price: 15500,蓝晶=1750,ry= ${ryxq}
@global ryxq:20
reclaimPrice: ry= ${ryxq}
maxHp: 18000
maxShield: 18000
shieldRenderRadius: 1
shieldRegen: 0.2
displayDescription:【阶级t4】【长距离索敌】【无人单位】【机械单位】【极端重型单位】\n-【战略武器防御】【地面单位】战术定位:先进重防空，单位体积：16，\n-武器配置：▲重型射电脉冲炮X1 能源伤害 对空对高空 对无护盾单位伤害加成。\n-▲反舰鱼雷发射架X2 爆炸伤害 仅对高空。 ▲自杀式无人机生产线X3 能源伤害 对空对高空。\n-▲长距离索敌垂发单元X6 能源伤害 对空对高空 仅攻击被锁定的敌方单位。\n-▲点防御激光X4 对地对空 能源伤害 对伴生单位伤害加成。\n-焚天惩戒者是帝国最强大的移动式行星防御系统，凭借巡洋舰级零点能核心，\n-其能源系统能支持装配多种极为夸张的武器。在火力上，\n-这座移动堡垒更是震撼无比。其主武器为模拟中子星驱动的射电脉冲炮，\n-其威力能够轻松将战列舰级目标化为宇宙尘埃。焚天惩戒者与行星防御阵地共同组成的密集火力网，\n-能令所有地面攻击战术成为痴人说梦。\n-每当射电脉冲炮的光束划破苍穹，都像是焚天惩戒者以最狂暴的姿态，\n-宣告着机械之神对这片土地的至高主权。
techLevel: 1
buildSpeed: 34s
radius: 100
displayRadius: 100
effectOnDeath:CUSTOM:中余晖单位死亡冲击波,CUSTOM:中余晖单位死亡爆炸,CUSTOM:中余晖单位死亡钢珠,CUSTOM:中余晖单位死亡闪光
unitsSpawnedOnDeath: 损毁2(offsetHeight=0,offsetDir=0,addResources=电磁:6)
selfRegenRate: 0.8
armour: 125
fogOfWarSightRange: 94
copyFrom: ROOT:/通用特效/单位防护.ini,ROOT:/通用特效/爆炸素材库.md
transportSlotsNeeded: 16
tags: 地面,无人单位,反高空,极端重型,免疫烟雾
energyMax: 80
energyRegen: 0.38
energyNeedsToRechargeToFull: true

[attachment_b1]
x: 0
y: 0
onCreateSpawnUnitOf: 检测中介ty(addResources= ammo: 3500 | setFlag= 1)
# 对地对空
# 600是检测范围，0：对地，1：对空，2：反潜
prioritizeParentsMainTarget: false
alwaysAllowedToAttackParentsMainTarget: false




[action_变形]
displayType: action
text: 切换为反重力底盘
description: 展开反重力引擎和矢量喷口，并封闭机库以保证气动外形稳定，\n-同时将主武器后置作为后推进器，极大提升机动性。\n-转换模式后将禁用重型射电脉冲炮和自杀式无人机生产线，\n-但是将极大提升移动速度和机动性，并获得水陆两栖能力，\n-切换为反重力底盘后焚天惩戒者将被视为悬浮单位。
price: 0
isLocked: if self.queueSize > 0.5 or numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)
buildSpeed: 0s
isVisible: if not self.tags(includes= '别打了') 
highPriorityQueue: true
whenBuilding_cannotMove: true
iconImage: ROOT:/通用特效/加速.png
temporarilyAddTags:别打了
alsoQueueAction: bx1
pos: 0
refundAllQueuedItems:true
