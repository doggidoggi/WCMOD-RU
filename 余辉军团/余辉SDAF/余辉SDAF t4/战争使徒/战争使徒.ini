[core]
name:战争使徒
displayText: Апостол Войны
price: 5400
maxHp: 2000
maxShield: 9000
shieldRenderRadius: 52
shieldRegen: 0.15
displayDescription: 【Уровень t4】【Преодолевает утёсы】【Беспилотный юнит】【Наземный юнит】тактическое назначение: тяжёлый универсальный мех, не может транспортироваться.\n-вооружение:▲автоматический ракетомётX1 только по земле взрывной урон слабо эффективен против щитов, \n-▲ пусковая плазменных шиповX1 только по земле энергетический урон усиленный урон по щитам, \n-▲лазерная установка ближнего бояx1 только по воздуху энергетический урон, \n-▲блок плавающих пушекX2 по земле и воздуху энергетический урон\n-Апостол Войныпоздний период Войны Государств эпохи Древних Людей, для Империясухопутные войскаспециальныйдверьустановкарасчёт в  типштурммехов, \n-от компания Зетанояосновак семья Файад многовидподъёмслучайразработка, а приходит .\n-поэтому, этотмашина типединицаимеет густойтолстый тяжёлый огневая мощьустановкарасчёт.\n-Апостол Войныможет называтьвооружениек зубы, кромеодиндверьогневая мощькрайнедля огромный автоматический ракетомётчтобы снаружи , \n-ещё оснащёнимеет плавающая пушкаблок и пусковая плазменных шиповиспользует к компенсацияглавныйоружие огневая мощьмеждущель.\n-ммнет вопрос, Апостол Войныэто Империясухопутные войскав сильный механическийбойвоин, \n-они в один раз также один раз идтидвижениев для Его Величество Императороткрытьрасширение территорииземля.
effectOnDeath:CUSTOM:小型余晖死亡冲击波,CUSTOM:小型余晖死亡爆炸,CUSTOM:小型余晖死亡钢珠,CUSTOM:小型余晖死亡闪光
unitsSpawnedOnDeath: 损毁2(offsetHeight=0,offsetDir=0,addResources=电磁:1)
techLevel: 1
fogOfWarSightRange: ${int(attack.maxAttackRange/17.5)}
