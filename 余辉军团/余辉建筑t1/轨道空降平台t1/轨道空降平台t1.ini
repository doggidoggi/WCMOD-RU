energyRegen: 0
energyStartingPercentage: 0
displayDescription: 【阶级t1】【建筑单位】【地面单位】【无人单位】\n-战术定位：轻型单位生产设施，无武装。\n-无法在水上建造。轨道空降平台是基础的复合建筑，\n-包含一个轨道空降接收平台和一个标准纳米组装厂，\n-与无情报突袭相比，有轨道空降平台提供坐标与补给的空降部队的作战效率更高，\n-纳米组装厂也可以直接拼接一些小型单位，或是将空降下来的零件重新还原为大型单位，\n-同时其本身经过减重，也可以空降部署，大大增强了战术灵活性，\n-因此，这些快速部署前哨成了帝国余晖不可或缺的建筑。
tags: 地面,建筑,无人单位,轻工
canBuild_31_name: setRally
canBuild_31_pos: 0.0001

