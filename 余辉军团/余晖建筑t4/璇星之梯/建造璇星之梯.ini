displayDescription: 【阶级t4】【极端重型单位】【建筑单位】【地面单位】【无人单位】\n-战术定位：超级单位生产设施，无武装。\n-无法在水上建造。璇星之梯是诺瓦帝国乃至整个古人类建筑材料学的至高结晶，\n-这种刺破苍穹的巨构是诺瓦帝国将武装力量投射至整片星域的核心之一，\n-依托于天璇导纤这种极为强韧的纳米线缆，其位于星球地表的终端能以军团为规模，\n-向外或者向内运输陆战部队。而在银丝连接的云层彼端，\n-璇星之梯的轨道站泊点可以配备丰富的武装，以及多条补给产线。\n-这些巨塔既是帝国所属星球发达与先进的象征，\n-同时也是敌对星球控制权易主的前兆。
tags: 地面,建筑,无人单位,极端重型
