displayDescription: 【Уровень t4】【Здание】【Наземный юнит】【Беспилотный юнит】\n-тактическое назначение: завод лёгких юнитов, без вооружения.\n-не может строиться на воде.орбитальная десантная платформаэто базовый восстановитьобъединениездание, \n-включает в себя орбитальный десантприёмную платформу и стандартный наносборочный цех, \n-По сравнению с десантом без разведки,, имеет орбитальная десантная платформаобеспечивает координаты и снабжениечто повышает эффективность десанта, \n-наносборочный цех также может собирать малые юниты или восстанавливать сброшенные с орбиты детали в крупные юниты, \n-сам он облегчён и может быть сброшен с орбиты, что заметно повышает тактическую гибкость, \n-поэтому эти быстрые форпосты стали неотъемлемыми зданиями Имперского Зарева.
