displayDescription: 【阶级t4】【建筑单位】【地面单位】【无人单位】\n-战术定位：重型单位生产设施，无武装。\n-无法在水上建造。机甲工厂是帝国标准的战争兵器组装设施，\n-用于在星球地表组装和维护陆军主力单位，\n-其装配了一台可以快速拆卸和装载的大型纳米自动成型系统，\n-配合机甲工厂提前装载的预制素材，\n-能够在星球地表以极高效率生产高规格的入侵部队，\n-仅需短短数分钟就能组建起一只庞大的军队，\n-但由于打印机内含的纳米素材有限，需要依赖轨道舰队的空投进行补给。
