displayType: action
text: 部署等离子炮塔
description: 等离子炮是一款经典武器，早在古人类战国之前，\n-这款武器就已经被研发出来，\n-即使是在现在，等离子炮依旧可以轻松瓦解装甲大军，\n-于是余辉将战舰上的等离子炮缩比后，\n-将其重新应用于基地防御上。\n-只能对地。能源伤害。
price: 2000
buildSpeed: 10s
isLocked: if self.noUnitInTeam(withTag= '余辉指挥中心t2')
isLockedMessage: 你需要二级AI核心作战中枢
ai_isHighPriority: true


[action_AG热射线炮塔]
convertTo: AG热射线炮塔t1
displayType: action
text: 部署热射线炮塔
description: 热射线炮塔是余辉最常规的基地防御武器，\n-他们可以快速烧焦少量骚扰部队，\n-无论他们在空中还是地面。对地对空，能源伤害。反掩体。
price: 1000
buildSpeed: 17s
isLocked: if self.noUnitInTeam(withTag= '余辉指挥中心t2')
isLockedMessage: 你需要二级AI核心作战中枢
ai_isHighPriority: true


[action_AG等离子喷火塔]
convertTo: AG等离子喷火塔t1
displayType: action
text: 部署等离子喷火塔
price: 900
buildSpeed: 17s
isLocked: if self.noUnitInTeam(withTag= '余辉指挥中心t2')
isLockedMessage: 你需要二级AI核心作战中枢
description: 等离子喷火塔是余辉专门针对人海战术研究的防御武器，\n-其喷射出的高等离子云可以瞬间熔化坦克装甲和步兵，\n-是绝佳的近距离防御武器。\n-只能对地。中性伤害。反掩体。


[action_AG离子脉冲炮塔t1]
convertTo: AG离子脉冲炮塔t1
displayType: action
text: 部署离子脉冲炮塔
price: 500,蓝晶=120
buildSpeed: 17s

isVisible: true

isLocked:if not self.globalTeamTags(includes='泽塔诺亚1')
isLockedMessage: 你需要泽塔诺亚蓝图数据库1
ai_isHighPriority: true
description: 离子脉冲炮是第三代粒子武器，基于对中性粒子炮的改良，\n-相比于中性粒子炮，离子脉冲炮更稳定，更强悍。\n-对地对空，能源伤害。


[action_AG涡旋导弹炮塔t1]
convertTo: AG涡旋导弹炮塔t1
displayType: action
text: 部署涡旋导弹炮塔
price: 800
buildSpeed: 17s
isVisible:true
isLocked: if self.noUnitInTeam(withTag= '余辉指挥中心t3')
isLockedMessage: 你需要三级AI核心作战中枢
description: 涡旋导弹炮塔是最基础也是最高效的地对空导弹阵列，\n-这种导弹几乎在古人类任何一场现代战争中都能见到，\n-他们能以极高的效率击落任何敢于接近的战机乃至战舰。\n-只能对空。爆炸伤害。
ai_isHighPriority: true

[action_AG诱导激光炮塔t1]
convertTo: AG诱导激光炮塔t1
displayType: action
text: 部署诱导激光炮塔
price: 500,蓝晶=150
buildSpeed: 17s

isVisible: true
isLocked:if not self.globalTeamTags(includes='乌托米尔1')
isLockedMessage: 你需要乌托米尔原子刻蚀技术1
description: 诱导激光是一种由特殊粒子构成，由立场引导的光束武器，\n-在命中目标后，立场可以精确索引粒子束再次命中附近的目标，\n-这个过程将一直重复，直到引导范围内没有可以攻击的对象。\n-正因如此，诱导激光可以轻易瓦解大量的中小型单位。\n-只能对地。能源伤害


[action_AG反质子标枪炮塔t1]
convertTo: AG反质子标枪炮塔t1
displayType: action
text: 部署反质子标枪炮塔
