isLockedMessage: 你需要皇家舰队作战学说1
description: 反质子标枪能以光束的形式将反物质发射至很远的距离，\n-并引发毁灭性的爆炸，只需一击即可重创绝大部分重型单位，\n-诺瓦帝国经常使用这种武器作为路基反舰武器。\n-对地对空对高空。能源伤害。


