


[core]
name: AG等离子喷火塔t1
class: CustomUnitMetadata
price: 1400
maxHp: 1100
maxShield: 1000

shieldRegen: 0.07
#footprint used for collisions with units (left, up, right, down)
footprint: 0,0,1,1
#used for placement, and placement of other buildings
constructionFootprint: 0,0,1,1

copyFrom: ROOT:/通用特效/单位防护.ini
buildingToFootprintOffsetX: 20
buildingToFootprintOffsetY: 13
techLevel: 1
buildSpeed: 0.0008
fogOfWarSightRange: ${int(attack.maxAttackRange/16)}
#availableInDemo: true
tags: 地面,建筑,无人单位
radius: 25
#displayRadius: 25
buildingSelectionOffset: -8
armour: 5
isBuilding: true
isBio: false


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[action_升级]
convertTo: AG等离子喷火塔t2
displayType: action
text: AG等离子喷火塔t2
price: 1800
buildSpeed: 10s

isLocked: if self.noUnitInTeam(withTag= '余辉指挥中心t3')
isLockedMessage: 你需要三级AI核心作战中枢
ai_isHighPriority: true
description: 二级等离子喷火塔采用更加高效的等离子燃料，\n-不仅更加致命，而且射程涵盖已知的绝大部分地面主战坦克。


