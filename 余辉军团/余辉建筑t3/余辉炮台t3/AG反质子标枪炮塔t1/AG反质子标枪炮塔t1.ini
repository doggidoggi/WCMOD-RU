[action_近距离锁定]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='飞机',greaterThan= 0,withInRange=370) or numberOfUnitsInEnemyTeam(withTag='地面',greaterThan= 0,withInRange=370)
addWaypoint_target_nearestUnit_tagged:飞机,地面
addWaypoint_type: attack
addWaypoint_target_nearestUnit_team: enemy
clearAllWaypoints: true
isVisible:false
[action_近距离锁定x]
autoTrigger: if numberOfUnitsInEnemyTeam(withTag='高空',greaterThan= 0,withInRange=775) and numberOfUnitsInEnemyTeam(withTag='飞机',lessThan= 1,withInRange=370) and numberOfUnitsInEnemyTeam(withTag='地面',lessThan= 1,withInRange=370)
addWaypoint_target_nearestUnit_tagged:高空
addWaypoint_type: attack
addWaypoint_target_nearestUnit_team: enemy
clearAllWaypoints: true
isVisible:false
[hiddenAction_↯a]
