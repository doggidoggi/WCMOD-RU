buildingToFootprintOffsetX: 20
buildingToFootprintOffsetY: 13
tags: 地面,建筑,无人单位,无人单位
armour: 5
techLevel: 1
buildSpeed: 0.0008
radius: 25
#displayRadius: 25
buildingSelectionOffset: -8

isBuilding: true
isBio: false


[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)


[action_升级]
convertTo: AG涡旋导弹炮塔t2
displayType: action
text: 升级
price: 2000
buildSpeed: 8s

ai_isHighPriority: true
description: 二级涡旋导弹炮台采用改良弹药并额外添加了一个发射单元，\n-数个涡旋导弹炮台均衡布置即可封锁大片天空。
isLocked: if self.noUnitInTeam(withTag= '余辉指挥中心t3')
