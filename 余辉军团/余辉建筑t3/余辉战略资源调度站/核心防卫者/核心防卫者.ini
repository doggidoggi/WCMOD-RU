


[core]
name: 核心防卫者
price: 0
maxHp: 8000
maxShield: 8000
shieldRegen: 0.3

buildSpeed: 10s
#availableInDemo: true
radius: 45
displayRadius: 45
unitsSpawnedOnDeath: 损毁2*1
fogOfWarSightRange: 22
tags: 地面,无人单位
showInEditor: false
generation_active: if self.timeAlive(laterThanSeconds=120)
generation_credits: -21
generation_delay: 40
armour: 10
copyFrom: ROOT:/通用特效/单位防护.ini
transportSlotsNeeded: 4
[action_s1]
autoTrigger: if self.isOverLiquid and not self.hasParent()
isVisible: false
addResources: hp=-999999
[hiddenAction_中立自杀]
autoTrigger: if self.teamId == -2
isVisible:false
isActive:false
deleteSelf:true

[action_a]
autoTrigger: if numberOfUnitsInEnemyTeam(greaterThan=0, withinRange=470) and not self.hasFlag(id=1)
isVisible: false
addResources: setFlag=1
playAnimation: attack


[action_b]
autoTrigger: if self.hasFlag(id=1) and not numberOfUnitsInEnemyTeam(greaterThan=0, withinRange=470)
playAnimation: attack1
stopLastAnimation: true
addResources: unsetFlag=1
isVisible: false

[hiddenAction_↯a]
autoTrigger: if self.resource.xk > 0 and not self.tags(includes= '↯')
alsoQueueAction: ↯b
isActive: false
temporarilyAddTags: ↯


[hiddenAction_↯b]
buildSpeed: 3.5s
whenBuilding_cannotMove: true
isActive: false
highPriorityQueue: true
temporarilyRemoveTags: ↯

setResourcesWithLogic: xk= select(self.resource.xk > 7, 1, 0)
[graphics]
image: 身体.png
image_wreak: 死亡.png
image_turret: 身体.png
image_shadow: AUTO
shadowOffsetX: 4

shadowOffsetY: 4
lock_shadow_rotation_with_main_turret: true
teamColorsOnTurret: true
lock_body_rotation_with_main_turret: true
lock_leg_rotation_with_main_turret: true


