displayDescription: 【阶级t3】【地雷】\n-战术定位：反机械单位地雷。一种大规模运用于帝国军队中的地雷，\n-这种地雷带有强磁性，对任何地面甚至低空机械单位都极为致命。\n-只能被地面，悬浮，空中，和海上机械单位触发，爆炸伤害，反掩体。
