allowMultipleInQueue: false
description: -近地轨道舰队将发射一个中等规模容量的空投仓支援地面，\n-该空投根据是否持有泽塔诺亚蓝图数据库2，皇家舰队作战学说2，乌托米尔原子刻蚀技术2，\n-来产生SDAF咆哮者+SDAF预兆，SDAF阿吉里恩，SDAF浩劫，\n-并附带一台SDAF冲击波，若没有上述科技则产生SDAF预兆和SDAF冲击波各两台，\n-如果同时持有多个科技，则按照优先产生最强的单位，浩劫＞阿吉里恩＞咆哮者。
iconImage: 中空投.png
onlyOneUnitAtATime: true

price: energy=7.5
highPriorityQueue: true
fireTurretXAtGround: 中空投
fireTurretXAtGround_onlyOverPassableTileOf: BUILDING
isLocked:if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)

