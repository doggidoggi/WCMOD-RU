[action_刷灰机]
text: 战术核打击
description: -呼叫一架影袭轰炸机从近地轨道进入大气层，\n-对指定目标发射一枚反物质导弹，进行战术打击。\n-战术打击将对范围200内的敌人最高造成12000点能源伤害。\n-由于影袭轰炸机配备长效克莱因瓶屏蔽所有索敌系统，因此无法被攻击。\n-但导弹依然可以被反导系统拦截。
onlyOneUnitAtATime: true
isActive: if self.numberOfAttachedUnits(withTag= "飞机目标", greaterThan= 0.5)
# 没中介时不能用

allowMultipleInQueue: false
# 允许多次点击此行为形成队列，false时则只能点一次，不能累加。
spawnUnits: 影袭轰炸机(offsetHeight= 2000)
# 在2000高度刷灰机
fireTurretXAtGround: 瞄准用

fireTurretXAtGround_withProjectile: 空
# 空炮弹
alsoTriggerAction: 瞄准坐标
# 将中介传送过去
iconImage: 轰炸.png

price: energy=3
highPriorityQueue: true
isLocked:if numberOfUnitsInEnemyTeam(withTag='压制塔',greaterThan=0, withinRange=415)

[hiddenAction_瞄准坐标]
fireTurretXAtGround: 瞄准用


