[action_核弹哥之灵位]
text: 1015225530
isActive: false
isVisible: true
displayType: infoOnly
isGuiBlinking: false
iconImage: 企鹅.png
description: QQ1015225530, автор мода «Идеальное противостояние». Истинный «герой» модостроения Rusted Warfare: ещё когда LUKE только выпустил версию без поддержки модов, он уже якобы начал писать свой мод. В видео-презентации он сократил «более чем десятилетний» цикл разработки до шести лет,\n-а затем, наплевав на свою аудиторию из четырёх подписчиков и рискуя быть осмеянным сотней-другой зрителей, мужественно урезал цикл ещё — до четырёх лет. Несмотря на то, что с заявленного 2017 по 2022 год его так и не оценили игроки RW,\n-его кикали почти из всех чатов мода, он сам признал свои труды.\n-В награду себе он бережно отобрал чужие текстуры из других модов.\n-Хоть качество и хромало из-за разрозненной мод-базы, наш самоуверенный герой всё равно явил публике свой шедевр.\n-К несчастью, к нему пришёл автор оригинала. Будучи прирождённо одарённым, он мастерски владел всеми приёмами против таких визитов:\n-в итоге наш переговорщик остался один на один с обвиняемым. На наши разумные требования\n-проницательный герой моментально усмотрел угрозу для жизни и привычно прошёл цикл уклонений: угрозы выпрыгнуть из окна,\n-просьбы перевести тысячу юаней, посулы подарить «v10 аккаунт King of Glory» и прочее.\n-Но наш переговорщик стоял на своём, и тогда он пустил в ход всё что мог,\n-и наконец вытащил козырь: «у меня младший брат хочет поиграть, я для него стараюсь». Заметив, что разговор сворачивает на него,\n-он сходу выдал: «у меня код в десять раз изящнее вашего», «вы видели другой мод с такими тонкими эффектами? наверное, не понимаете», и т.д., чтобы поднажать.\n-Но видя нашу твёрдость, он выложил свой главный аргумент — снова перечислил вклад в RW. На наши сомнения он отвечал коротко: «мне пора», «поговорим потом».\n-После «мне пора» неделю спустя он так и не ответил, поэтому мы предполагаем, что его уже нет среди нас. В память о нём — эта могила.


[action_平贺小豪之灵位]
text: 1984446419
isActive: false
isVisible: true
displayType: infoOnly
isGuiBlinking: false
iconImage: 企鹅.png
description: QQ1984446419, автор мода «Новый Небесный Дом». Скажу прямо: о Пинхэ Сяохао я и слов подобрать не могу, чтобы достойно описать все его деяния.\n-Если коротко — это просто куча ходячего дерьма. Если предыдущий «Девятилетний мальчик строит ядерную бомбу» был «военным преступником класса A»,\n-то этот тип уже выходит за всякие рамки. Если бы дурак умел летать — он был бы тем самым легендарным космическим челноком.\n-Его «грехи» включают (но не ограничиваются) кражей текстур, юнитов и других ресурсов из чужих модов. Боже, как у человека вообще могут возникнуть такие мысли в голове?\n-Разве что он не человек. Ладно, кратко расскажу о его «славных деяниях». Ещё пять лет назад он по этим же причинам подвергся совместной санкции со стороны других мододелов,\n-и даже его личные данные неизбежно утекли. По логике, после такого человек должен хотя бы какое-то время вести себя тише — но это сработало бы только с человеком, а Сяохао уже давно перестал быть человеком.\n-Кто бы мог подумать: всего через пять лет он снова всплыл и, в свойственной ему пошлой и бесстыдной манере, словно специально нарываясь, принялся жестоко обкрадывать крупные моды.\n-К сожалению, его действия настолько вопиющие, что почти наверняка нарушают правила платформы, поэтому я, увы, не могу здесь подробно описать всё. Когда пять лет спустя он вернулся в мод-сообщество и заявил, что начнёт всё заново,\n-наивно решили: исправился. Но реальность оказалась жестока — Сяохао остался прежним и продолжает тырить чужое.\n-Честно говоря, из принципа он, конечно, отправляется в эту могилу. Но если по-человечески — у такого бесстыжего, видимо, в домашнем регистре он сам единственный.

