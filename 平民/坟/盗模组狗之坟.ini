[action_核弹哥之灵位]
text: 1015225530
isActive: false
isVisible: true
displayType: infoOnly
isGuiBlinking: false
iconImage: 企鹅.png
description: QQ1015225530，完美对抗mod作者，这是一位在铁锈战争领域中真正的勇士，在LUKE刚发布没有mod功能的铁锈战争的时候便已经开始了mod的编写工作。并在视频介绍中将长达十年多制作周期缩短至六年，\n-随后不顾只有四位粉丝，冒着被一两百观看量的观众骂为云玩家的风险，力排众议将制作周期又缩短至了四年。虽然从他声称的2017年到2022年这五年的时间里没有被铁锈战争的玩家们所敬仰，\n-甚至被几乎所有铁锈群踢出，但还是对自己的努力做出了认可，\n-为了奖励自己，它细心选取了其它mod中的贴图，\n-虽然因为mod技术的参差不齐导致总体观感很差，但是一向自信的他还是对外公开了自己的杰作。\n-不幸的是，随后便被mod作者找上了门，天资聪慧的他熟知各种应对此类人的方法，\n-到最后竟只剩下了我方的交涉人员，在我方人员的合理要求下，\n-一向敏锐的他竟从中看出了隐藏的杀机，熟练地以威胁生命为由做出了跳楼、\n-请求转账千元以及请求赠送所说的v10王者荣耀账号等一系列的规避行为，\n-但怎奈我方人员态度坚决，他使出了浑身解数，\n-终于以凭一己之力生出一个的弟弟要玩mod为由成功扳回一局，见话题逐渐朝自己转移之际，\n-当机立断说出了“我代码比你们讲究十倍”、“你见过其他模组有这么细腻的吗，特效是不是看不懂”等话语来增强气势，但见我方人员态度依旧坚定之后，\n-终于使出的自己的终极王牌，一一陈述起了上文所说对铁锈的贡献，面对我方人员的质疑，仅以“去忙了”、\n-“下次再聊”等寥寥数语便再次回避了攻势。由于在说出去忙了之后一周之后面对我方人员的询问仍未做出任何回应，故推断此人可能已经不在这个世上了，特立此坟以表悼念。


[action_平贺小豪之灵位]
text: 1984446419
isActive: false
isVisible: true
displayType: infoOnly
isGuiBlinking: false
iconImage: 企鹅.png
description: QQ1984446419，新世天家mod作者，关于平贺小豪冒昧的说，我实在无法用语言来妥善的形容此人所犯下的种种罪行，\n-因为，简单的来讲，这个人就只是一坨移动的狗屎而已，如果说我们之前的九岁的男孩造核弹就已经能称得上是甲级战犯的话，\n-那么这个人就已经能称得上是罄竹难书了，如果傻逼会飞的话，那么他绝对可以称得上是传说中的航天飞机，\n-此人犯下的罪过包括，但不限于盗用他用模组的贴图资源，单位资源等，上帝啊，人类这大脑中怎么会组合出这种想法呢？\n-除非他不是人类，算了，还是简单叙述一下此人的光辉往事吧，早在五年前，此人就因为同样的原因遭到过其余模组制作者的联手制裁，\n-甚至连他的个人隐私信息也不可避免的泄露了，这按理来说应该会使一个人至少收敛一段阵子，但很显然这句话的前提是人，而小豪已经完全不是人了，\n-令人没有想到的是，仅仅短短五年后，此人就再度出山，并且以十分恶俗和不要脸的方式仿佛碰瓷一样的对各大模组进行残酷的盗用，\n-可惜的是，由于其行为过于恶劣，很有可能触犯平台的相关法律法规，因此我很遗憾的无法在这里对各位详细叙述，五年后，当他再度返回模组圈，声称自己要重新做模组时，\n-人们这曾经也天真的认为他改好了。然而，现实的重压残酷的摆在了每个人的面前，小豪还是曾经的那个小豪，他依然在盗用别人的内容，\n-说真的，虽然由于原则上的问题，我们自然要将其加入盗模组狗之坟，但是从实际上的角度来讲，如此没脸没皮的人，家里户口本上可能只有他一人了了。

