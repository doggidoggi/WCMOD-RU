description: -Кладбище, специально построенное для семей всяких воров модов и текстур.\n-Кладбище постоянно расширяется: посмеешь украсть — закопаем сюда же.\n-Полагаю, тем, кто играет в твой ворованный мод, твоя могила тоже понравится.\n-Вор модов и вся его родня будут лежать здесь и прославлять WCMOD по всему миру.\n-Не думайте, что WCMOD мягкотелый: к воровству модов я всегда относился терпимо,\n-но, малявки, не садитесь на шею. Не считайте, что вы можете втоптать в грязь достоинство мододелов.\n-Кто вы такие, твою мать?


