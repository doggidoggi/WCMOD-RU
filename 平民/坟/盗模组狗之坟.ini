description: -专门为各种盗MOD狗，盗图狗的全家建造的坟墓，\n-坟地持续扩张中，只要你敢盗，我就敢把你埋里面，\n-我觉得别人玩你盗的MOD也会十分欣赏你的坟。\n-盗MOD狗和他的全家会在这个坟里伴随着WCMOD一起名扬海外。\n-别以为我WCMOD是软柿子，我对盗MOD一直以来都是包容态度，\n-但请各位小鬼也别蹬鼻子上脸，别以为你们能把MODER的尊严踩在脚下，\n-你他妈算个几把。


